<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — NYC</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --rule: #000;
      /* Bumped from 0.40 / 0.20 / 0.08 so the secondary gray text clears
         WCAG AA on white (4.5:1 for normal text, 3:1 for large). */
      --soft:    rgba(0, 0, 0, 0.62);   /* event-meta, captions, time column — body-text gray */
      --softer:  rgba(0, 0, 0, 0.45);   /* inactive dow letters, soft borders — large-text gray */
      --softest: rgba(0, 0, 0, 0.14);   /* hairline dividers */
      --pad-x: clamp(20px, 4vw, 80px);
      --filter-h: 56px;
      --topbar-h: 48px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-feature-settings: 'cv11', 'ss03';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @supports (font-variation-settings: normal) {
      body { font-family: 'InterVariable', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    }

    /* ── Masthead ───────────────────────────────────────── */
    .masthead {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      font-size: 12px;
      letter-spacing: 0.01em;
      line-height: 1.4;
      padding: clamp(28px, 4vw, 56px) var(--pad-x) clamp(24px, 4vw, 48px);
    }
    .masthead .meta-right {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .masthead .meta-label { display: block; }
    .meta-links {
      display: flex;
      gap: 18px;
      align-items: baseline;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .meta-link {
      appearance: none;
      background: none;
      border: 0;
      padding: 4px 0 6px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      border-bottom: 1.5px solid var(--ink);
      transition: opacity 120ms ease;
    }
    .meta-link:hover { opacity: 0.55; }
    .meta-link[aria-pressed="false"] {
      color: var(--soft);
      border-bottom-color: var(--softer);
      font-weight: 500;
    }
    .meta-link[aria-pressed="false"]:hover { color: var(--ink); border-bottom-color: var(--ink); opacity: 1; }
    .meta-caption {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--soft);
      font-feature-settings: 'tnum';
    }

    .meta-btn {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: inherit;
      cursor: pointer;
      display: block;
    }
    .meta-btn .meta-label { display: block; }
    .meta-btn .meta-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 600;
      margin-top: 6px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
    }
    .meta-btn .meta-cta::after {
      content: '↗';
      font-weight: 400;
      letter-spacing: 0;
    }
    .meta-btn:hover .meta-cta { opacity: 0.6; }
    .meta-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }

    /* ── Sources sheet (dialog) ─────────────────────────── */
    .sheet {
      padding: 0;
      border: 1px solid var(--rule);
      background: var(--paper);
      color: var(--ink);
      width: min(560px, calc(100vw - 32px));
      max-height: min(80vh, 720px);
      overflow: hidden;
      margin: auto;
    }
    .sheet::backdrop { background: rgba(0, 0, 0, 0.5); }
    .sheet:not([open]) { display: none; }
    .sheet-inner { display: flex; flex-direction: column; max-height: inherit; }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding: 22px 26px 14px;
      border-bottom: 1px solid var(--rule);
    }
    .sheet-titles { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .sheet-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1.05;
    }
    .sheet-sub {
      font-size: 14px;
      color: var(--soft);
      line-height: 1.4;
    }
    .sheet-close {
      appearance: none;
      background: none;
      border: 0;
      padding: 4px 8px;
      margin: -4px -6px 0 0;
      font: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      color: var(--soft);
    }
    .sheet-close:hover { color: var(--ink); }
    .sheet-body { padding: 16px 26px 24px; overflow: auto; }
    .sheet-section + .sheet-section { margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--softest); }
    .sheet-section h3 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.012em;
      color: var(--ink);
      margin: 0 0 8px;
    }
    .sheet-section p, .sheet-prose p {
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink);
      margin: 0 0 10px;
    }
    .sheet-prose p:last-child { margin-bottom: 0; }
    .sheet-prose ol {
      margin: 8px 0 0;
      padding-left: 22px;
      font-size: 14.5px;
      line-height: 1.55;
    }
    .sheet-prose ol li { margin-bottom: 6px; }
    .sheet-prose ol li strong { font-weight: 700; }
    .sheet-prose code {
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      font-size: 13px;
      background: var(--softest);
      padding: 0 4px;
      border-radius: 2px;
    }
    .source-row {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      column-gap: 14px;
      row-gap: 2px;
      padding: 12px 0;
      border-top: 1px solid var(--softest);
    }
    .source-row:first-child { border-top: 0; padding-top: 4px; }
    .source-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 7px;
      background: var(--softer);
      box-shadow: 0 0 0 2px var(--softest);
    }
    .source-row.is-ok    .source-dot { background: #16a34a; box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.18); }
    .source-row.is-empty .source-dot { background: #d97706; box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.18); }
    .source-row.has-error .source-dot { background: #b00020; box-shadow: 0 0 0 2px rgba(176, 0, 32, 0.18); }
    .source-name { font-size: 15px; font-weight: 600; }
    .source-count {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      align-self: center;
    }
    .source-row.is-ok    .source-count { color: var(--ink); font-weight: 600; }
    .source-row.has-error .source-count { color: #b00020; font-weight: 600; }
    .source-row.is-empty .source-count { color: #d97706; font-weight: 600; }
    .source-fetched {
      grid-column: 2 / -1;
      font-size: 12px;
      color: var(--soft);
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }
    .source-row .source-err {
      grid-column: 2 / -1;
      font-size: 12.5px;
      color: #b00020;
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      margin-top: 6px;
      word-break: break-word;
    }
    .sheet-summary {
      font-size: 14px;
      margin-bottom: 10px;
      color: var(--soft);
    }
    .sheet-summary .ok  { color: var(--ink); font-weight: 600; }
    .sheet-summary .bad { color: #b00020; font-weight: 600; }
    .sheet-summary .muted { color: var(--soft); }
    .source-url {
      grid-column: 2 / -1;
      font-size: 12.5px;
      color: var(--soft);
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      word-break: break-all;
      text-decoration: none;
      margin-top: 2px;
    }
    .source-url:hover { color: var(--ink); text-decoration: underline; }
    .kv {
      display: grid;
      grid-template-columns: minmax(120px, auto) 1fr;
      gap: 6px 18px;
      font-size: 14px;
    }
    .kv dt { color: var(--soft); align-self: center; }
    .kv dd { margin: 0; font-variant-numeric: tabular-nums; color: var(--ink); }
    .kv dd a { color: inherit; text-decoration: underline; }
    .sheet-foot {
      padding: 14px 26px 18px;
      border-top: 1px solid var(--softest);
      font-size: 13px;
      color: var(--soft);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .sheet-foot a { color: var(--ink); text-decoration: underline; }
    .sheet-foot a:hover { opacity: 0.6; }
    .masthead .title {
      grid-column: 1 / -1;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-top: clamp(20px, 3vw, 36px);
    }

    /* ── Sticky top bar (view toggles + sources/weather) ───
       Always visible. Views on the left, action links on the right. */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 35;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: stretch;
      gap: 8px;
      padding: 0 var(--pad-x);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .topbar::-webkit-scrollbar { display: none; }
    .topbar-group {
      display: flex;
      align-items: stretch;
      gap: 0;
    }
    .topbar-group + .topbar-group {
      margin-left: 18px;
      padding-left: 18px;
      border-left: 1px solid var(--softest);
    }
    .topbar-group.is-end { margin-left: auto; }
    /* The View dropdown is mobile-only; hide it on desktop. */
    .view-mobile-only { display: none; }

    .tab {
      appearance: none;
      background: none;
      border: 0;
      padding: 16px 0 14px;
      margin-right: 24px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .topbar-group .tab:last-child { margin-right: 0; }
    .tab:hover { color: var(--ink); }
    .tab.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }

    /* Categories dropdown (button stays in the scroll lane, panel is fixed-positioned) */
    .dropdown { position: relative; }
    /* Dropdown trigger lives in the topbar next to the view tabs. Matches the
       tab typography (Inter 600 small-caps) so the line reads uniformly. */
    .dropdown-btn {
      appearance: none;
      background: none;
      border: 0;
      padding: 16px 0 14px;
      margin: 0 24px 0 0;
      margin-bottom: -1px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-bottom: 2px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .dropdown-btn:hover { color: var(--ink); }
    .dropdown-btn:hover .dropdown-label { color: var(--ink); }
    .dropdown-btn::after {
      content: '▾';
      font-size: 9px;
      color: var(--soft);
      transition: transform 120ms ease;
      letter-spacing: 0;
    }
    .dropdown-btn[aria-expanded="true"]::after { transform: rotate(180deg); }
    .dropdown-btn .dropdown-label { color: var(--soft); font-weight: 600; }
    .dropdown-btn .dropdown-value {
      color: var(--ink);
      font-weight: 700;
    }

    .dropdown-panel {
      position: fixed;
      z-index: 60;
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 14px 18px 16px;
      min-width: 220px;
      max-width: calc(100vw - 24px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dropdown-panel[hidden] { display: none; }
    .dropdown-panel .dp-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 8px;
    }
    .dropdown-panel .dp-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .dropdown-panel .dp-clear {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      font: inherit;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
    }
    .dropdown-panel .dp-clear:hover { color: var(--ink); }
    .dropdown-panel .dp-clear[disabled] { opacity: 0.3; cursor: default; }
    /* Single-select rows (used by the mobile View dropdown). */
    .dropdown-panel .dp-item {
      appearance: none;
      background: none;
      border: 0;
      padding: 9px 0;
      font: inherit;
      font-size: 14px;
      letter-spacing: 0;
      color: var(--soft);
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .dropdown-panel .dp-item::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1.5px solid var(--ink);
      background: var(--paper);
      flex-shrink: 0;
    }
    .dropdown-panel .dp-item.is-active::before { background: var(--ink); }
    .dropdown-panel .dp-item:hover { color: var(--ink); }
    .dropdown-panel .dp-item.is-active { color: var(--ink); font-weight: 600; }
    .dropdown-panel .dp-item[data-action]::before { display: none; }
    .dropdown-panel label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      font-size: 14px;
      cursor: pointer;
      text-transform: capitalize;
    }
    .dropdown-panel label:hover { color: var(--ink); }
    .dropdown-panel input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--ink);
      background: var(--paper);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
    }
    .dropdown-panel input[type="checkbox"]:checked {
      background: var(--ink);
    }
    .dropdown-panel input[type="checkbox"]:checked::after {
      content: '';
      width: 8px;
      height: 4px;
      border-left: 1.5px solid var(--paper);
      border-bottom: 1.5px solid var(--paper);
      transform: rotate(-45deg) translateY(-1px);
    }

    /* Always-visible action chip (Sources). Visually matches the active weather chip
       so the two right-side chips line up. */
    .chip-action {
      color: var(--ink);
      font-weight: 600;
      border-bottom: 1.5px solid var(--ink);
    }
    .chip-action::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--ink);
      margin-right: 6px;
      vertical-align: 1px;
    }
    .chip-action:hover { opacity: 0.7; }
    .chip {
      appearance: none;
      background: none;
      border: 0;
      padding: 6px 0;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .chip:hover { color: var(--ink); }
    .chip.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }
    .chip.weather::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: 1px;
      background: var(--softer);
      transition: background 120ms ease;
    }
    .chip.weather.is-active::after { background: var(--ink); }

    /* ── Month section ──────────────────────────────────── */
    .month {
      padding: 0 var(--pad-x);
    }
    .month-sentinel { display: block; height: 1px; margin-top: clamp(28px, 4vw, 56px); }
    .month-title {
      position: sticky;
      top: var(--filter-h);
      z-index: 20;
      background: var(--paper);
      font-size: clamp(72px, 13vw, 200px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      margin: 0;
      padding: 0 0 clamp(20px, 3vw, 36px);
      border-bottom: 1px solid var(--rule);
      transition:
        font-size 220ms ease,
        padding 220ms ease,
        letter-spacing 220ms ease,
        font-weight 220ms ease,
        line-height 220ms ease;
      will-change: font-size, padding;
    }
    /* Collapses to a slim sticky label once you scroll into the month. */
    .month-title.is-stuck {
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.2;
      padding: 14px 0 12px;
    }

    /* ── Day row ────────────────────────────────────────── */
    .day {
      display: grid;
      grid-template-columns: minmax(180px, 22%) minmax(0, 1fr);
      gap: clamp(20px, 3vw, 56px);
      padding: clamp(18px, 2.5vw, 32px) 0;
      border-bottom: 1px solid var(--rule);
      align-items: start;
    }
    .day.is-today .numeral { font-weight: 900; }
    .day.is-today .dow .active {
      background: var(--ink);
      color: var(--paper);
      padding: 0 3px;
    }

    .day-marker {
      align-self: start;
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: left;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .day-marker:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
    .numeral { display: inline-block; }
    .day.is-linked .numeral {
      background: var(--ink);
      color: var(--paper);
      padding: 0 6px;
      margin-left: -6px;
    }
    /* Subtle hover — opacity dip, not a stark color shift. */
    .day-marker { transition: opacity 140ms ease; }
    .day-marker:hover { opacity: 0.72; }
    .dow {
      display: flex;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      font-weight: 400;
      margin-bottom: clamp(10px, 1.2vw, 18px);
      text-transform: uppercase;
    }
    .dow span {
      color: var(--softer);
      width: 1ch;
      text-align: center;
    }
    .dow span.active {
      color: var(--ink);
      font-weight: 600;
    }
    .numeral {
      font-size: clamp(108px, 16vw, 240px);
      font-weight: 800;
      line-height: 0.86;
      letter-spacing: -0.065em;
      font-variant-numeric: lining-nums;
    }

    .day-content {
      padding-top: 6px;
      min-width: 0;
    }

    /* ── Weather row ────────────────────────────────────── */
    .weather {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--rule);
    }
    .weather-left { display: flex; gap: 16px; flex-wrap: wrap; }
    .weather-temp { font-feature-settings: 'tnum'; }
    .weather-mood { color: var(--soft); }
    .weather-right { color: var(--soft); }
    body.hide-weather .weather { display: none; }

    /* ── Events list ────────────────────────────────────── */
    .events {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .event {
      display: grid;
      grid-template-columns: 44px 64px 1fr auto;
      gap: 16px;
      padding: 14px 0;
      align-items: start;
    }
    .event + .event { border-top: 1px solid var(--softest); }
    .event-icon-wrap {
      width: 36px;
      height: 36px;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .event-icon { width: 20px; height: 20px; }
    .event-time {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-feature-settings: 'tnum';
      color: var(--soft);
      padding-top: 9px;
    }
    .event-body { min-width: 0; }
    .event-title {
      font-size: clamp(20px, 1.6vw, 26px);
      font-weight: 700;
      line-height: 1.22;
      letter-spacing: -0.012em;
    }
    .event-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease;
    }
    .event-title a:hover { border-bottom-color: var(--ink); }

    /* Secondary events (past the top TOP_N picks) — shown only when the day
       is expanded, at a clearly smaller scale. Top picks stay bold and big;
       the additional options sit underneath as a quieter list. */
    .event.is-secondary { padding: 8px 0; }
    .event.is-secondary .event-icon-wrap { transform: scale(0.85); transform-origin: top left; opacity: 0.75; }
    .event.is-secondary .event-title {
      font-size: clamp(15px, 1.1vw, 17px);
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.005em;
    }
    .event.is-secondary .event-note {
      font-size: 12.5px;
      line-height: 1.45;
      margin-top: 4px;
    }
    .event.is-secondary .event-meta {
      font-size: 10px;
      margin-top: 2px;
    }
    .event.is-secondary .event-time { font-size: 10px; padding-top: 4px; }
    .event.is-secondary .event-cat  { font-size: 9.5px; }
    .event-meta {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .event-note {
      font-size: 13.5px;
      line-height: 1.5;
      margin-top: 6px;
      max-width: 68ch;
    }
    .event-cat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      padding-top: 4px;
      text-align: right;
    }

    /* ── My Usuals (top picks list above the calendar) ──── */
    .picks {
      padding: clamp(28px, 4vw, 56px) var(--pad-x) clamp(28px, 4vw, 56px);
      border-bottom: 3px solid var(--ink);
    }
    body:not([data-view="month"]) .picks { display: none; }
    .picks-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: clamp(16px, 2vw, 24px);
      padding-bottom: clamp(12px, 1.5vw, 18px);
      border-bottom: 2px solid var(--ink);
      flex-wrap: wrap;
    }
    .picks-title {
      font-size: clamp(26px, 3.6vw, 44px);
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0;
      text-transform: uppercase;
      line-height: 0.95;
    }
    .picks-sub {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 700;
    }
    .picks-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .pick-row {
      display: grid;
      grid-template-columns: 44px 120px 1fr auto;
      gap: 18px;
      padding: clamp(14px, 1.8vw, 22px) 0;
      align-items: start;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .pick-row + .pick-row { border-top: 1px solid var(--softest); }
    .pick-row:hover { background: rgba(0, 0, 0, 0.04); }
    .pick-row.is-hidden { display: none; }
    .picks-list.is-expanded .pick-row.is-hidden { display: grid; }
    .pick-icon-wrap {
      width: 36px;
      height: 36px;
      background: var(--ink);
      color: var(--paper);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pick-icon-wrap .event-icon { width: 20px; height: 20px; }
    .pick-when {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 900;
      color: var(--ink);
      padding-top: 9px;
      font-feature-settings: 'tnum';
    }
    .pick-when .pick-when-time {
      display: block;
      font-weight: 700;
      color: var(--soft);
      margin-top: 2px;
    }
    .pick-body { min-width: 0; }
    .pick-title {
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .pick-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: border-color 120ms ease;
    }
    .pick-title a:hover { border-bottom-color: var(--ink); }
    .pick-meta {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 800;
      margin-top: 6px;
    }
    .pick-note {
      font-size: 14px;
      line-height: 1.55;
      max-width: 64ch;
      margin-top: 8px;
    }
    .pick-cat {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 800;
      padding-top: 12px;
      text-align: right;
    }
    .picks-more {
      appearance: none;
      background: none;
      border: 0;
      padding: 18px 0 6px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 4px;
      margin-top: 12px;
      line-height: 1;
    }
    .picks-more::after {
      content: '↓';
      font-weight: 400;
      transition: transform 160ms ease;
    }
    .picks-list.is-expanded ~ .picks-more::after { transform: rotate(180deg); }
    .picks-more:hover { opacity: 0.55; }
    .picks-more[hidden] { display: none; }
    .picks-empty {
      padding: 24px;
      border: 2px dashed var(--softer);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--soft);
    }
    @media (max-width: 720px) {
      .pick-row { grid-template-columns: 36px 90px 1fr; gap: 12px; }
      .pick-cat { display: none; }
      .pick-icon-wrap { width: 30px; height: 30px; }
      .pick-icon-wrap .event-icon { width: 18px; height: 18px; }
    }

    /* Make sticky filter offset land days correctly under scrollIntoView */
    /* Generous breathing room above the day when scrolled-to, so the
       sticky filter bar doesn't crowd the weather row at the top of
       the day's content. */
    .day { scroll-margin-top: calc(var(--filter-h, 56px) + 40px); }

    /* ── Show more ──────────────────────────────────────── */
    .day .event.is-hidden { display: none; }
    .day.is-expanded .event.is-hidden { display: grid; }
    /* Full-width expand row — clearly the affordance that opens the rest of the day. */
    .more {
      appearance: none;
      background: none;
      border: 0;
      border-top: 1px solid var(--softest);
      padding: 16px 0 14px;
      margin: 8px 0 0;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      text-align: left;
      transition: color 120ms ease, background 120ms ease;
    }
    .more:hover { color: var(--ink); }
    .more::after {
      content: '↓';
      font-weight: 400;
      font-size: 14px;
      transition: transform 200ms ease;
    }
    .day.is-expanded .more::after { transform: rotate(180deg); }
    .day.is-expanded .more { color: var(--ink); }

    /* ── Hover preview (image follows cursor on event titles) ── */
    .title-preview {
      position: fixed;
      z-index: 90;
      pointer-events: none;
      left: -9999px;
      top: -9999px;
      width: 320px;
      height: 200px;
      background: var(--softest);
      border: 1px solid var(--rule);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 140ms ease, transform 160ms ease;
      will-change: left, top, opacity, transform;
    }
    .title-preview.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .title-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0%) saturate(0.95);
    }
    /* Surface a caption with the venue, kept subtle. */
    .title-preview .cap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 8px 12px 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%);
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .event-title[data-image],
    .dn-move-title[data-image] { cursor: help; }
    /* Disable preview on touch / coarse pointer devices. */
    @media (hover: none), (pointer: coarse) {
      .title-preview { display: none !important; }
      .event-title[data-image],
      .dn-move-title[data-image] { cursor: auto; }
    }

    /* ── Empty day ──────────────────────────────────────── */
    .day.is-empty .weather { display: none; }
    .day.is-empty .day-content::before {
      content: '—';
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--softer);
      text-transform: uppercase;
      padding-top: 8px;
    }

    /* ── Week view (horizontal infinite-scroll strip) ─────── */
    #week-view {
      padding: clamp(20px, 3vw, 40px) 0 clamp(40px, 6vw, 80px);
    }
    .week-frame {
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      /* Visual lead-in so the first column doesn't kiss the edge on wide screens */
      padding: 0 var(--pad-x) 4px;
    }
    .week-frame::-webkit-scrollbar { display: none; }
    .week-grid {
      display: flex;
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
      width: max-content;
    }
    .week-col {
      background: var(--paper);
      padding: 18px 16px 24px;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 0 0 clamp(220px, 22vw, 300px);
      scroll-snap-align: start;
      cursor: pointer;
    }
    .week-col.is-month-edge {
      border-left: 4px solid var(--ink);
    }
    .week-col.is-weekend { background: rgba(0, 0, 0, 0.025); }
    .week-col.is-today.is-weekend { background: var(--ink); }
    .week-col.is-today { background: var(--ink); color: var(--paper); }
    .week-col.is-today .week-dow,
    .week-col.is-today .week-wx,
    .week-col.is-today .week-event-meta,
    .week-col.is-today .week-event-time { color: rgba(255,255,255,0.7); }
    .week-col.is-today .week-event-title a { color: inherit; }
    .week-col-head { display: flex; flex-direction: column; gap: 4px; }
    .week-dow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 600;
    }
    .week-num {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      cursor: pointer;
      text-align: left;
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 0.92;
      font-variant-numeric: lining-nums;
      width: max-content;
    }
    .week-num:hover { opacity: 0.65; }
    .week-wx {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      font-variant-numeric: tabular-nums;
    }
    .week-events { list-style: none; padding: 0; margin: 0; }
    .week-event {
      padding: 8px 0;
      border-top: 1px solid var(--softest);
    }
    .week-event:first-child { border-top: 0; padding-top: 0; }
    .week-col.is-today .week-event { border-top-color: rgba(255,255,255,0.15); }
    .week-event-time {
      font-size: 10px;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      margin-bottom: 2px;
    }
    .week-event-title {
      font-size: 13.5px;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.005em;
    }
    .week-event-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .week-event-title a:hover { border-bottom-color: currentColor; }
    .week-event-meta {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 3px;
    }
    .week-empty { color: var(--softer); font-size: 14px; padding-top: 8px; }

    /* ── Year view (brutalist poster) ─────────────────────
       12 month tiles, tight day grids, days with events filled black.
       Click any day → snap to Month view at that date. */
    #year-view {
      padding: clamp(24px, 4vw, 56px) var(--pad-x) clamp(48px, 6vw, 96px);
    }
    .year-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: clamp(20px, 3vw, 36px);
      border-bottom: 3px solid var(--ink);
      margin-bottom: clamp(28px, 4vw, 56px);
      gap: 16px;
      flex-wrap: wrap;
    }
    .year-headline {
      font-size: clamp(96px, 18vw, 280px);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 0.84;
      font-variant-numeric: lining-nums;
    }
    .year-sub {
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      padding-bottom: 12px;
    }
    .year-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(28px, 3vw, 56px);
    }
    .year-month {
      border-top: 2px solid var(--ink);
      padding-top: 10px;
      cursor: default;
    }
    .year-month-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .year-month-name {
      font-size: clamp(28px, 3.4vw, 48px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1;
      text-transform: uppercase;
    }
    .year-month-count {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      font-variant-numeric: tabular-nums;
    }
    .year-month-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--softer);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .year-month-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .year-day {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      cursor: pointer;
      border: 0;
      background: transparent;
      appearance: none;
      padding: 0;
      font-family: inherit;
      transition: background 80ms ease, color 80ms ease;
    }
    .year-day:hover {
      background: var(--softest);
      color: var(--ink);
    }
    .year-day.has-event {
      background: var(--ink);
      color: var(--paper);
    }
    .year-day.has-event:hover { opacity: 0.85; }
    .year-day.is-today {
      outline: 2.5px solid var(--ink);
      outline-offset: -2.5px;
      color: var(--ink);
      font-weight: 900;
    }
    .year-day.is-today.has-event { color: var(--paper); }
    .year-day.is-empty {
      visibility: hidden;
      pointer-events: none;
    }

    @media (min-width: 721px) and (max-width: 1080px) {
      .year-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    /* ── View transitions (zoom in/out between Today/Month/Year) ─── */
    @media (prefers-reduced-motion: no-preference) {
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 320ms;
        animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }
      [data-zoom-dir="in"]::view-transition-old(root)  { animation-name: vt-zoom-out-old; }
      [data-zoom-dir="in"]::view-transition-new(root)  { animation-name: vt-zoom-in-new; }
      [data-zoom-dir="out"]::view-transition-old(root) { animation-name: vt-zoom-in-old; }
      [data-zoom-dir="out"]::view-transition-new(root) { animation-name: vt-zoom-out-new; }
      [data-zoom-dir="flat"]::view-transition-old(root){ animation-name: vt-fade-old; }
      [data-zoom-dir="flat"]::view-transition-new(root){ animation-name: vt-fade-new; }
      @keyframes vt-zoom-out-old { from { opacity: 1; transform: scale(1); } to   { opacity: 0; transform: scale(0.92); } }
      @keyframes vt-zoom-in-new  { from { opacity: 0; transform: scale(1.08); } to { opacity: 1; transform: scale(1); } }
      @keyframes vt-zoom-in-old  { from { opacity: 1; transform: scale(1); } to   { opacity: 0; transform: scale(1.08); } }
      @keyframes vt-zoom-out-new { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
      @keyframes vt-fade-old { from { opacity: 1; } to { opacity: 0; } }
      @keyframes vt-fade-new { from { opacity: 0; } to { opacity: 1; } }
    }

    /* ── View visibility ─────────────────────────────────
       Only one main view section is visible at a time. Topbar flips body[data-view].
       Default body markup has data-view="month". */
    #week-view, #year-view, #map-view, #date-night { display: none; }

    body[data-view="week"] #week-view  { display: block; }
    body[data-view="year"] #year-view  { display: block; }
    body[data-view="dn"]   #date-night { display: block; }
    body[data-view="map"]  #map-view   { display: block; }

    /* Hide the calendar grid in non-month views. */
    body[data-view="week"] #calendar,
    body[data-view="year"] #calendar,
    body[data-view="dn"]   #calendar,
    body[data-view="map"]  #calendar { display: none; }

    /* Picks (My Usuals) only makes sense in Month view. */
    body:not([data-view="month"]) .picks { display: none; }

    /* Filters apply to Month / Week / Year (event filtering).
       Hide the dropdowns in Date Night and Map where they don't apply,
       but keep the topbar (view toggles stay visible). */
    body[data-view="dn"]  .topbar .dropdown,
    body[data-view="map"] .topbar .dropdown { display: none; }

    #map-view { position: relative; }
    #map {
      width: 100%;
      height: calc(100vh - var(--filter-h, 56px) - 48px /* tabs */ - 1px);
      min-height: 420px;
      background: #f5f5f3;
    }
    .leaflet-container { font-family: inherit; }
    /* Tweak Leaflet popup chrome to match the monochrome look */
    .leaflet-popup-content-wrapper {
      border-radius: 4px;
      border: 1px solid var(--rule);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }
    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }
    .leaflet-popup-tip { background: var(--paper); border: 1px solid var(--rule); }
    .pop-title { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    .pop-title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; }
    .pop-title a:hover { border-bottom-color: var(--ink); }
    .pop-meta {
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 6px;
    }
    .pop-note { font-size: 12.5px; line-height: 1.4; margin: 4px 0 8px; max-width: 32ch; }
    .pop-open {
      display: inline-block;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 1px;
      color: var(--ink);
      text-decoration: none;
    }
    .pop-open:hover { opacity: 0.6; }

    .map-status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 500;
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      pointer-events: none;
      max-width: calc(100% - 24px);
    }
    .map-status.is-loading::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border: 1.5px solid var(--ink);
      border-right-color: transparent;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: -1px;
      animation: spin 600ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #date-night {
      padding: clamp(24px, 4vw, 48px) var(--pad-x) clamp(40px, 6vw, 80px);
    }
    .dn-day-picker {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: clamp(20px, 3vw, 32px);
    }
    .dn-day-picker::-webkit-scrollbar { display: none; }
    .dn-day-chip {
      appearance: none;
      background: none;
      border: 1px solid var(--softer);
      padding: 10px 14px 8px;
      font: inherit;
      cursor: pointer;
      text-align: left;
      min-width: 76px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }
    .dn-day-chip .dow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0;
      display: block;
    }
    .dn-day-chip .num {
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
      font-variant-numeric: lining-nums;
    }
    .dn-day-chip:hover { border-color: var(--ink); }
    .dn-day-chip.is-active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .dn-day-chip.is-active .dow { color: var(--paper); opacity: 0.7; }

    .dn-hero {
      border-top: 1px solid var(--rule);
      padding-top: clamp(20px, 3vw, 32px);
      display: grid;

    .dn-hero-weather .note {

    .dn-plan-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;

      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;

      align-items: center;

    .dn-plan { list-style: none; padding: 0; margin: 0; }
    .dn-move {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: clamp(16px, 2.5vw, 40px);
      padding: clamp(16px, 2.5vw, 24px) 0;

      display: inline-block;
      margin-top: 6px;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--ink);
      border-top: 1px solid var(--softer);
      padding-top: 6px;
    }
    .dn-move-title {
      font-size: clamp(20px, 2.4vw, 26px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.012em;
    }
    .dn-move-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .dn-move-title a:hover { border-bottom-color: var(--ink); }
    .dn-move-meta {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .dn-move-blurb {
      font-size: 14.5px;
      line-height: 1.5;
      margin-top: 8px;
      max-width: 60ch;
    }

    .dn-empty {
      font-size: 14px;
      color: var(--soft);
      padding: 24px 0;
    }

    /* ── Floating action cluster (bottom-right) ──────────
       Date Night + Map icons. The old "Today" floating button is gone —
       Today now lives as a tab in the always-visible topbar. */
    .float-actions {
      position: fixed;
      right: clamp(18px, 3vw, 40px);
      bottom: clamp(18px, 3vw, 40px);
      z-index: 40;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }
    .float-btn {
      appearance: none;
      background: var(--ink);
      color: var(--paper);
      border: 0;
      padding: 0;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      transition: transform 120ms ease, background 120ms ease, color 120ms ease, box-shadow 120ms ease;
    }
    .float-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }
    .float-btn:focus-visible { outline: 2.5px solid var(--ink); outline-offset: 3px; }
    .float-btn.is-active {
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12), inset 0 0 0 2px var(--ink);
    }
    .float-btn-label {
      position: absolute;
      width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    /* Hide DN button when DN view is open, Map button when Map view is open — no point pointing to where you already are. */
    body[data-view="dn"]  #action-dn  { display: none; }
    body[data-view="map"] #action-map { display: none; }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 720px) {
      :root {
        --pad-x: clamp(16px, 5vw, 24px);
        --filter-h: 44px;
      }
      .masthead .meta-right { align-items: flex-start; }
      .meta-links { gap: 14px; }
      .meta-link, .meta-links { font-size: 10px; letter-spacing: 0.14em; }
      .meta-caption { font-size: 10px; }


      #year-view { padding: 16px var(--pad-x) 40px; }
      .year-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding-bottom: 14px;
        margin-bottom: 18px;
      }
      .year-headline { font-size: clamp(72px, 26vw, 140px); }
      .year-sub { padding-bottom: 0; font-size: 11px; }
      .year-grid { grid-template-columns: 1fr; gap: 22px; }
      .year-month-name { font-size: 28px; }
      .year-day { font-size: 11px; }

      .dropdown-btn { margin-right: 14px; padding: 13px 0 11px; font-size: 10px; letter-spacing: 0.12em; }

      .masthead {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 24px var(--pad-x) 24px;
      }
      .masthead .meta-right { text-align: left; }
      .masthead .title {
        font-size: clamp(24px, 7vw, 32px);
        margin-top: 16px;
      }

      .month-sentinel { margin-top: 24px; }
      .month-title {
        font-size: clamp(72px, 22vw, 128px);
        font-weight: 700;
        padding: 0 0 16px;
      }
      .month-title.is-stuck {
        font-size: 17px;
        padding: 11px 0;
      }

      .day {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 18px 0;
      }
      .dow { margin-bottom: 6px; font-size: 10px; gap: 5px; }
      .numeral {
        font-size: clamp(72px, 22vw, 124px);
        font-weight: 800;
        letter-spacing: -0.055em;
        line-height: 0.9;
      }
      .day-content { padding-top: 4px; }

      .weather {
        flex-wrap: wrap;
        font-size: 10px;
        gap: 8px 12px;
        padding-bottom: 8px;
        margin-bottom: 14px;
      }
      .weather-right { width: 100%; }

      /* Three explicit columns: icon | time | body. Without the auto column
         for time, time absorbs the 1fr and body collapses to min-content,
         which turns titles and notes into one-word-per-line walls. */
      .event { grid-template-columns: 44px auto minmax(0, 1fr); gap: 12px; padding: 12px 0; }
      .event-time { font-size: 10px; padding-top: 4px; }
      .event-title { font-size: 18px; font-weight: 700; line-height: 1.2; }
      .event.is-secondary .event-title { font-size: 14.5px; font-weight: 600; }
      .event.is-secondary .event-note  { font-size: 12.5px; }
      .event.is-secondary { padding: 7px 0; }
      .event-meta { font-size: 10px; }
      .event-note { font-size: 13.5px; max-width: none; }
      .event-cat { display: none; }
      .more { font-size: 13px; }

      .float-actions { right: 14px; bottom: 14px; gap: 8px; }
      .float-btn { width: 42px; height: 42px; }

      :root { --topbar-h: 44px; }
      .topbar { padding: 0 var(--pad-x); }
      .topbar-group + .topbar-group { margin-left: 14px; padding-left: 14px; }
      /* On mobile: replace the 4-button tab row with the View dropdown so
         the topbar (Categories · Where · View) fits a 375px iPhone. */
      .topbar [role="tablist"] { display: none; }
      .view-mobile-only { display: flex; }
      .tab { font-size: 10px; padding: 13px 0 11px; margin-right: 14px; letter-spacing: 0.12em; }
      .topbar-group .tab:last-child { margin-right: 0; }

      /* Week view stacks vertically on phones — 7 columns is unreadable. */
      .week-grid {
        grid-template-columns: 1fr;
      }
      .week-col {
        min-height: 0;
        padding: 14px var(--pad-x) 18px;
      }
      .week-num { font-size: 44px; }

      #map { height: calc(100vh - var(--filter-h, 48px) - 44px - 1px); min-height: 360px; }
      .map-status { font-size: 10px; padding: 6px 10px; bottom: 8px; left: 8px; }
      .leaflet-popup-content { font-size: 12.5px; margin: 10px 12px; }
      .chip-action::before { width: 6px; height: 6px; margin-right: 6px; }
      .chip.weather::after { width: 6px; height: 6px; margin-left: 6px; }
      .dropdown-btn { gap: 6px; }
      .dropdown-btn .dropdown-value { font-size: 10px; }
      .dropdown-btn::after { font-size: 8px; }
      .dropdown-panel { padding: 12px 14px; min-width: 200px; }

      #date-night { padding: 20px var(--pad-x) 40px; }
      .dn-day-chip { min-width: 64px; padding: 8px 12px 6px; }
      .dn-day-chip .num { font-size: 18px; }
      .dn-hero {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }
      .dn-hero-date { font-size: clamp(56px, 17vw, 88px); }
      .dn-hero-date small { font-size: 10px; }
      .dn-plan-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .dn-move {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 16px 0;
      }
      .dn-move-band { padding-top: 0; }
      .dn-move-band .flag { border-top: 0; padding-top: 0; margin-top: 4px; display: inline; margin-left: 8px; }
      .dn-move-title { font-size: 19px; font-weight: 700; }
      .dn-move-blurb { font-size: 13.5px; }

      /* Sheet slides up from bottom on phones */
      .sheet {
        width: 100%;
        max-width: 100%;
        max-height: 88vh;
        margin: 0;
        margin-top: auto;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
      }
      .sheet-header { padding: 18px 20px 12px; }
      .sheet-body { padding: 14px 20px 20px; }
      .sheet-foot { padding: 10px 20px 14px; }
      .sheet-title { font-size: 19px; }
      .meta-btn .meta-cta { font-size: 10px; margin-top: 4px; }
    }

    /* ── Print ──────────────────────────────────────────── */
    @media print {
      .topbar, .float-actions { display: none; }
      .month-title { position: static; }
      .month { break-before: page; }
      .day { break-inside: avoid; }
    }
  </style>
</head>

    function normalizeName(s) {
      return String(s || '').toLowerCase().trim()
        .replace(/[’`]/g, "'")
        .replace(/\s+/g, ' ');
    }
    function eventCoords(ev) {
      const v = normalizeName(ev.venue);
      if (v && VENUE_COORDS[v]) return VENUE_COORDS[v];
      // Looser match: try contains
      if (v) {
        for (const key in VENUE_COORDS) {
          if (key && (v.includes(key) || key.includes(v))) return VENUE_COORDS[key];
        }
      }
      const h = normalizeName(ev.neighborhood);
      if (h && HOOD_COORDS[h]) return HOOD_COORDS[h];
      return null;
    }

    const pad = (n) => String(n).padStart(2, '0');
    const isoDate = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
    const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
    const dowIndex = (y, m, d) => (new Date(y, m, d).getDay() + 6) % 7;

    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const period = h >= 12 ? 'pm' : 'am';
      const hh = h % 12 === 0 ? 12 : h % 12;
      return m ? `${hh}:${pad(m)}${period}` : `${hh}${period}`;
    }

    // ── Slug helpers ───────────────────────────────────
    function slugify(s) {
      return String(s || '')
        .toLowerCase()
        .normalize('NFKD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function deriveNeighborhoods() {
      const counts = new Map();
      const displayName = new Map();
      for (const day of Object.values(state.feed.days || {})) {
        for (const ev of day.events || []) {
          const name = (ev.neighborhood || '').trim();
          if (!name) continue;
          const slug = slugify(name);
          counts.set(slug, (counts.get(slug) || 0) + 1);
          if (!displayName.has(slug)) displayName.set(slug, name);
        }
      }
      const sorted = [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .map(([slug]) => ({ slug, name: displayName.get(slug) }));
      state.hoodSlugToName = new Map(sorted.map((h) => [h.slug, h.name]));
      return sorted;
    }

        panel.appendChild(label);
      });
      document.getElementById('cat-dropdown-clear').addEventListener('click', clearCategories);

      // Neighborhoods live in their own dropdown panel, mirroring categories.
      const hoods = deriveNeighborhoods();
      const hoodBtn = document.getElementById('hood-dropdown-btn');
      const hoodPanel = document.getElementById('hood-dropdown-panel');
      hoodPanel.innerHTML = '';
      if (!hoods.length) {
        hoodBtn.hidden = true;
      } else {
        hoodBtn.hidden = false;
        const hoodHead = document.createElement('div');
        hoodHead.className = 'dp-head';
        hoodHead.innerHTML = `
          <span class="dp-title">Where</span>
          <button type="button" class="dp-clear" id="hood-dropdown-clear">Clear</button>
        `;
        hoodPanel.appendChild(hoodHead);
        hoods.forEach(({ slug, name }) => {
          const label = document.createElement('label');
          label.innerHTML = `<input type="checkbox" data-hood="${escapeHtml(slug)}"><span>${escapeHtml(name)}</span>`;
          label.querySelector('input').addEventListener('change', () => toggleHood(slug));
          hoodPanel.appendChild(label);
        });
        document.getElementById('hood-dropdown-clear').addEventListener('click', clearHoods);
      }
      // Drop any active hoods that no longer exist in the feed
      for (const slug of [...state.activeHoods]) {
        if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
      }
      updateCategoryChips();
      updateHoodChips();
      updateFilterHeight();
    }

      writeHash();

    function updateCategoryChips() {
      // Update checkboxes inside the dropdown.
      document.querySelectorAll('#cat-dropdown-panel input[data-cat]').forEach((cb) => {
        cb.checked = state.activeCats.has(cb.dataset.cat);
      });
      // Update the button label so the active selection is visible without opening the panel.
      const valueEl = document.getElementById('cat-dropdown-value');
      const clear = document.getElementById('cat-dropdown-clear');
      const cats = [...state.activeCats];
      if (!cats.length) {
        valueEl.textContent = 'All';
      } else if (cats.length <= 2) {
        valueEl.textContent = cats.join(', ');
      } else {
        valueEl.textContent = `${cats.length} selected`;
      }
      if (clear) clear.disabled = cats.length === 0;
    }

    function clearHoods() {
      state.activeHoods.clear();
      updateHoodChips();
      writeHash();
      renderCurrent();
    }

    function updateHoodChips() {
      // Update checkboxes inside the dropdown
      document.querySelectorAll('#hood-dropdown-panel input[data-hood]').forEach((cb) => {
        cb.checked = state.activeHoods.has(cb.dataset.hood);
      });
      // Update the button label
      const valueEl = document.getElementById('hood-dropdown-value');
      const clear = document.getElementById('hood-dropdown-clear');
      if (!valueEl) return;
      const hoods = [...state.activeHoods]
        .map((slug) => state.hoodSlugToName.get(slug))
        .filter(Boolean);
      if (!hoods.length) {
        valueEl.textContent = 'All';
      } else if (hoods.length <= 2) {
        valueEl.textContent = hoods.join(', ');
      } else {
        valueEl.textContent = `${hoods.length} selected`;
      }
      if (clear) clear.disabled = hoods.length === 0;
    }

    function toggleWeather() {
      state.showWeather = !state.showWeather;
      document.body.classList.toggle('hide-weather', !state.showWeather);

        btn.setAttribute('aria-pressed', state.showWeather ? 'true' : 'false');
        btn.classList.toggle('is-active', state.showWeather);

      if (state.view === 'week') renderWeekView();
      writeHash();
    }

    // Dropdown open/close ──────────────────────────────
    function positionCatDropdown() {
      const btn = document.getElementById('cat-dropdown-btn');
      const panel = document.getElementById('cat-dropdown-panel');
      if (!btn || panel.hidden) return;
      const r = btn.getBoundingClientRect();
      const panelW = panel.offsetWidth || 220;
      let left = r.left;
      if (left + panelW > window.innerWidth - 8) {
        left = Math.max(8, window.innerWidth - panelW - 8);
      }
      panel.style.top = `${Math.round(r.bottom + 6)}px`;
      panel.style.left = `${Math.round(left)}px`;
    }
    function openCatDropdown() {
      const btn = document.getElementById('cat-dropdown-btn');
      const panel = document.getElementById('cat-dropdown-panel');
      panel.hidden = false;
      btn.setAttribute('aria-expanded', 'true');
      positionCatDropdown();
      document.addEventListener('mousedown', onDocCloseDropdown, true);
      document.addEventListener('keydown', onEscDropdown);
      window.addEventListener('resize', positionCatDropdown);
      window.addEventListener('scroll', positionCatDropdown, true);
    }
    function closeCatDropdown() {
      const btn = document.getElementById('cat-dropdown-btn');
      const panel = document.getElementById('cat-dropdown-panel');
      panel.hidden = true;
      btn.setAttribute('aria-expanded', 'false');
      document.removeEventListener('mousedown', onDocCloseDropdown, true);
      document.removeEventListener('keydown', onEscDropdown);
      window.removeEventListener('resize', positionCatDropdown);
      window.removeEventListener('scroll', positionCatDropdown, true);
    }
    function onDocCloseDropdown(e) {
      const panel = document.getElementById('cat-dropdown-panel');
      const btn = document.getElementById('cat-dropdown-btn');
      if (panel.contains(e.target) || btn.contains(e.target)) return;
      closeCatDropdown();
    }

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — NYC</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --rule: #000;
      --soft: rgba(0, 0, 0, 0.4);
      --softer: rgba(0, 0, 0, 0.2);
      --softest: rgba(0, 0, 0, 0.08);
      --pad-x: clamp(20px, 4vw, 80px);
      --filter-row-h: 56px;
      --filter-h: 56px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-feature-settings: 'cv11', 'ss03';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @supports (font-variation-settings: normal) {
      body { font-family: 'InterVariable', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    }

    /* ── Masthead ───────────────────────────────────────── */
    .masthead {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      font-size: 12px;
      letter-spacing: 0.01em;
      line-height: 1.4;
      padding: clamp(28px, 4vw, 56px) var(--pad-x) clamp(24px, 4vw, 48px);
    }
    .masthead .meta-right { text-align: right; }
    .masthead .meta-label { display: block; }

    .meta-btn {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: inherit;
      cursor: pointer;
      display: block;
    }
    .meta-btn .meta-label { display: block; }
    .meta-btn .meta-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 600;
      margin-top: 6px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
    }
    .meta-btn .meta-cta::after {
      content: '↗';
      font-weight: 400;
      letter-spacing: 0;
    }
    .meta-btn:hover .meta-cta { opacity: 0.6; }
    .meta-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }

    /* ── Sources sheet (dialog) ─────────────────────────── */
    .sheet {
      padding: 0;
      border: 1px solid var(--rule);
      background: var(--paper);
      color: var(--ink);
      width: min(560px, calc(100vw - 32px));
      max-height: min(80vh, 720px);
      overflow: hidden;
      margin: auto;
    }
    .sheet::backdrop { background: rgba(0, 0, 0, 0.5); }
    .sheet:not([open]) { display: none; }
    .sheet-inner { display: flex; flex-direction: column; max-height: inherit; }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding: 22px 26px 14px;
      border-bottom: 1px solid var(--rule);
    }
    .sheet-titles { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .sheet-title {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1;
    }
    .sheet-sub {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .sheet-close {
      appearance: none;
      background: none;
      border: 0;
      padding: 4px 8px;
      margin: -4px -6px 0 0;
      font: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      color: var(--soft);
    }
    .sheet-close:hover { color: var(--ink); }
    .sheet-body { padding: 16px 26px 24px; overflow: auto; }
    .sheet-section + .sheet-section { margin-top: 22px; }
    .sheet-section h3 {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0 0 10px;
      font-weight: 500;
    }
    .source-row {
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 16px;
      row-gap: 2px;
      padding: 10px 0;
      border-top: 1px solid var(--softest);
    }
    .source-row:first-child { border-top: 0; padding-top: 4px; }
    .source-name { font-size: 14px; font-weight: 500; }
    .source-count {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      align-self: center;
    }
    .source-row.has-error .source-count { color: #b00020; font-weight: 600; }
    .source-row.is-empty .source-count { color: var(--softer); }
    .source-row .source-err {
      grid-column: 1 / -1;
      font-size: 11px;
      color: #b00020;
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      margin-top: 4px;
      word-break: break-word;
    }
    .sheet-summary {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sheet-summary .ok  { color: var(--ink); font-weight: 600; }
    .sheet-summary .bad { color: #b00020; font-weight: 600; }
    .sheet-summary .muted { color: var(--soft); }
    .source-url {
      grid-column: 1 / -1;
      font-size: 11px;
      color: var(--soft);
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      word-break: break-all;
      text-decoration: none;
    }
    .source-url:hover { color: var(--ink); }
    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      font-size: 13px;
    }
    .kv dt { color: var(--soft); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; align-self: center; }
    .kv dd { margin: 0; font-variant-numeric: tabular-nums; }
    .kv dd a { color: inherit; }
    .sheet-foot {
      padding: 12px 26px 18px;
      border-top: 1px solid var(--softest);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .sheet-foot a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--softer); }
    .sheet-foot a:hover { color: var(--ink); border-bottom-color: var(--ink); }
    .masthead .title {
      grid-column: 1 / -1;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-top: clamp(20px, 3vw, 36px);
    }

    /* ── Mode tabs (above filters) ─────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 var(--pad-x);
      border-top: 1px solid var(--rule);
      background: var(--paper);
    }
    .tab {
      appearance: none;
      background: none;
      border: 0;
      padding: 14px 0;
      margin-right: 28px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .tab:hover { color: var(--ink); }
    .tab.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }

    /* ── Filter bar (sticky) ───────────────────────────── */
    .filters {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .filter-row {
      height: var(--filter-row-h);
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vw, 24px);
      padding: 0 var(--pad-x);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      white-space: nowrap;
    }
    .filter-row + .filter-row { border-top: 1px solid var(--softest); }
    .filter-row[hidden] { display: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-group {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.5vw, 22px);
    }
    .filter-group-end {
      margin-left: auto;
      padding-left: clamp(16px, 2vw, 32px);
      border-left: 1px solid var(--softer);
    }
    .filter-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--softer);
      padding-right: 2px;
    }

    /* Categories dropdown (button stays in the scroll lane, panel is fixed-positioned) */
    .dropdown { position: relative; }
    .dropdown-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown-btn::after {
      content: '▾';
      font-size: 9px;
      color: var(--soft);
      transition: transform 120ms ease;
    }
    .dropdown-btn[aria-expanded="true"]::after { transform: rotate(180deg); }
    .dropdown-btn .dropdown-value {
      color: var(--ink);
      font-weight: 600;
      letter-spacing: 0.12em;
    }
    .dropdown-btn .dropdown-label { color: var(--soft); }
    .dropdown-btn:hover .dropdown-label { color: var(--ink); }

    .dropdown-panel {
      position: fixed;
      z-index: 60;
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 14px 18px 16px;
      min-width: 220px;
      max-width: calc(100vw - 24px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dropdown-panel[hidden] { display: none; }
    .dropdown-panel .dp-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 8px;
    }
    .dropdown-panel .dp-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .dropdown-panel .dp-clear {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      font: inherit;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
    }
    .dropdown-panel .dp-clear:hover { color: var(--ink); }
    .dropdown-panel .dp-clear[disabled] { opacity: 0.3; cursor: default; }
    .dropdown-panel label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      font-size: 14px;
      cursor: pointer;
      text-transform: capitalize;
    }
    .dropdown-panel label:hover { color: var(--ink); }
    .dropdown-panel input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--ink);
      background: var(--paper);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
    }
    .dropdown-panel input[type="checkbox"]:checked {
      background: var(--ink);
    }
    .dropdown-panel input[type="checkbox"]:checked::after {
      content: '';
      width: 8px;
      height: 4px;
      border-left: 1.5px solid var(--paper);
      border-bottom: 1.5px solid var(--paper);
      transform: rotate(-45deg) translateY(-1px);
    }

    /* Always-visible action chip (Sources). Visually matches the active weather chip
       so the two right-side chips line up. */
    .chip-action {
      color: var(--ink);
      font-weight: 600;
      border-bottom: 1.5px solid var(--ink);
    }
    .chip-action::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--ink);
      margin-right: 6px;
      vertical-align: 1px;
    }
    .chip-action:hover { opacity: 0.7; }
    .chip {
      appearance: none;
      background: none;
      border: 0;
      padding: 6px 0;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .chip:hover { color: var(--ink); }
    .chip.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }
    .chip.weather::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: 1px;
      background: var(--softer);
      transition: background 120ms ease;
    }
    .chip.weather.is-active::after { background: var(--ink); }

    /* ── Month section ──────────────────────────────────── */
    .month {
      padding: 0 var(--pad-x);
    }
    .month-sentinel { display: block; height: 1px; margin-top: clamp(28px, 4vw, 56px); }
    .month-title {
      position: sticky;
      top: var(--filter-h);
      z-index: 20;
      background: var(--paper);
      font-size: clamp(72px, 13vw, 200px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      margin: 0;
      padding: 0 0 clamp(20px, 3vw, 36px);
      border-bottom: 1px solid var(--rule);
      transition:
        font-size 220ms ease,
        padding 220ms ease,
        letter-spacing 220ms ease,
        font-weight 220ms ease,
        line-height 220ms ease;
      will-change: font-size, padding;
    }
    /* Collapses to a slim sticky label once you scroll into the month. */
    .month-title.is-stuck {
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.2;
      padding: 14px 0 12px;
    }

    /* ── Day row ────────────────────────────────────────── */
    .day {
      display: grid;
      grid-template-columns: minmax(180px, 22%) minmax(0, 1fr);
      gap: clamp(20px, 3vw, 56px);
      padding: clamp(18px, 2.5vw, 32px) 0;
      border-bottom: 1px solid var(--rule);
      align-items: start;
    }
    .day.is-today .numeral { font-weight: 900; }
    .day.is-today .dow .active {
      background: var(--ink);
      color: var(--paper);
      padding: 0 3px;
    }

    .day-marker {
      align-self: start;
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: left;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .day-marker:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
    .numeral { display: inline-block; }
    .day.is-linked .numeral {
      background: var(--ink);
      color: var(--paper);
      padding: 0 6px;
      margin-left: -6px;
    }
    .day-marker:hover .numeral { color: var(--softer); }
    .day.is-linked .day-marker:hover .numeral { color: var(--paper); opacity: 0.85; }
    .dow {
      display: flex;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      font-weight: 400;
      margin-bottom: clamp(10px, 1.2vw, 18px);
      text-transform: uppercase;
    }
    .dow span {
      color: var(--softer);
      width: 1ch;
      text-align: center;
    }
    .dow span.active {
      color: var(--ink);
      font-weight: 600;
    }
    .numeral {
      font-size: clamp(108px, 16vw, 240px);
      font-weight: 800;
      line-height: 0.86;
      letter-spacing: -0.065em;
      font-variant-numeric: lining-nums;
    }

    .day-content {
      padding-top: 6px;
      min-width: 0;
    }

    /* ── Weather row ────────────────────────────────────── */
    .weather {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--rule);
    }
    .weather-left { display: flex; gap: 16px; flex-wrap: wrap; }
    .weather-temp { font-feature-settings: 'tnum'; }
    .weather-mood { color: var(--soft); }
    .weather-right { color: var(--soft); }
    body.hide-weather .weather { display: none; }

    /* ── Events list ────────────────────────────────────── */
    .events {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .event {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 18px;
      padding: 12px 0;
      align-items: baseline;
    }
    .event + .event { border-top: 1px solid var(--softest); }
    .event-time {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-feature-settings: 'tnum';
      color: var(--soft);
      padding-top: 3px;
    }
    .event-body { min-width: 0; }
    .event-title {
      font-size: clamp(20px, 1.6vw, 26px);
      font-weight: 700;
      line-height: 1.22;
      letter-spacing: -0.012em;
    }
    .event-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease;
    }
    .event-title a:hover { border-bottom-color: var(--ink); }
    .event-meta {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .event-note {
      font-size: 13.5px;
      line-height: 1.5;
      margin-top: 6px;
      max-width: 68ch;
    }
    .event-cat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      padding-top: 4px;
      text-align: right;
    }

    /* ── Show more ──────────────────────────────────────── */
    .day .event.is-hidden { display: none; }
    .day.is-expanded .event.is-hidden { display: grid; }
    .more {
      appearance: none;
      background: none;
      border: 0;
      padding: 18px 0 6px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 4px;
      margin-top: 12px;
      line-height: 1;
    }
    .more::after {
      content: '↓';
      font-weight: 400;
      transition: transform 160ms ease;
    }
    .day.is-expanded .more::after { transform: rotate(180deg); }
    .more:hover { opacity: 0.55; }

    /* ── Hover preview (image follows cursor on event titles) ── */
    .title-preview {
      position: fixed;
      z-index: 90;
      pointer-events: none;
      left: -9999px;
      top: -9999px;
      width: 320px;
      height: 200px;
      background: var(--softest);
      border: 1px solid var(--rule);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 140ms ease, transform 160ms ease;
      will-change: left, top, opacity, transform;
    }
    .title-preview.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .title-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0%) saturate(0.95);
    }
    /* Surface a caption with the venue, kept subtle. */
    .title-preview .cap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 8px 12px 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%);
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .event-title[data-image],
    .dn-move-title[data-image] { cursor: help; }
    /* Disable preview on touch / coarse pointer devices. */
    @media (hover: none), (pointer: coarse) {
      .title-preview { display: none !important; }
      .event-title[data-image],
      .dn-move-title[data-image] { cursor: auto; }
    }

    /* ── Empty day ──────────────────────────────────────── */
    .day.is-empty .weather { display: none; }
    .day.is-empty .day-content::before {
      content: '—';
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--softer);
      text-transform: uppercase;
      padding-top: 8px;
    }

    /* ── Date Night view ───────────────────────────────── */
    body[data-view="dn"] #calendar { display: none; }
    body[data-view="calendar"] #date-night { display: none; }
    body[data-view="dn"] .today-btn { display: none; }
    /* The category/hood/weather chips don't apply to the planner. */
    body[data-view="dn"] .filters { display: none; }

    /* ── Map view ──────────────────────────────────────── */
    body[data-view="map"] #calendar,
    body[data-view="map"] #date-night,
    body[data-view="map"] .today-btn { display: none; }
    body:not([data-view="map"]) #map-view { display: none; }

    #map-view { position: relative; }
    #map {
      width: 100%;
      height: calc(100vh - var(--filter-h, 56px) - 48px /* tabs */ - 1px);
      min-height: 420px;
      background: #f5f5f3;
    }
    .leaflet-container { font-family: inherit; }
    /* Tweak Leaflet popup chrome to match the monochrome look */
    .leaflet-popup-content-wrapper {
      border-radius: 4px;
      border: 1px solid var(--rule);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }
    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }
    .leaflet-popup-tip { background: var(--paper); border: 1px solid var(--rule); }
    .pop-title { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    .pop-title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; }
    .pop-title a:hover { border-bottom-color: var(--ink); }
    .pop-meta {
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 6px;
    }
    .pop-note { font-size: 12.5px; line-height: 1.4; margin: 4px 0 8px; max-width: 32ch; }
    .pop-open {
      display: inline-block;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 1px;
      color: var(--ink);
      text-decoration: none;
    }
    .pop-open:hover { opacity: 0.6; }

    .map-status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 500;
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      pointer-events: none;
      max-width: calc(100% - 24px);
    }
    .map-status.is-loading::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border: 1.5px solid var(--ink);
      border-right-color: transparent;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: -1px;
      animation: spin 600ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #date-night {
      padding: clamp(24px, 4vw, 48px) var(--pad-x) clamp(40px, 6vw, 80px);
    }
    .dn-day-picker {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: clamp(20px, 3vw, 32px);
    }
    .dn-day-picker::-webkit-scrollbar { display: none; }
    .dn-day-chip {
      appearance: none;
      background: none;
      border: 1px solid var(--softer);
      padding: 10px 14px 8px;
      font: inherit;
      cursor: pointer;
      text-align: left;
      min-width: 76px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }
    .dn-day-chip .dow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0;
      display: block;
    }
    .dn-day-chip .num {
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
      font-variant-numeric: lining-nums;
    }
    .dn-day-chip:hover { border-color: var(--ink); }
    .dn-day-chip.is-active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .dn-day-chip.is-active .dow { color: var(--paper); opacity: 0.7; }

    .dn-hero {
      border-top: 1px solid var(--rule);
      padding-top: clamp(20px, 3vw, 32px);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: clamp(24px, 4vw, 56px);
      align-items: end;
      margin-bottom: clamp(32px, 4vw, 56px);
    }
    .dn-hero-date {
      font-size: clamp(64px, 10vw, 140px);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 0.9;
      font-variant-numeric: lining-nums;
    }
    .dn-hero-date small {
      display: block;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 400;
      margin-bottom: 10px;
    }
    .dn-hero-weather {
      padding-bottom: 8px;
    }
    .dn-hero-weather .row {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: baseline;
    }
    .dn-hero-weather .row strong {
      color: var(--ink);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .dn-hero-weather .note {
      font-size: 14px;
      line-height: 1.4;
      margin-top: 10px;
      color: var(--ink);
      max-width: 48ch;
    }

    .dn-plan-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px solid var(--rule);
      padding-top: clamp(20px, 3vw, 32px);
      margin-bottom: clamp(16px, 2vw, 24px);
    }
    .dn-plan-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .dn-shuffle {
      appearance: none;
      background: none;
      border: 1px solid var(--ink);
      padding: 9px 14px 8px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dn-shuffle:hover { background: var(--ink); color: var(--paper); }
    .dn-shuffle::after { content: '↻'; font-weight: 400; }

    .dn-plan { list-style: none; padding: 0; margin: 0; }
    .dn-move {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: clamp(16px, 2.5vw, 40px);
      padding: clamp(16px, 2.5vw, 24px) 0;
      border-bottom: 1px solid var(--softest);
      align-items: start;
    }
    .dn-move:last-child { border-bottom: 0; }
    .dn-move-band {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      padding-top: 6px;
    }
    .dn-move-band .flag {
      display: inline-block;
      margin-top: 6px;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--ink);
      border-top: 1px solid var(--softer);
      padding-top: 6px;
    }
    .dn-move-title {
      font-size: clamp(20px, 2.4vw, 26px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.012em;
    }
    .dn-move-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .dn-move-title a:hover { border-bottom-color: var(--ink); }
    .dn-move-meta {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .dn-move-blurb {
      font-size: 14.5px;
      line-height: 1.5;
      margin-top: 8px;
      max-width: 60ch;
    }

    .dn-empty {
      font-size: 14px;
      color: var(--soft);
      padding: 24px 0;
    }

    /* ── Floating today button ──────────────────────────── */
    .today-btn {
      position: fixed;
      right: clamp(20px, 4vw, 56px);
      bottom: clamp(20px, 3vw, 40px);
      z-index: 40;
      background: var(--ink);
      color: var(--paper);
      border: 0;
      padding: 14px 22px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .today-btn.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .today-btn::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      margin-right: 8px;
      background: var(--paper);
      vertical-align: 1px;
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 720px) {
      :root {
        --pad-x: clamp(16px, 5vw, 24px);
        --filter-row-h: 48px;
        --filter-h: 48px;
      }
      /* Filters: on mobile the weather chip flows inline in the same lane
         (auto-margin + overflow scroll pushed it off-screen). */
      .filter-group-end {
        margin-left: 0;
        padding-left: clamp(12px, 3vw, 18px);
        border-left: 1px solid var(--softer);
      }
      .chip { font-size: 10px; letter-spacing: 0.12em; }
      .filter-label { font-size: 9px; }

      .masthead {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 24px var(--pad-x) 24px;
      }
      .masthead .meta-right { text-align: left; }
      .masthead .title {
        font-size: clamp(24px, 7vw, 32px);
        margin-top: 16px;
      }

      .month-sentinel { margin-top: 24px; }
      .month-title {
        font-size: clamp(72px, 22vw, 128px);
        font-weight: 700;
        padding: 0 0 16px;
      }
      .month-title.is-stuck {
        font-size: 17px;
        padding: 11px 0;
      }

      .day {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 18px 0;
      }
      .dow { margin-bottom: 6px; font-size: 10px; gap: 5px; }
      .numeral {
        font-size: clamp(72px, 22vw, 124px);
        font-weight: 800;
        letter-spacing: -0.055em;
        line-height: 0.9;
      }
      .day-content { padding-top: 4px; }

      .weather {
        flex-wrap: wrap;
        font-size: 10px;
        gap: 8px 12px;
        padding-bottom: 8px;
        margin-bottom: 14px;
      }
      .weather-right { width: 100%; }

      .event { grid-template-columns: 44px 1fr; gap: 12px; padding: 12px 0; }
      .event-time { font-size: 10px; padding-top: 4px; }
      .event-title { font-size: 18px; font-weight: 700; line-height: 1.2; }
      .event-meta { font-size: 10px; }
      .event-note { font-size: 13.5px; max-width: none; }
      .event-cat { display: none; }
      .more { font-size: 13px; }

      .today-btn {
        padding: 11px 16px;
        font-size: 10px;
        letter-spacing: 0.14em;
        right: 16px;
        bottom: 16px;
      }

      .tab { font-size: 10px; padding: 12px 0; margin-right: 20px; }

      #map { height: calc(100vh - var(--filter-h, 48px) - 44px - 1px); min-height: 360px; }
      .map-status { font-size: 10px; padding: 6px 10px; bottom: 8px; left: 8px; }
      .leaflet-popup-content { font-size: 12.5px; margin: 10px 12px; }
      .chip-action::before { width: 6px; height: 6px; margin-right: 6px; }
      .chip.weather::after { width: 6px; height: 6px; margin-left: 6px; }
      .dropdown-btn { gap: 6px; }
      .dropdown-btn .dropdown-value { font-size: 10px; }
      .dropdown-btn::after { font-size: 8px; }
      .dropdown-panel { padding: 12px 14px; min-width: 200px; }

      #date-night { padding: 20px var(--pad-x) 40px; }
      .dn-day-chip { min-width: 64px; padding: 8px 12px 6px; }
      .dn-day-chip .num { font-size: 18px; }
      .dn-hero {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }
      .dn-hero-date { font-size: clamp(56px, 17vw, 88px); }
      .dn-hero-date small { font-size: 10px; }
      .dn-plan-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .dn-move {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 16px 0;
      }
      .dn-move-band { padding-top: 0; }
      .dn-move-band .flag { border-top: 0; padding-top: 0; margin-top: 4px; display: inline; margin-left: 8px; }
      .dn-move-title { font-size: 19px; font-weight: 700; }
      .dn-move-blurb { font-size: 13.5px; }

      /* Sheet slides up from bottom on phones */
      .sheet {
        width: 100%;
        max-width: 100%;
        max-height: 88vh;
        margin: 0;
        margin-top: auto;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
      }
      .sheet-header { padding: 18px 20px 12px; }
      .sheet-body { padding: 14px 20px 20px; }
      .sheet-foot { padding: 10px 20px 14px; }
      .sheet-title { font-size: 19px; }
      .meta-btn .meta-cta { font-size: 10px; margin-top: 4px; }
    }

    /* ── Print ──────────────────────────────────────────── */
    @media print {
      .filters, .today-btn { display: none; }
      .month-title { position: static; }
      .month { break-before: page; }
      .day { break-inside: avoid; }
    }
  </style>
</head>
<body data-view="calendar">

  <script>

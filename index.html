<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — NYC</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --rule: #000;
      --soft: rgba(0, 0, 0, 0.4);
      --softer: rgba(0, 0, 0, 0.2);
      --softest: rgba(0, 0, 0, 0.08);
      --pad-x: clamp(20px, 4vw, 80px);
      --filter-row-h: 56px;
      --filter-h: 56px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-feature-settings: 'cv11', 'ss03';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @supports (font-variation-settings: normal) {
      body { font-family: 'InterVariable', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    }

    /* ── Masthead ───────────────────────────────────────── */
    .masthead {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      font-size: 12px;
      letter-spacing: 0.01em;
      line-height: 1.4;
      padding: clamp(28px, 4vw, 56px) var(--pad-x) clamp(24px, 4vw, 48px);
    }
    .masthead .meta-right { text-align: right; }
    .masthead .meta-label { display: block; }

    .meta-btn {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: inherit;
      cursor: pointer;
      display: block;
    }
    .meta-btn .meta-label { display: block; }
    .meta-btn .meta-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 600;
      margin-top: 6px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
    }
    .meta-btn .meta-cta::after {
      content: '↗';
      font-weight: 400;
      letter-spacing: 0;
    }
    .meta-btn:hover .meta-cta { opacity: 0.6; }
    .meta-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }

    /* ── Sources sheet (dialog) ─────────────────────────── */
    .sheet {
      padding: 0;
      border: 1px solid var(--rule);
      background: var(--paper);
      color: var(--ink);
      width: min(560px, calc(100vw - 32px));
      max-height: min(80vh, 720px);
      overflow: hidden;
      margin: auto;
    }
    .sheet::backdrop { background: rgba(0, 0, 0, 0.5); }
    .sheet:not([open]) { display: none; }
    .sheet-inner { display: flex; flex-direction: column; max-height: inherit; }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding: 22px 26px 14px;
      border-bottom: 1px solid var(--rule);
    }
    .sheet-titles { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .sheet-title {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1;
    }
    .sheet-sub {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .sheet-close {
      appearance: none;
      background: none;
      border: 0;
      padding: 4px 8px;
      margin: -4px -6px 0 0;
      font: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      color: var(--soft);
    }
    .sheet-close:hover { color: var(--ink); }
    .sheet-body { padding: 16px 26px 24px; overflow: auto; }
    .sheet-section + .sheet-section { margin-top: 22px; }
    .sheet-section h3 {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0 0 10px;
      font-weight: 500;
    }
    .source-row {
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 16px;
      row-gap: 2px;
      padding: 10px 0;
      border-top: 1px solid var(--softest);
    }
    .source-row:first-child { border-top: 0; padding-top: 4px; }
    .source-name { font-size: 14px; font-weight: 500; }
    .source-count {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      align-self: center;
    }
    .source-row.has-error .source-count { color: #b00020; }
    .source-url {
      grid-column: 1 / -1;
      font-size: 11px;
      color: var(--soft);
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      word-break: break-all;
      text-decoration: none;
    }
    .source-url:hover { color: var(--ink); }
    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      font-size: 13px;
    }
    .kv dt { color: var(--soft); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; align-self: center; }
    .kv dd { margin: 0; font-variant-numeric: tabular-nums; }
    .kv dd a { color: inherit; }
    .sheet-foot {
      padding: 12px 26px 18px;
      border-top: 1px solid var(--softest);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .sheet-foot a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--softer); }
    .sheet-foot a:hover { color: var(--ink); border-bottom-color: var(--ink); }
    .masthead .title {
      grid-column: 1 / -1;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-top: clamp(20px, 3vw, 36px);
    }

    /* ── Filter bar (sticky) ───────────────────────────── */
    .filters {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .filter-row {
      height: var(--filter-row-h);
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vw, 24px);
      padding: 0 var(--pad-x);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      white-space: nowrap;
    }
    .filter-row + .filter-row { border-top: 1px solid var(--softest); }
    .filter-row[hidden] { display: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-group {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.5vw, 22px);
    }
    .filter-group-end {
      margin-left: auto;
      padding-left: clamp(16px, 2vw, 32px);
      border-left: 1px solid var(--softer);
    }
    .filter-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--softer);
      padding-right: 2px;
    }
    .chip {
      appearance: none;
      background: none;
      border: 0;
      padding: 6px 0;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .chip:hover { color: var(--ink); }
    .chip.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }
    .chip.weather::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: 1px;
      background: var(--softer);
      transition: background 120ms ease;
    }
    .chip.weather.is-active::after { background: var(--ink); }

    /* ── Month section ──────────────────────────────────── */
    .month {
      padding: 0 var(--pad-x);
    }
    .month-title {
      position: sticky;
      top: var(--filter-h);
      z-index: 20;
      background: var(--paper);
      font-size: clamp(56px, 11vw, 180px);
      font-weight: 500;
      line-height: 1.02;
      letter-spacing: -0.045em;
      margin: 0;
      padding: clamp(28px, 4vw, 56px) 0 clamp(20px, 3vw, 36px);
      border-bottom: 1px solid var(--rule);
    }

    /* ── Day row ────────────────────────────────────────── */
    .day {
      display: grid;
      grid-template-columns: minmax(180px, 22%) minmax(0, 1fr);
      gap: clamp(20px, 3vw, 56px);
      padding: clamp(18px, 2.5vw, 32px) 0;
      border-bottom: 1px solid var(--rule);
      align-items: start;
    }
    .day.is-today .numeral { font-weight: 700; }
    .day.is-today .dow .active {
      background: var(--ink);
      color: var(--paper);
      padding: 0 3px;
    }

    .day-marker {
      align-self: start;
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: left;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .day-marker:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
    .numeral { display: inline-block; }
    .day.is-linked .numeral {
      background: var(--ink);
      color: var(--paper);
      padding: 0 6px;
      margin-left: -6px;
    }
    .day-marker:hover .numeral { color: var(--softer); }
    .day.is-linked .day-marker:hover .numeral { color: var(--paper); opacity: 0.85; }
    .dow {
      display: flex;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      font-weight: 400;
      margin-bottom: clamp(10px, 1.2vw, 18px);
      text-transform: uppercase;
    }
    .dow span {
      color: var(--softer);
      width: 1ch;
      text-align: center;
    }
    .dow span.active {
      color: var(--ink);
      font-weight: 600;
    }
    .numeral {
      font-size: clamp(72px, 11vw, 160px);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: -0.055em;
      font-variant-numeric: lining-nums;
    }

    .day-content {
      padding-top: 6px;
      min-width: 0;
    }

    /* ── Weather row ────────────────────────────────────── */
    .weather {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--rule);
    }
    .weather-left { display: flex; gap: 16px; flex-wrap: wrap; }
    .weather-temp { font-feature-settings: 'tnum'; }
    .weather-mood { color: var(--soft); }
    .weather-right { color: var(--soft); }
    body.hide-weather .weather { display: none; }

    /* ── Events list ────────────────────────────────────── */
    .events {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .event {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 18px;
      padding: 12px 0;
      align-items: baseline;
    }
    .event + .event { border-top: 1px solid var(--softest); }
    .event-time {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-feature-settings: 'tnum';
      color: var(--soft);
      padding-top: 3px;
    }
    .event-body { min-width: 0; }
    .event-title {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.3;
      letter-spacing: -0.005em;
    }
    .event-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease;
    }
    .event-title a:hover { border-bottom-color: var(--ink); }
    .event-meta {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .event-note {
      font-size: 13.5px;
      line-height: 1.5;
      margin-top: 6px;
      max-width: 68ch;
    }
    .event-cat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      padding-top: 4px;
      text-align: right;
    }

    /* ── Show more ──────────────────────────────────────── */
    .day .event.is-hidden { display: none; }
    .day.is-expanded .event.is-hidden { display: grid; }
    .more {
      appearance: none;
      background: none;
      border: 0;
      padding: 14px 0 4px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .more::before {
      content: '+';
      font-size: 14px;
      line-height: 1;
    }
    .more:hover { color: var(--ink); }
    .day.is-expanded .more::before { content: '–'; }

    /* ── Empty day ──────────────────────────────────────── */
    .day.is-empty .weather { display: none; }
    .day.is-empty .day-content::before {
      content: '—';
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--softer);
      text-transform: uppercase;
      padding-top: 8px;
    }

    /* ── Floating today button ──────────────────────────── */
    .today-btn {
      position: fixed;
      right: clamp(20px, 4vw, 56px);
      bottom: clamp(20px, 3vw, 40px);
      z-index: 40;
      background: var(--ink);
      color: var(--paper);
      border: 0;
      padding: 14px 22px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .today-btn.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .today-btn::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      margin-right: 8px;
      background: var(--paper);
      vertical-align: 1px;
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 720px) {
      :root {
        --pad-x: clamp(16px, 5vw, 24px);
        --filter-row-h: 48px;
        --filter-h: 48px;
      }
      /* Filters: on mobile the weather chip flows inline in the same lane
         (auto-margin + overflow scroll pushed it off-screen). */
      .filter-group-end {
        margin-left: 0;
        padding-left: clamp(12px, 3vw, 18px);
        border-left: 1px solid var(--softer);
      }
      .chip { font-size: 10px; letter-spacing: 0.12em; }
      .filter-label { font-size: 9px; }

      .masthead {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 24px var(--pad-x) 24px;
      }
      .masthead .meta-right { text-align: left; }
      .masthead .title {
        font-size: clamp(24px, 7vw, 32px);
        margin-top: 16px;
      }

      .month-title {
        font-size: clamp(56px, 18vw, 96px);
        padding: 24px 0 16px;
      }

      .day {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 18px 0;
      }
      .dow { margin-bottom: 6px; font-size: 10px; gap: 5px; }
      .numeral {
        font-size: clamp(52px, 16vw, 80px);
        letter-spacing: -0.045em;
        line-height: 1;
      }
      .day-content { padding-top: 4px; }

      .weather {
        flex-wrap: wrap;
        font-size: 10px;
        gap: 8px 12px;
        padding-bottom: 8px;
        margin-bottom: 14px;
      }
      .weather-right { width: 100%; }

      .event { grid-template-columns: 44px 1fr; gap: 12px; padding: 10px 0; }
      .event-time { font-size: 10px; padding-top: 2px; }
      .event-title { font-size: 15px; }
      .event-meta { font-size: 10px; }
      .event-note { font-size: 13px; max-width: none; }
      .event-cat { display: none; }

      .today-btn {
        padding: 11px 16px;
        font-size: 10px;
        letter-spacing: 0.14em;
        right: 16px;
        bottom: 16px;
      }

      /* Sheet slides up from bottom on phones */
      .sheet {
        width: 100%;
        max-width: 100%;
        max-height: 88vh;
        margin: 0;
        margin-top: auto;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
      }
      .sheet-header { padding: 18px 20px 12px; }
      .sheet-body { padding: 14px 20px 20px; }
      .sheet-foot { padding: 10px 20px 14px; }
      .sheet-title { font-size: 19px; }
      .meta-btn .meta-cta { font-size: 10px; margin-top: 4px; }
    }

    /* ── Print ──────────────────────────────────────────── */
    @media print {
      .filters, .today-btn { display: none; }
      .month-title { position: static; }
      .month { break-before: page; }
      .day { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header class="masthead">
    <div class="meta-left">
      <span class="meta-label">What's on</span>
      <span class="meta-label">Brooklyn / NYC</span>
    </div>
    <div class="meta-right">
      <button class="meta-btn" id="sources-open" type="button" aria-haspopup="dialog" aria-controls="sources-sheet">
        <span class="meta-label" id="meta-edition">Edition 01</span>
        <span class="meta-label" id="meta-date">—</span>
        <span class="meta-cta">Sources</span>
      </button>
    </div>
    <h1 class="title">2026 / A year in nights.</h1>
  </header>

  <nav class="filters" id="filters" role="toolbar" aria-label="Filters">
    <div class="filter-row">
      <div class="filter-group" id="filter-cats" data-group="categories"></div>
      <div class="filter-group filter-group-end">
        <button class="chip weather is-active" data-toggle="weather" aria-pressed="true">Weather</button>
      </div>
    </div>
    <div class="filter-row" id="filter-row-hoods" hidden>
      <div class="filter-group">
        <span class="filter-label">Where</span>
      </div>
      <div class="filter-group" id="filter-hoods" data-group="neighborhoods"></div>
    </div>
  </nav>

  <main id="calendar"></main>

  <button class="today-btn" id="today-btn" type="button" aria-label="Scroll to today">Today</button>

  <dialog class="sheet" id="sources-sheet" aria-labelledby="sources-sheet-title">
    <div class="sheet-inner">
      <header class="sheet-header">
        <div class="sheet-titles">
          <h2 class="sheet-title" id="sources-sheet-title">Sources</h2>
          <span class="sheet-sub" id="sources-sheet-sub">—</span>
        </div>
        <button class="sheet-close" id="sources-close" type="button" aria-label="Close">×</button>
      </header>
      <div class="sheet-body" id="sources-body"></div>
      <footer class="sheet-foot">
        <a href="https://github.com/joonasvir/cal" target="_blank" rel="noopener">Repo</a>
        <a href="https://github.com/joonasvir/cal/blob/main/taste.md" target="_blank" rel="noopener">Taste profile</a>
      </footer>
    </div>
  </dialog>

  <script>
    const MONTHS = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];
    const DOW = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    const CATEGORIES = ['music', 'comedy', 'art', 'food', 'talk', 'nightlife'];
    const TOP_N = 3;

    const pad = (n) => String(n).padStart(2, '0');
    const isoDate = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
    const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
    const dowIndex = (y, m, d) => (new Date(y, m, d).getDay() + 6) % 7;

    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const period = h >= 12 ? 'pm' : 'am';
      const hh = h % 12 === 0 ? 12 : h % 12;
      return m ? `${hh}:${pad(m)}${period}` : `${hh}${period}`;
    }

    // ── State ──────────────────────────────────────────
    const state = {
      feed: { edition: '01', year: new Date().getFullYear(), generated_at: '', days: {} },
      activeCats: new Set(), // empty = all
      activeHoods: new Set(), // empty = all; stores slugs
      showWeather: true,
      expandedDates: new Set(),
      todayKey: null,
      linkedDate: null, // YYYY-MM-DD when set via URL/click
      hoodSlugToName: new Map(),
    };

    // ── Slug helpers ───────────────────────────────────
    function slugify(s) {
      return String(s || '')
        .toLowerCase()
        .normalize('NFKD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function deriveNeighborhoods() {
      const counts = new Map();
      const displayName = new Map();
      for (const day of Object.values(state.feed.days || {})) {
        for (const ev of day.events || []) {
          const name = (ev.neighborhood || '').trim();
          if (!name) continue;
          const slug = slugify(name);
          counts.set(slug, (counts.get(slug) || 0) + 1);
          if (!displayName.has(slug)) displayName.set(slug, name);
        }
      }
      const sorted = [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .map(([slug]) => ({ slug, name: displayName.get(slug) }));
      state.hoodSlugToName = new Map(sorted.map((h) => [h.slug, h.name]));
      return sorted;
    }

    // ── Filter bar ─────────────────────────────────────
    function renderFilters() {
      const catsWrap = document.getElementById('filter-cats');
      catsWrap.innerHTML = '';
      CATEGORIES.forEach((cat) => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = cat;
        btn.dataset.cat = cat;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => toggleCategory(cat));
        catsWrap.appendChild(btn);
      });
      document.querySelector('.chip.weather').addEventListener('click', toggleWeather);

      const hoods = deriveNeighborhoods();
      const hoodsRow = document.getElementById('filter-row-hoods');
      const hoodsWrap = document.getElementById('filter-hoods');
      hoodsWrap.innerHTML = '';
      if (!hoods.length) {
        hoodsRow.hidden = true;
      } else {
        hoodsRow.hidden = false;
        hoods.forEach(({ slug, name }) => {
          const btn = document.createElement('button');
          btn.className = 'chip';
          btn.textContent = name;
          btn.dataset.hood = slug;
          btn.setAttribute('aria-pressed', 'false');
          btn.addEventListener('click', () => toggleHood(slug));
          hoodsWrap.appendChild(btn);
        });
      }
      // Drop any active hoods that no longer exist in the feed
      for (const slug of [...state.activeHoods]) {
        if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
      }
      updateCategoryChips();
      updateHoodChips();
      updateFilterHeight();
    }

    function toggleCategory(cat) {
      if (state.activeCats.has(cat)) state.activeCats.delete(cat);
      else state.activeCats.add(cat);
      updateCategoryChips();
      writeHash();
      renderCalendar();
    }

    function toggleHood(slug) {
      if (state.activeHoods.has(slug)) state.activeHoods.delete(slug);
      else state.activeHoods.add(slug);
      updateHoodChips();
      writeHash();
      renderCalendar();
    }

    function updateCategoryChips() {
      document.querySelectorAll('.chip[data-cat]').forEach((btn) => {
        const on = state.activeCats.has(btn.dataset.cat);
        btn.classList.toggle('is-active', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
    }

    function updateHoodChips() {
      document.querySelectorAll('.chip[data-hood]').forEach((btn) => {
        const on = state.activeHoods.has(btn.dataset.hood);
        btn.classList.toggle('is-active', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
    }

    function toggleWeather() {
      state.showWeather = !state.showWeather;
      document.body.classList.toggle('hide-weather', !state.showWeather);
      const btn = document.querySelector('.chip.weather');
      btn.classList.toggle('is-active', state.showWeather);
      btn.setAttribute('aria-pressed', state.showWeather ? 'true' : 'false');
      writeHash();
    }

    function updateFilterHeight() {
      const fb = document.getElementById('filters');
      if (!fb) return;
      const h = fb.offsetHeight;
      if (h) document.documentElement.style.setProperty('--filter-h', `${h}px`);
    }

    // ── Render ─────────────────────────────────────────
    function filterEvents(events) {
      if (!state.activeCats.size && !state.activeHoods.size) return events;
      return events.filter((e) => {
        if (state.activeCats.size && !state.activeCats.has(e.category)) return false;
        if (state.activeHoods.size && !state.activeHoods.has(slugify(e.neighborhood))) return false;
        return true;
      });
    }

    function renderDay(y, m, d) {
      const key = isoDate(y, m, d);
      const dow = dowIndex(y, m, d);
      const payload = state.feed.days[key];
      const allEvents = payload?.events ?? [];
      const events = filterEvents(allEvents);
      const weather = payload?.weather;
      const isToday = key === state.todayKey;
      const isEmpty = !events.length && !weather;
      const isExpanded = state.expandedDates.has(key);

      const isLinked = key === state.linkedDate;
      const day = document.createElement('article');
      day.className = `day${isEmpty ? ' is-empty' : ''}${isToday ? ' is-today' : ''}${isExpanded ? ' is-expanded' : ''}${isLinked ? ' is-linked' : ''}`;
      day.dataset.date = key;

      const marker = document.createElement('button');
      marker.type = 'button';
      marker.className = 'day-marker';
      marker.setAttribute('aria-label', `Share link for ${key}`);
      marker.addEventListener('click', () => setLinkedDate(key));
      const dowEl = document.createElement('div');
      dowEl.className = 'dow';
      DOW.forEach((letter, i) => {
        const s = document.createElement('span');
        s.textContent = letter;
        if (i === dow) s.classList.add('active');
        dowEl.appendChild(s);
      });
      const numEl = document.createElement('div');
      numEl.className = 'numeral';
      numEl.textContent = pad(d);
      marker.appendChild(dowEl);
      marker.appendChild(numEl);

      const content = document.createElement('div');
      content.className = 'day-content';

      if (weather) {
        const w = document.createElement('div');
        w.className = 'weather';
        const left = document.createElement('div');
        left.className = 'weather-left';
        const hi = weather.high ?? weather.high_f;
        const lo = weather.low ?? weather.low_f;
        left.innerHTML = `
          <span class="weather-temp">${hi}° / ${lo}°</span>
          <span class="weather-mood">${weather.condition}</span>
        `;
        const right = document.createElement('div');
        right.className = 'weather-right';
        right.textContent = weather.note || `${weather.precip_chance}% precip`;
        w.appendChild(left);
        w.appendChild(right);
        content.appendChild(w);
      }

      if (events.length) {
        const list = document.createElement('ul');
        list.className = 'events';
        events.forEach((ev, i) => {
          const li = document.createElement('li');
          li.className = `event${i >= TOP_N ? ' is-hidden' : ''}`;
          li.innerHTML = `
            <div class="event-time">${fmtTime(ev.time)}</div>
            <div class="event-body">
              <div class="event-title">${ev.url
                ? `<a href="${ev.url}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
                : escapeHtml(ev.title)}</div>
              ${ev.venue || ev.neighborhood
                ? `<div class="event-meta">${[ev.venue, ev.neighborhood].filter(Boolean).map(escapeHtml).join(' · ')}</div>`
                : ''}
              ${ev.note ? `<div class="event-note">${escapeHtml(ev.note)}</div>` : ''}
            </div>
            <div class="event-cat">${ev.category || ''}</div>
          `;
          list.appendChild(li);
        });
        content.appendChild(list);

        if (events.length > TOP_N) {
          const more = document.createElement('button');
          more.className = 'more';
          more.type = 'button';
          const hiddenCount = events.length - TOP_N;
          more.textContent = isExpanded ? 'Show less' : `${hiddenCount} more`;
          more.addEventListener('click', () => {
            if (state.expandedDates.has(key)) state.expandedDates.delete(key);
            else state.expandedDates.add(key);
            renderCalendar();
          });
          content.appendChild(more);
        }
      }

      day.appendChild(marker);
      day.appendChild(content);
      return day;
    }

    function renderCalendar() {
      const root = document.getElementById('calendar');
      const scrollY = window.scrollY;
      root.innerHTML = '';
      const year = state.feed.year || new Date().getFullYear();
      for (let m = 0; m < 12; m++) {
        const section = document.createElement('section');
        section.className = 'month';
        section.id = `month-${pad(m + 1)}`;
        const h2 = document.createElement('h2');
        h2.className = 'month-title';
        h2.textContent = MONTHS[m];
        section.appendChild(h2);
        for (let d = 1; d <= daysInMonth(year, m); d++) {
          section.appendChild(renderDay(year, m, d));
        }
        root.appendChild(section);
      }
      observeToday();
      // Preserve scroll across re-render (filter changes)
      window.scrollTo({ top: scrollY, behavior: 'instant' });
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ── Today: observer + button ───────────────────────
    let todayObserver = null;
    function observeToday() {
      if (todayObserver) todayObserver.disconnect();
      const todayEl = document.querySelector(`[data-date="${state.todayKey}"]`);
      const btn = document.getElementById('today-btn');
      if (!todayEl) {
        btn.classList.remove('is-visible');
        return;
      }
      todayObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            btn.classList.toggle('is-visible', !e.isIntersecting);
          });
        },
        { rootMargin: `-${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--filter-h')) || 56}px 0px -20% 0px` }
      );
      todayObserver.observe(todayEl);
    }

    function scrollToToday() {
      scrollToDate(state.todayKey, 'smooth');
    }

    function scrollToDate(key, behavior = 'smooth') {
      const el = document.querySelector(`[data-date="${key}"]`);
      if (!el) return;
      const filterH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--filter-h')) || 56;
      const top = el.getBoundingClientRect().top + window.scrollY - filterH - 12;
      window.scrollTo({ top, behavior });
    }

    function setLinkedDate(key) {
      const next = state.linkedDate === key ? null : key;
      state.linkedDate = next;
      if (next) state.expandedDates.add(next);
      writeHash();
      renderCalendar();
      if (next) requestAnimationFrame(() => scrollToDate(next, 'smooth'));
    }

    // ── URL hash sync ──────────────────────────────────
    let suppressHash = false;
    function parseHash() {
      const h = location.hash.replace(/^#/, '');
      if (!h) return {};
      const params = new URLSearchParams(h);
      const out = {};
      if (params.has('c')) out.cats = params.get('c').split(',').filter(Boolean);
      if (params.has('n')) out.hoods = params.get('n').split(',').filter(Boolean);
      if (params.has('w')) out.weather = params.get('w') !== '0';
      if (params.has('d')) out.date = params.get('d');
      return out;
    }

    function writeHash() {
      if (suppressHash) return;
      const params = new URLSearchParams();
      if (state.activeCats.size) params.set('c', [...state.activeCats].join(','));
      if (state.activeHoods.size) params.set('n', [...state.activeHoods].join(','));
      if (!state.showWeather) params.set('w', '0');
      if (state.linkedDate) params.set('d', state.linkedDate);
      const str = params.toString();
      const target = str ? `#${str}` : '';
      const current = location.hash || '';
      if (current === target) return;
      const url = `${location.pathname}${location.search}${target}`;
      history.replaceState(null, '', url || location.pathname);
    }

    function applyHashState() {
      const h = parseHash();
      if (h.cats) state.activeCats = new Set(h.cats.filter((c) => CATEGORIES.includes(c)));
      if (h.hoods) state.activeHoods = new Set(h.hoods);
      if (typeof h.weather === 'boolean') {
        state.showWeather = h.weather;
        document.body.classList.toggle('hide-weather', !state.showWeather);
        const wbtn = document.querySelector('.chip.weather');
        if (wbtn) {
          wbtn.classList.toggle('is-active', state.showWeather);
          wbtn.setAttribute('aria-pressed', state.showWeather ? 'true' : 'false');
        }
      }
      if (h.date && /^\d{4}-\d{2}-\d{2}$/.test(h.date)) {
        state.linkedDate = h.date;
        state.expandedDates.add(h.date);
      }
    }

    // ── Sources sheet ──────────────────────────────────
    function renderSourcesSheet() {
      const meta = state.feed.meta || {};
      const sub = document.getElementById('sources-sheet-sub');
      const gen = state.feed.generated_at || '';
      const genShort = gen.slice(0, 10) || '—';
      sub.textContent = `Edition ${state.feed.edition || '01'} · ${genShort}`;

      const body = document.getElementById('sources-body');
      const sources = meta.sources || [];
      const weather = meta.weather || {};
      const ranker = meta.ranker || {};
      const stats = meta.stats || {};

      const sourcesHtml = sources.length
        ? sources.map((s) => {
            const cls = s.error ? ' has-error' : '';
            const count = s.error ? 'failed' : `${s.kept ?? 0} items`;
            return `
              <div class="source-row${cls}">
                <div class="source-name">${escapeHtml(s.name)}</div>
                <div class="source-count">${escapeHtml(count)}</div>
                <a class="source-url" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.url)}</a>
              </div>
            `;
          }).join('')
        : '<p class="sheet-sub" style="text-transform:none; letter-spacing:0;">No source data in this build yet.</p>';

      const weatherHtml = `
        <dl class="kv">
          <dt>Provider</dt><dd>${weather.url
            ? `<a href="${escapeHtml(weather.url)}" target="_blank" rel="noopener">${escapeHtml(weather.provider || 'Open-Meteo')}</a>`
            : escapeHtml(weather.provider || 'Open-Meteo')}</dd>
          <dt>Location</dt><dd>${escapeHtml(weather.location || 'Brooklyn, NYC')}</dd>
          <dt>Unit</dt><dd>${escapeHtml(weather.unit || 'C')}</dd>
          <dt>Days</dt><dd>${weather.days ?? '—'}</dd>
        </dl>
      `;

      const rankerHtml = `
        <dl class="kv">
          <dt>Model</dt><dd>${escapeHtml(ranker.model || 'claude-opus-4-7')}</dd>
          <dt>Provider</dt><dd>${escapeHtml(ranker.provider || 'Anthropic')}</dd>
          <dt>Days ranked</dt><dd>${ranker.ranked_days ?? '—'}</dd>
        </dl>
      `;

      const statsHtml = `
        <dl class="kv">
          <dt>Items pulled</dt><dd>${stats.items_pulled ?? '—'}</dd>
          <dt>Events curated</dt><dd>${stats.events_curated ?? '—'}</dd>
          <dt>Days covered</dt><dd>${stats.days_covered ?? '—'}</dd>
          <dt>Generated</dt><dd>${escapeHtml(gen || '—')}</dd>
        </dl>
      `;

      body.innerHTML = `
        <section class="sheet-section">
          <h3>Feeds</h3>
          ${sourcesHtml}
        </section>
        <section class="sheet-section">
          <h3>Weather</h3>
          ${weatherHtml}
        </section>
        <section class="sheet-section">
          <h3>Ranker</h3>
          ${rankerHtml}
        </section>
        <section class="sheet-section">
          <h3>This edition</h3>
          ${statsHtml}
        </section>
      `;
    }

    function openSourcesSheet() {
      renderSourcesSheet();
      const dlg = document.getElementById('sources-sheet');
      if (typeof dlg.showModal === 'function') dlg.showModal();
      else dlg.setAttribute('open', '');
    }

    function closeSourcesSheet() {
      const dlg = document.getElementById('sources-sheet');
      if (typeof dlg.close === 'function') dlg.close();
      else dlg.removeAttribute('open');
    }

    // ── Init ───────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('feed.json', { cache: 'no-store' });
        if (res.ok) state.feed = await res.json();
      } catch (_) { /* empty year is fine */ }

      const today = new Date();
      state.todayKey = isoDate(today.getFullYear(), today.getMonth(), today.getDate());
      // Today expanded by default
      state.expandedDates.add(state.todayKey);

      document.getElementById('meta-edition').textContent = `Edition ${state.feed.edition || '01'}`;
      document.getElementById('meta-date').textContent = state.feed.generated_at || state.todayKey;

      // Filters depend on feed (for neighborhoods), so render after fetch.
      suppressHash = true;
      renderFilters();
      applyHashState();
      // Drop hood slugs that don't exist in the current feed.
      for (const slug of [...state.activeHoods]) {
        if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
      }
      updateCategoryChips();
      updateHoodChips();
      suppressHash = false;

      renderCalendar();

      // Scroll target: linked date from hash, else today.
      const target = state.linkedDate || state.todayKey;
      requestAnimationFrame(() => {
        scrollToDate(target, 'instant');
        setTimeout(() => observeToday(), 50);
      });

      document.getElementById('today-btn').addEventListener('click', scrollToToday);
      document.getElementById('sources-open').addEventListener('click', openSourcesSheet);
      document.getElementById('sources-close').addEventListener('click', closeSourcesSheet);
      const sheet = document.getElementById('sources-sheet');
      // Click outside the sheet content (on the dialog itself / backdrop) closes it.
      sheet.addEventListener('click', (e) => {
        if (e.target === sheet) closeSourcesSheet();
      });
      window.addEventListener('resize', updateFilterHeight, { passive: true });
      window.addEventListener('hashchange', () => {
        suppressHash = true;
        state.activeCats = new Set();
        state.activeHoods = new Set();
        state.showWeather = true;
        state.linkedDate = null;
        document.body.classList.remove('hide-weather');
        applyHashState();
        for (const slug of [...state.activeHoods]) {
          if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
        }
        updateCategoryChips();
        updateHoodChips();
        renderCalendar();
        suppressHash = false;
        if (state.linkedDate) scrollToDate(state.linkedDate, 'smooth');
      });
    }

    init();
  </script>
</body>
</html>

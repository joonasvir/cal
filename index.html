<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — NYC</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --rule: #000;
      --soft: rgba(0, 0, 0, 0.4);
      --softer: rgba(0, 0, 0, 0.2);
      --softest: rgba(0, 0, 0, 0.08);
      --pad-x: clamp(20px, 4vw, 80px);
      --filter-row-h: 56px;
      --filter-h: 56px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-feature-settings: 'cv11', 'ss03';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @supports (font-variation-settings: normal) {
      body { font-family: 'InterVariable', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    }

    /* ── Masthead ───────────────────────────────────────── */
    .masthead {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      font-size: 12px;
      letter-spacing: 0.01em;
      line-height: 1.4;
      padding: clamp(28px, 4vw, 56px) var(--pad-x) clamp(24px, 4vw, 48px);
    }
    .masthead .meta-right {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .masthead .meta-label { display: block; }
    .meta-links {
      display: flex;
      gap: 18px;
      align-items: baseline;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .meta-link {
      appearance: none;
      background: none;
      border: 0;
      padding: 4px 0 6px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      border-bottom: 1.5px solid var(--ink);
      transition: opacity 120ms ease;
    }
    .meta-link:hover { opacity: 0.55; }
    .meta-link[aria-pressed="false"] {
      color: var(--soft);
      border-bottom-color: var(--softer);
      font-weight: 500;
    }
    .meta-link[aria-pressed="false"]:hover { color: var(--ink); border-bottom-color: var(--ink); opacity: 1; }
    .meta-caption {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--soft);
      font-feature-settings: 'tnum';
    }

    .meta-btn {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: inherit;
      cursor: pointer;
      display: block;
    }
    .meta-btn .meta-label { display: block; }
    .meta-btn .meta-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 600;
      margin-top: 6px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
    }
    .meta-btn .meta-cta::after {
      content: '↗';
      font-weight: 400;
      letter-spacing: 0;
    }
    .meta-btn:hover .meta-cta { opacity: 0.6; }
    .meta-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }

    /* ── Sources sheet (dialog) ─────────────────────────── */
    .sheet {
      padding: 0;
      border: 1px solid var(--rule);
      background: var(--paper);
      color: var(--ink);
      width: min(560px, calc(100vw - 32px));
      max-height: min(80vh, 720px);
      overflow: hidden;
      margin: auto;
    }
    .sheet::backdrop { background: rgba(0, 0, 0, 0.5); }
    .sheet:not([open]) { display: none; }
    .sheet-inner { display: flex; flex-direction: column; max-height: inherit; }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding: 22px 26px 14px;
      border-bottom: 1px solid var(--rule);
    }
    .sheet-titles { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .sheet-title {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1;
    }
    .sheet-sub {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .sheet-close {
      appearance: none;
      background: none;
      border: 0;
      padding: 4px 8px;
      margin: -4px -6px 0 0;
      font: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      color: var(--soft);
    }
    .sheet-close:hover { color: var(--ink); }
    .sheet-body { padding: 16px 26px 24px; overflow: auto; }
    .sheet-section + .sheet-section { margin-top: 22px; }
    .sheet-section h3 {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0 0 10px;
      font-weight: 500;
    }
    .source-row {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      column-gap: 14px;
      row-gap: 2px;
      padding: 12px 0;
      border-top: 1px solid var(--softest);
    }
    .source-row:first-child { border-top: 0; padding-top: 4px; }
    .source-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 7px;
      background: var(--softer);
      box-shadow: 0 0 0 2px var(--softest);
    }
    .source-row.is-ok    .source-dot { background: #16a34a; box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.18); }
    .source-row.is-empty .source-dot { background: #d97706; box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.18); }
    .source-row.has-error .source-dot { background: #b00020; box-shadow: 0 0 0 2px rgba(176, 0, 32, 0.18); }
    .source-name { font-size: 14px; font-weight: 500; }
    .source-count {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      align-self: center;
    }
    .source-row.is-ok    .source-count { color: var(--ink); font-weight: 600; }
    .source-row.has-error .source-count { color: #b00020; font-weight: 600; }
    .source-row.is-empty .source-count { color: #d97706; font-weight: 600; }
    .source-fetched {
      grid-column: 2 / -1;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--softer);
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }
    .source-row .source-err {
      grid-column: 2 / -1;
      font-size: 11px;
      color: #b00020;
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      margin-top: 4px;
      word-break: break-word;
    }
    .sheet-summary {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sheet-summary .ok  { color: var(--ink); font-weight: 600; }
    .sheet-summary .bad { color: #b00020; font-weight: 600; }
    .sheet-summary .muted { color: var(--soft); }
    .source-url {
      grid-column: 2 / -1;
      font-size: 11px;
      color: var(--soft);
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      word-break: break-all;
      text-decoration: none;
    }
    .source-url:hover { color: var(--ink); }
    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      font-size: 13px;
    }
    .kv dt { color: var(--soft); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; align-self: center; }
    .kv dd { margin: 0; font-variant-numeric: tabular-nums; }
    .kv dd a { color: inherit; }
    .sheet-foot {
      padding: 12px 26px 18px;
      border-top: 1px solid var(--softest);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .sheet-foot a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--softer); }
    .sheet-foot a:hover { color: var(--ink); border-bottom-color: var(--ink); }
    .masthead .title {
      grid-column: 1 / -1;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-top: clamp(20px, 3vw, 36px);
    }

    /* ── Mode tabs (above filters) ─────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 var(--pad-x);
      border-top: 1px solid var(--rule);
      background: var(--paper);
    }
    .tab {
      appearance: none;
      background: none;
      border: 0;
      padding: 14px 0;
      margin-right: 28px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .tab:hover { color: var(--ink); }
    .tab.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }

    /* ── Filter bar (sticky) ───────────────────────────── */
    .filters {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .filter-row {
      height: var(--filter-row-h);
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vw, 24px);
      padding: 0 var(--pad-x);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      white-space: nowrap;
    }
    .filter-row + .filter-row { border-top: 1px solid var(--softest); }
    .filter-row[hidden] { display: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-group {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.5vw, 22px);
    }
    .filter-group-end {
      margin-left: auto;
      padding-left: clamp(16px, 2vw, 32px);
      border-left: 1px solid var(--softer);
    }
    .filter-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--softer);
      padding-right: 2px;
    }

    /* Categories dropdown (button stays in the scroll lane, panel is fixed-positioned) */
    .dropdown { position: relative; }
    .dropdown-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown-btn::after {
      content: '▾';
      font-size: 9px;
      color: var(--soft);
      transition: transform 120ms ease;
    }
    .dropdown-btn[aria-expanded="true"]::after { transform: rotate(180deg); }
    .dropdown-btn .dropdown-value {
      color: var(--ink);
      font-weight: 600;
      letter-spacing: 0.12em;
    }
    .dropdown-btn .dropdown-label { color: var(--soft); }
    .dropdown-btn:hover .dropdown-label { color: var(--ink); }

    .dropdown-panel {
      position: fixed;
      z-index: 60;
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 14px 18px 16px;
      min-width: 220px;
      max-width: calc(100vw - 24px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.10);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .dropdown-panel[hidden] { display: none; }
    .dropdown-panel .dp-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 8px;
    }
    .dropdown-panel .dp-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .dropdown-panel .dp-clear {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      font: inherit;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
    }
    .dropdown-panel .dp-clear:hover { color: var(--ink); }
    .dropdown-panel .dp-clear[disabled] { opacity: 0.3; cursor: default; }
    .dropdown-panel label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      font-size: 14px;
      cursor: pointer;
      text-transform: capitalize;
    }
    .dropdown-panel label:hover { color: var(--ink); }
    .dropdown-panel input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--ink);
      background: var(--paper);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      flex-shrink: 0;
    }
    .dropdown-panel input[type="checkbox"]:checked {
      background: var(--ink);
    }
    .dropdown-panel input[type="checkbox"]:checked::after {
      content: '';
      width: 8px;
      height: 4px;
      border-left: 1.5px solid var(--paper);
      border-bottom: 1.5px solid var(--paper);
      transform: rotate(-45deg) translateY(-1px);
    }

    /* Always-visible action chip (Sources). Visually matches the active weather chip
       so the two right-side chips line up. */
    .chip-action {
      color: var(--ink);
      font-weight: 600;
      border-bottom: 1.5px solid var(--ink);
    }
    .chip-action::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--ink);
      margin-right: 6px;
      vertical-align: 1px;
    }
    .chip-action:hover { opacity: 0.7; }
    .chip {
      appearance: none;
      background: none;
      border: 0;
      padding: 6px 0;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .chip:hover { color: var(--ink); }
    .chip.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }
    .chip.weather::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: 1px;
      background: var(--softer);
      transition: background 120ms ease;
    }
    .chip.weather.is-active::after { background: var(--ink); }

    /* ── Month section ──────────────────────────────────── */
    .month {
      padding: 0 var(--pad-x);
    }
    .month-sentinel { display: block; height: 1px; margin-top: clamp(28px, 4vw, 56px); }
    .month-title {
      position: sticky;
      top: var(--filter-h);
      z-index: 20;
      background: var(--paper);
      font-size: clamp(72px, 13vw, 200px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      margin: 0;
      padding: 0 0 clamp(20px, 3vw, 36px);
      border-bottom: 1px solid var(--rule);
      transition:
        font-size 220ms ease,
        padding 220ms ease,
        letter-spacing 220ms ease,
        font-weight 220ms ease,
        line-height 220ms ease;
      will-change: font-size, padding;
    }
    /* Collapses to a slim sticky label once you scroll into the month. */
    .month-title.is-stuck {
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.2;
      padding: 14px 0 12px;
    }

    /* ── Day row ────────────────────────────────────────── */
    .day {
      display: grid;
      grid-template-columns: minmax(180px, 22%) minmax(0, 1fr);
      gap: clamp(20px, 3vw, 56px);
      padding: clamp(18px, 2.5vw, 32px) 0;
      border-bottom: 1px solid var(--rule);
      align-items: start;
    }
    .day.is-today .numeral { font-weight: 900; }
    .day.is-today .dow .active {
      background: var(--ink);
      color: var(--paper);
      padding: 0 3px;
    }

    .day-marker {
      align-self: start;
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: left;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .day-marker:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
    .numeral { display: inline-block; }
    .day.is-linked .numeral {
      background: var(--ink);
      color: var(--paper);
      padding: 0 6px;
      margin-left: -6px;
    }
    .day-marker:hover .numeral { color: var(--softer); }
    .day.is-linked .day-marker:hover .numeral { color: var(--paper); opacity: 0.85; }
    .dow {
      display: flex;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      font-weight: 400;
      margin-bottom: clamp(10px, 1.2vw, 18px);
      text-transform: uppercase;
    }
    .dow span {
      color: var(--softer);
      width: 1ch;
      text-align: center;
    }
    .dow span.active {
      color: var(--ink);
      font-weight: 600;
    }
    .numeral {
      font-size: clamp(108px, 16vw, 240px);
      font-weight: 800;
      line-height: 0.86;
      letter-spacing: -0.065em;
      font-variant-numeric: lining-nums;
    }

    .day-content {
      padding-top: 6px;
      min-width: 0;
    }

    /* ── Weather row ────────────────────────────────────── */
    .weather {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--rule);
    }
    .weather-left { display: flex; gap: 16px; flex-wrap: wrap; }
    .weather-temp { font-feature-settings: 'tnum'; }
    .weather-mood { color: var(--soft); }
    .weather-right { color: var(--soft); }
    body.hide-weather .weather { display: none; }

    /* ── Events list ────────────────────────────────────── */
    .events {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .event {
      display: grid;
      grid-template-columns: 44px 64px 1fr auto;
      gap: 16px;
      padding: 14px 0;
      align-items: start;
    }
    .event + .event { border-top: 1px solid var(--softest); }
    .event-icon-wrap {
      width: 36px;
      height: 36px;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .event-icon { width: 20px; height: 20px; }
    .event-time {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-feature-settings: 'tnum';
      color: var(--soft);
      padding-top: 9px;
    }
    .event-body { min-width: 0; }
    .event-title {
      font-size: clamp(20px, 1.6vw, 26px);
      font-weight: 700;
      line-height: 1.22;
      letter-spacing: -0.012em;
    }
    .event-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease;
    }
    .event-title a:hover { border-bottom-color: var(--ink); }
    .event-meta {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .event-note {
      font-size: 13.5px;
      line-height: 1.5;
      margin-top: 6px;
      max-width: 68ch;
    }
    .event-cat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      padding-top: 4px;
      text-align: right;
    }

    /* ── My Usuals (top picks list above the calendar) ──── */
    .picks {
      padding: clamp(28px, 4vw, 56px) var(--pad-x) clamp(28px, 4vw, 56px);
      border-bottom: 3px solid var(--ink);
    }
    body:not([data-view="month"]) .picks { display: none; }
    .picks-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: clamp(16px, 2vw, 24px);
      padding-bottom: clamp(12px, 1.5vw, 18px);
      border-bottom: 2px solid var(--ink);
      flex-wrap: wrap;
    }
    .picks-title {
      font-size: clamp(26px, 3.6vw, 44px);
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0;
      text-transform: uppercase;
      line-height: 0.95;
    }
    .picks-sub {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 700;
    }
    .picks-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .pick-row {
      display: grid;
      grid-template-columns: 44px 120px 1fr auto;
      gap: 18px;
      padding: clamp(14px, 1.8vw, 22px) 0;
      align-items: start;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .pick-row + .pick-row { border-top: 1px solid var(--softest); }
    .pick-row:hover { background: rgba(0, 0, 0, 0.04); }
    .pick-row.is-hidden { display: none; }
    .picks-list.is-expanded .pick-row.is-hidden { display: grid; }
    .pick-icon-wrap {
      width: 36px;
      height: 36px;
      background: var(--ink);
      color: var(--paper);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pick-icon-wrap .event-icon { width: 20px; height: 20px; }
    .pick-when {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 900;
      color: var(--ink);
      padding-top: 9px;
      font-feature-settings: 'tnum';
    }
    .pick-when .pick-when-time {
      display: block;
      font-weight: 700;
      color: var(--soft);
      margin-top: 2px;
    }
    .pick-body { min-width: 0; }
    .pick-title {
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .pick-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: border-color 120ms ease;
    }
    .pick-title a:hover { border-bottom-color: var(--ink); }
    .pick-meta {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 800;
      margin-top: 6px;
    }
    .pick-note {
      font-size: 14px;
      line-height: 1.55;
      max-width: 64ch;
      margin-top: 8px;
    }
    .pick-cat {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 800;
      padding-top: 12px;
      text-align: right;
    }
    .picks-more {
      appearance: none;
      background: none;
      border: 0;
      padding: 18px 0 6px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 4px;
      margin-top: 12px;
      line-height: 1;
    }
    .picks-more::after {
      content: '↓';
      font-weight: 400;
      transition: transform 160ms ease;
    }
    .picks-list.is-expanded ~ .picks-more::after { transform: rotate(180deg); }
    .picks-more:hover { opacity: 0.55; }
    .picks-more[hidden] { display: none; }
    .picks-empty {
      padding: 24px;
      border: 2px dashed var(--softer);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--soft);
    }
    @media (max-width: 720px) {
      .pick-row { grid-template-columns: 36px 90px 1fr; gap: 12px; }
      .pick-cat { display: none; }
      .pick-icon-wrap { width: 30px; height: 30px; }
      .pick-icon-wrap .event-icon { width: 18px; height: 18px; }
    }

    /* Make sticky filter offset land days correctly under scrollIntoView */
    .day { scroll-margin-top: calc(var(--filter-h, 56px) + 12px); }

    /* ── Show more ──────────────────────────────────────── */
    .day .event.is-hidden { display: none; }
    .day.is-expanded .event.is-hidden { display: grid; }
    .more {
      appearance: none;
      background: none;
      border: 0;
      padding: 18px 0 6px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 4px;
      margin-top: 12px;
      line-height: 1;
    }
    .more::after {
      content: '↓';
      font-weight: 400;
      transition: transform 160ms ease;
    }
    .day.is-expanded .more::after { transform: rotate(180deg); }
    .more:hover { opacity: 0.55; }

    /* ── Hover preview (image follows cursor on event titles) ── */
    .title-preview {
      position: fixed;
      z-index: 90;
      pointer-events: none;
      left: -9999px;
      top: -9999px;
      width: 320px;
      height: 200px;
      background: var(--softest);
      border: 1px solid var(--rule);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 140ms ease, transform 160ms ease;
      will-change: left, top, opacity, transform;
    }
    .title-preview.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .title-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0%) saturate(0.95);
    }
    /* Surface a caption with the venue, kept subtle. */
    .title-preview .cap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 8px 12px 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%);
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .event-title[data-image],
    .dn-move-title[data-image] { cursor: help; }
    /* Disable preview on touch / coarse pointer devices. */
    @media (hover: none), (pointer: coarse) {
      .title-preview { display: none !important; }
      .event-title[data-image],
      .dn-move-title[data-image] { cursor: auto; }
    }

    /* ── Empty day ──────────────────────────────────────── */
    .day.is-empty .weather { display: none; }
    .day.is-empty .day-content::before {
      content: '—';
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--softer);
      text-transform: uppercase;
      padding-top: 8px;
    }

    /* ── Today view ──────────────────────────────────────
       One-day focused page. Massive numeral + weather + the day's events,
       no calendar grid clutter. */
    #today-view {
      padding: clamp(24px, 4vw, 56px) var(--pad-x) clamp(48px, 6vw, 96px);
    }
    .today-frame { max-width: 100%; }
    .today-hero {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: clamp(24px, 4vw, 64px);
      align-items: end;
      padding-bottom: clamp(20px, 3vw, 36px);
      border-bottom: 1px solid var(--rule);
    }
    .today-dow {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--soft);
      margin-bottom: clamp(10px, 1.5vw, 18px);
    }
    .today-numeral {
      font-size: clamp(160px, 28vw, 420px);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 0.84;
      font-variant-numeric: lining-nums;
    }
    .today-month {
      font-size: clamp(28px, 4vw, 56px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-top: 8px;
    }
    .today-weather { padding-bottom: 12px; }
    .today-weather .row {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      align-items: baseline;
    }
    .today-weather .row strong {
      color: var(--ink);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .today-weather .note {
      font-size: 15px;
      line-height: 1.4;
      margin-top: 10px;
      max-width: 48ch;
    }
    .today-section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: clamp(28px, 4vw, 56px) 0 clamp(16px, 2vw, 24px);
    }
    .today-section-head h2 {
      font-size: clamp(20px, 2.8vw, 28px);
      font-weight: 700;
      letter-spacing: -0.012em;
      margin: 0;
    }
    .today-section-head .count {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      font-variant-numeric: tabular-nums;
    }
    .today-events {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .today-event {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 24px;
      padding: clamp(18px, 2.5vw, 28px) 0;
      border-bottom: 1px solid var(--softest);
      align-items: baseline;
    }
    .today-event-time {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
    }
    .today-event-title {
      font-size: clamp(22px, 2vw, 30px);
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.015em;
    }
    .today-event-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .today-event-title a:hover { border-bottom-color: var(--ink); }
    .today-event-meta {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 6px;
    }
    .today-event-note {
      font-size: 15px;
      line-height: 1.5;
      margin-top: 10px;
      max-width: 60ch;
    }
    .today-event-cat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .today-empty {
      font-size: 14px;
      color: var(--soft);
      padding: 32px 0;
    }

    /* ── Year view (brutalist poster) ─────────────────────
       12 month tiles, tight day grids, days with events filled black.
       Click any day → snap to Month view at that date. */
    #year-view {
      padding: clamp(24px, 4vw, 56px) var(--pad-x) clamp(48px, 6vw, 96px);
    }
    .year-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: clamp(20px, 3vw, 36px);
      border-bottom: 3px solid var(--ink);
      margin-bottom: clamp(28px, 4vw, 56px);
      gap: 16px;
      flex-wrap: wrap;
    }
    .year-headline {
      font-size: clamp(96px, 18vw, 280px);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 0.84;
      font-variant-numeric: lining-nums;
    }
    .year-sub {
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      padding-bottom: 12px;
    }
    .year-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(28px, 3vw, 56px);
    }
    .year-month {
      border-top: 2px solid var(--ink);
      padding-top: 10px;
      cursor: default;
    }
    .year-month-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .year-month-name {
      font-size: clamp(28px, 3.4vw, 48px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1;
      text-transform: uppercase;
    }
    .year-month-count {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      font-variant-numeric: tabular-nums;
    }
    .year-month-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--softer);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .year-month-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .year-day {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      cursor: pointer;
      border: 0;
      background: transparent;
      appearance: none;
      padding: 0;
      font-family: inherit;
      transition: background 80ms ease, color 80ms ease;
    }
    .year-day:hover {
      background: var(--softest);
      color: var(--ink);
    }
    .year-day.has-event {
      background: var(--ink);
      color: var(--paper);
    }
    .year-day.has-event:hover { opacity: 0.85; }
    .year-day.is-today {
      outline: 2.5px solid var(--ink);
      outline-offset: -2.5px;
      color: var(--ink);
      font-weight: 900;
    }
    .year-day.is-today.has-event { color: var(--paper); }
    .year-day.is-empty {
      visibility: hidden;
      pointer-events: none;
    }

    @media (min-width: 721px) and (max-width: 1080px) {
      .year-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    /* ── View transitions (zoom in/out between Today/Month/Year) ─── */
    @media (prefers-reduced-motion: no-preference) {
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 320ms;
        animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      }
      [data-zoom-dir="in"]::view-transition-old(root)  { animation-name: vt-zoom-out-old; }
      [data-zoom-dir="in"]::view-transition-new(root)  { animation-name: vt-zoom-in-new; }
      [data-zoom-dir="out"]::view-transition-old(root) { animation-name: vt-zoom-in-old; }
      [data-zoom-dir="out"]::view-transition-new(root) { animation-name: vt-zoom-out-new; }
      [data-zoom-dir="flat"]::view-transition-old(root){ animation-name: vt-fade-old; }
      [data-zoom-dir="flat"]::view-transition-new(root){ animation-name: vt-fade-new; }
      @keyframes vt-zoom-out-old { from { opacity: 1; transform: scale(1); } to   { opacity: 0; transform: scale(0.92); } }
      @keyframes vt-zoom-in-new  { from { opacity: 0; transform: scale(1.08); } to { opacity: 1; transform: scale(1); } }
      @keyframes vt-zoom-in-old  { from { opacity: 1; transform: scale(1); } to   { opacity: 0; transform: scale(1.08); } }
      @keyframes vt-zoom-out-new { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
      @keyframes vt-fade-old { from { opacity: 1; } to { opacity: 0; } }
      @keyframes vt-fade-new { from { opacity: 0; } to { opacity: 1; } }
    }

    /* ── View visibility ─────────────────────────────────
       Only one main view section is visible at a time. Tabs flip body[data-view].
       Default body markup has data-view="month". */
    #today-view, #year-view, #map-view, #date-night { display: none; }
    body[data-view="today"] #calendar,
    body[data-view="today"] #date-night,
    body[data-view="today"] #year-view,
    body[data-view="today"] #map-view { display: none; }
    body[data-view="today"] #today-view { display: block; }
    body[data-view="today"] .picks,
    body[data-view="today"] .today-btn,
    body[data-view="today"] .filters { display: none; }

    body[data-view="year"] #calendar,
    body[data-view="year"] #date-night,
    body[data-view="year"] #today-view,
    body[data-view="year"] #map-view { display: none; }
    body[data-view="year"] #year-view { display: block; }
    body[data-view="year"] .picks,
    body[data-view="year"] .today-btn,
    body[data-view="year"] .filters { display: none; }

    body[data-view="month"] #today-view,
    body[data-view="month"] #year-view,
    body[data-view="month"] #date-night,
    body[data-view="month"] #map-view { display: none; }

    body[data-view="dn"] #calendar,
    body[data-view="dn"] #today-view,
    body[data-view="dn"] #year-view,
    body[data-view="dn"] #map-view { display: none; }
    body[data-view="dn"] #date-night { display: block; }
    body[data-view="dn"] .today-btn,
    body[data-view="dn"] .filters,
    body[data-view="dn"] .picks { display: none; }

    body[data-view="map"] #calendar,
    body[data-view="map"] #today-view,
    body[data-view="map"] #year-view,
    body[data-view="map"] #date-night,
    body[data-view="map"] .today-btn { display: none; }
    body[data-view="map"] #map-view { display: block; }

    #map-view { position: relative; }
    #map {
      width: 100%;
      height: calc(100vh - var(--filter-h, 56px) - 48px /* tabs */ - 1px);
      min-height: 420px;
      background: #f5f5f3;
    }
    .leaflet-container { font-family: inherit; }
    /* Tweak Leaflet popup chrome to match the monochrome look */
    .leaflet-popup-content-wrapper {
      border-radius: 4px;
      border: 1px solid var(--rule);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }
    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }
    .leaflet-popup-tip { background: var(--paper); border: 1px solid var(--rule); }
    .pop-title { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    .pop-title a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; }
    .pop-title a:hover { border-bottom-color: var(--ink); }
    .pop-meta {
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 6px;
    }
    .pop-note { font-size: 12.5px; line-height: 1.4; margin: 4px 0 8px; max-width: 32ch; }
    .pop-open {
      display: inline-block;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 1px;
      color: var(--ink);
      text-decoration: none;
    }
    .pop-open:hover { opacity: 0.6; }

    .map-status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 500;
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 8px 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      pointer-events: none;
      max-width: calc(100% - 24px);
    }
    .map-status.is-loading::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border: 1.5px solid var(--ink);
      border-right-color: transparent;
      border-radius: 999px;
      margin-right: 8px;
      vertical-align: -1px;
      animation: spin 600ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #date-night {
      padding: clamp(24px, 4vw, 48px) var(--pad-x) clamp(40px, 6vw, 80px);
    }
    .dn-day-picker {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: clamp(20px, 3vw, 32px);
    }
    .dn-day-picker::-webkit-scrollbar { display: none; }
    .dn-day-chip {
      appearance: none;
      background: none;
      border: 1px solid var(--softer);
      padding: 10px 14px 8px;
      font: inherit;
      cursor: pointer;
      text-align: left;
      min-width: 76px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }
    .dn-day-chip .dow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0;
      display: block;
    }
    .dn-day-chip .num {
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
      font-variant-numeric: lining-nums;
    }
    .dn-day-chip:hover { border-color: var(--ink); }
    .dn-day-chip.is-active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .dn-day-chip.is-active .dow { color: var(--paper); opacity: 0.7; }

    .dn-hero {
      border-top: 1px solid var(--rule);
      padding-top: clamp(20px, 3vw, 32px);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: clamp(24px, 4vw, 56px);
      align-items: end;
      margin-bottom: clamp(32px, 4vw, 56px);
    }
    .dn-hero-date {
      font-size: clamp(64px, 10vw, 140px);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 0.9;
      font-variant-numeric: lining-nums;
    }
    .dn-hero-date small {
      display: block;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 400;
      margin-bottom: 10px;
    }
    .dn-hero-weather {
      padding-bottom: 8px;
    }
    .dn-hero-weather .row {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: baseline;
    }
    .dn-hero-weather .row strong {
      color: var(--ink);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .dn-hero-weather .note {
      font-size: 14px;
      line-height: 1.4;
      margin-top: 10px;
      color: var(--ink);
      max-width: 48ch;
    }

    .dn-plan-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px solid var(--rule);
      padding-top: clamp(20px, 3vw, 32px);
      margin-bottom: clamp(16px, 2vw, 24px);
    }
    .dn-plan-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .dn-shuffle {
      appearance: none;
      background: none;
      border: 1px solid var(--ink);
      padding: 9px 14px 8px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

      color: var(--soft);

    /* ── Floating today button ──────────────────────────── */
    .today-btn {
      position: fixed;
      right: clamp(20px, 4vw, 56px);
      bottom: clamp(20px, 3vw, 40px);
      z-index: 40;
      background: var(--ink);
      color: var(--paper);
      border: 0;
      padding: 14px 22px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .today-btn.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .today-btn::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      margin-right: 8px;
      background: var(--paper);
      vertical-align: 1px;
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 720px) {
      :root {
        --pad-x: clamp(16px, 5vw, 24px);
        --filter-row-h: 48px;
        --filter-h: 48px;
      }

      #today-view { padding: 16px var(--pad-x) 40px; }
      .today-hero {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }
      .today-numeral { font-size: clamp(140px, 42vw, 220px); line-height: 0.86; }
      .today-month { font-size: 22px; }
      .today-event { grid-template-columns: 60px 1fr; gap: 12px; padding: 14px 0; }
      .today-event-cat { display: none; }
      .today-event-title { font-size: 19px; }
      .today-event-note { font-size: 13.5px; }

      #year-view { padding: 16px var(--pad-x) 40px; }
      .year-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding-bottom: 14px;
        margin-bottom: 18px;
      }
      .year-headline { font-size: clamp(72px, 26vw, 140px); }
      .year-sub { padding-bottom: 0; font-size: 11px; }
      .year-grid { grid-template-columns: 1fr; gap: 22px; }
      .year-month-name { font-size: 28px; }

      /* Filters: on mobile the weather chip flows inline in the same lane
         (auto-margin + overflow scroll pushed it off-screen). */
      .filter-group-end {
        margin-left: 0;
        padding-left: clamp(12px, 3vw, 18px);
        border-left: 1px solid var(--softer);

        font-size: clamp(24px, 7vw, 32px);

      }

      .month-sentinel { margin-top: 24px; }
      .month-title {
        font-size: clamp(72px, 22vw, 128px);

        padding: 0 0 16px;
      }
      .month-title.is-stuck {
        font-size: 17px;
        padding: 11px 0;
      }

      .day {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 18px 0;
      }
      .dow { margin-bottom: 6px; font-size: 10px; gap: 5px; }
      .numeral {
        font-size: clamp(72px, 22vw, 124px);
        font-weight: 800;
        letter-spacing: -0.055em;
        line-height: 0.9;
      }
      .day-content { padding-top: 4px; }

      .weather {
        flex-wrap: wrap;
        font-size: 10px;
        gap: 8px 12px;
        padding-bottom: 8px;
        margin-bottom: 14px;
      }
      .weather-right { width: 100%; }

      .event { grid-template-columns: 44px 1fr; gap: 12px; padding: 12px 0; }
      .event-time { font-size: 10px; padding-top: 4px; }
      .event-title { font-size: 18px; font-weight: 700; line-height: 1.2; }
      .event-meta { font-size: 10px; }
      .event-note { font-size: 13.5px; max-width: none; }
      .event-cat { display: none; }
      .more { font-size: 13px; }

      .today-btn {
        padding: 11px 16px;
        font-size: 10px;
        letter-spacing: 0.14em;
        right: 16px;
        bottom: 16px;
      }

      .tab { font-size: 10px; padding: 12px 0; margin-right: 20px; }

      #map { height: calc(100vh - var(--filter-h, 48px) - 44px - 1px); min-height: 360px; }
      .map-status { font-size: 10px; padding: 6px 10px; bottom: 8px; left: 8px; }
      .leaflet-popup-content { font-size: 12.5px; margin: 10px 12px; }
      .chip-action::before { width: 6px; height: 6px; margin-right: 6px; }
      .chip.weather::after { width: 6px; height: 6px; margin-left: 6px; }
      .dropdown-btn { gap: 6px; }
      .dropdown-btn .dropdown-value { font-size: 10px; }
      .dropdown-btn::after { font-size: 8px; }
      .dropdown-panel { padding: 12px 14px; min-width: 200px; }

      #date-night { padding: 20px var(--pad-x) 40px; }
      .dn-day-chip { min-width: 64px; padding: 8px 12px 6px; }
      .dn-day-chip .num { font-size: 18px; }
      .dn-hero {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }
      .dn-hero-date { font-size: clamp(56px, 17vw, 88px); }
      .dn-hero-date small { font-size: 10px; }
      .dn-plan-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .dn-move {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 16px 0;
      }
      .dn-move-band { padding-top: 0; }
      .dn-move-band .flag { border-top: 0; padding-top: 0; margin-top: 4px; display: inline; margin-left: 8px; }
      .dn-move-title { font-size: 19px; font-weight: 700; }
      .dn-move-blurb { font-size: 13.5px; }

      /* Sheet slides up from bottom on phones */
      .sheet {
        width: 100%;
        max-width: 100%;
        max-height: 88vh;
        margin: 0;
        margin-top: auto;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
      }
      .sheet-header { padding: 18px 20px 12px; }
      .sheet-body { padding: 14px 20px 20px; }
      .sheet-foot { padding: 10px 20px 14px; }
      .sheet-title { font-size: 19px; }
      .meta-btn .meta-cta { font-size: 10px; margin-top: 4px; }
    }

    /* ── Print ──────────────────────────────────────────── */
    @media print {
      .filters, .today-btn { display: none; }
      .month-title { position: static; }
      .month { break-before: page; }
      .day { break-inside: avoid; }
    }
  </style>
</head>

    function normalizeName(s) {
      return String(s || '').toLowerCase().trim()
        .replace(/[’`]/g, "'")
        .replace(/\s+/g, ' ');
    }
    function eventCoords(ev) {
      const v = normalizeName(ev.venue);
      if (v && VENUE_COORDS[v]) return VENUE_COORDS[v];
      // Looser match: try contains
      if (v) {
        for (const key in VENUE_COORDS) {
          if (key && (v.includes(key) || key.includes(v))) return VENUE_COORDS[key];
        }
      }
      const h = normalizeName(ev.neighborhood);
      if (h && HOOD_COORDS[h]) return HOOD_COORDS[h];
      return null;
    }

    const pad = (n) => String(n).padStart(2, '0');
    const isoDate = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
    const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
    const dowIndex = (y, m, d) => (new Date(y, m, d).getDay() + 6) % 7;

    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const period = h >= 12 ? 'pm' : 'am';
      const hh = h % 12 === 0 ? 12 : h % 12;
      return m ? `${hh}:${pad(m)}${period}` : `${hh}${period}`;
    }

    // ── State ──────────────────────────────────────────
    const state = {
      feed: { edition: '01', year: new Date().getFullYear(), generated_at: '', days: {} },
      activeCats: new Set(), // empty = all
      activeHoods: new Set(), // empty = all; stores slugs
      showWeather: true,
      expandedDates: new Set(),
      todayKey: null,
      linkedDate: null, // YYYY-MM-DD when set via URL/click
      hoodSlugToName: new Map(),
      view: 'month', // 'today' | 'month' | 'year' | 'dn' | 'map'
      dnDate: null, // YYYY-MM-DD selected in date-night view
      dnSeed: 0, // bumps on shuffle
    };

    // ── Slug helpers ───────────────────────────────────
    function slugify(s) {
      return String(s || '')
        .toLowerCase()
        .normalize('NFKD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function deriveNeighborhoods() {
      const counts = new Map();
      const displayName = new Map();
      for (const day of Object.values(state.feed.days || {})) {
        for (const ev of day.events || []) {
          const name = (ev.neighborhood || '').trim();
          if (!name) continue;
          const slug = slugify(name);
          counts.set(slug, (counts.get(slug) || 0) + 1);
          if (!displayName.has(slug)) displayName.set(slug, name);
        }
      }
      const sorted = [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .map(([slug]) => ({ slug, name: displayName.get(slug) }));
      state.hoodSlugToName = new Map(sorted.map((h) => [h.slug, h.name]));
      return sorted;
    }

    // ── Filter bar ─────────────────────────────────────
    function renderFilters() {
      // Categories live inside a dropdown panel rendered as a fixed-positioned
      // sibling so it can pop over the scrollable filter lane.
      const panel = document.getElementById('cat-dropdown-panel');
      panel.innerHTML = '';
      const head = document.createElement('div');
      head.className = 'dp-head';
      head.innerHTML = `
        <span class="dp-title">Categories</span>
        <button type="button" class="dp-clear" id="cat-dropdown-clear">Clear</button>
      `;
      panel.appendChild(head);
      CATEGORIES.forEach((cat) => {
        const label = document.createElement('label');
        label.innerHTML = `<input type="checkbox" data-cat="${cat}"><span>${cat}</span>`;
        const cb = label.querySelector('input');
        cb.addEventListener('change', () => toggleCategory(cat));
        panel.appendChild(label);
      });
      document.getElementById('cat-dropdown-clear').addEventListener('click', clearCategories);

      // Neighborhoods live in their own dropdown panel, mirroring categories.
      const hoods = deriveNeighborhoods();
      const hoodBtn = document.getElementById('hood-dropdown-btn');
      const hoodPanel = document.getElementById('hood-dropdown-panel');
      hoodPanel.innerHTML = '';
      if (!hoods.length) {
        hoodBtn.hidden = true;
      } else {
        hoodBtn.hidden = false;
        const hoodHead = document.createElement('div');
        hoodHead.className = 'dp-head';
        hoodHead.innerHTML = `
          <span class="dp-title">Where</span>
          <button type="button" class="dp-clear" id="hood-dropdown-clear">Clear</button>
        `;
        hoodPanel.appendChild(hoodHead);
        hoods.forEach(({ slug, name }) => {
          const label = document.createElement('label');
          label.innerHTML = `<input type="checkbox" data-hood="${escapeHtml(slug)}"><span>${escapeHtml(name)}</span>`;
          label.querySelector('input').addEventListener('change', () => toggleHood(slug));
          hoodPanel.appendChild(label);
        });
        document.getElementById('hood-dropdown-clear').addEventListener('click', clearHoods);
      }
      // Drop any active hoods that no longer exist in the feed
      for (const slug of [...state.activeHoods]) {
        if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
      }
      updateCategoryChips();
      updateHoodChips();
      updateFilterHeight();
    }

    // Re-render the calendar grid (kept current even when hidden so view
    // switches feel instant) plus whichever view is on top.
    function renderCurrent() {
      renderCalendar();
      if (state.view === 'today') renderTodayView();
      if (state.view === 'year')  renderYearView();
      if (state.view === 'dn')    renderDateNight();
      refreshMapMarkers();
    }

    function toggleCategory(cat) {
      if (state.activeCats.has(cat)) state.activeCats.delete(cat);
      else state.activeCats.add(cat);
      updateCategoryChips();
      writeHash();
      renderCurrent();
    }

    function clearCategories() {
      state.activeCats.clear();
      updateCategoryChips();
      writeHash();
      renderCurrent();
    }

    function toggleHood(slug) {
      if (state.activeHoods.has(slug)) state.activeHoods.delete(slug);
      else state.activeHoods.add(slug);
      updateHoodChips();
      writeHash();
      renderCurrent();
    }

    function updateCategoryChips() {
      // Update checkboxes inside the dropdown.
      document.querySelectorAll('#cat-dropdown-panel input[data-cat]').forEach((cb) => {
        cb.checked = state.activeCats.has(cb.dataset.cat);
      });
      // Update the button label so the active selection is visible without opening the panel.
      const valueEl = document.getElementById('cat-dropdown-value');
      const clear = document.getElementById('cat-dropdown-clear');
      const cats = [...state.activeCats];
      if (!cats.length) {
        valueEl.textContent = 'All';
      } else if (cats.length <= 2) {
        valueEl.textContent = cats.join(', ');
      } else {
        valueEl.textContent = `${cats.length} selected`;
      }
      if (clear) clear.disabled = cats.length === 0;
    }

    function clearHoods() {
      state.activeHoods.clear();
      updateHoodChips();
      writeHash();
      renderCurrent();
    }

    function updateHoodChips() {
      // Update checkboxes inside the dropdown
      document.querySelectorAll('#hood-dropdown-panel input[data-hood]').forEach((cb) => {
        cb.checked = state.activeHoods.has(cb.dataset.hood);
      });
      // Update the button label
      const valueEl = document.getElementById('hood-dropdown-value');
      const clear = document.getElementById('hood-dropdown-clear');
      if (!valueEl) return;
      const hoods = [...state.activeHoods]
        .map((slug) => state.hoodSlugToName.get(slug))
        .filter(Boolean);
      if (!hoods.length) {
        valueEl.textContent = 'All';
      } else if (hoods.length <= 2) {
        valueEl.textContent = hoods.join(', ');
      } else {
        valueEl.textContent = `${hoods.length} selected`;
      }
      if (clear) clear.disabled = hoods.length === 0;
    }

    function toggleWeather() {
      state.showWeather = !state.showWeather;
      document.body.classList.toggle('hide-weather', !state.showWeather);
      const btn = document.getElementById('meta-weather');
      if (btn) btn.setAttribute('aria-pressed', state.showWeather ? 'true' : 'false');
      // Today view bakes the weather block into its render — re-render so the change is visible.
      if (state.view === 'today') renderTodayView();
      writeHash();
    }

    // Dropdown open/close ──────────────────────────────
    function positionCatDropdown() {
      const btn = document.getElementById('cat-dropdown-btn');
      const panel = document.getElementById('cat-dropdown-panel');
      if (!btn || panel.hidden) return;
      const r = btn.getBoundingClientRect();
      const panelW = panel.offsetWidth || 220;
      let left = r.left;
      if (left + panelW > window.innerWidth - 8) {
        left = Math.max(8, window.innerWidth - panelW - 8);
      }
      panel.style.top = `${Math.round(r.bottom + 6)}px`;
      panel.style.left = `${Math.round(left)}px`;
    }
    function openCatDropdown() {
      const btn = document.getElementById('cat-dropdown-btn');
      const panel = document.getElementById('cat-dropdown-panel');
      panel.hidden = false;
      btn.setAttribute('aria-expanded', 'true');
      positionCatDropdown();
      document.addEventListener('mousedown', onDocCloseDropdown, true);
      document.addEventListener('keydown', onEscDropdown);
      window.addEventListener('resize', positionCatDropdown);
      window.addEventListener('scroll', positionCatDropdown, true);
    }
    function closeCatDropdown() {
      const btn = document.getElementById('cat-dropdown-btn');
      const panel = document.getElementById('cat-dropdown-panel');
      panel.hidden = true;
      btn.setAttribute('aria-expanded', 'false');
      document.removeEventListener('mousedown', onDocCloseDropdown, true);
      document.removeEventListener('keydown', onEscDropdown);
      window.removeEventListener('resize', positionCatDropdown);
      window.removeEventListener('scroll', positionCatDropdown, true);
    }
    function onDocCloseDropdown(e) {
      const panel = document.getElementById('cat-dropdown-panel');
      const btn = document.getElementById('cat-dropdown-btn');
      if (panel.contains(e.target) || btn.contains(e.target)) return;
      closeCatDropdown();
    }
    function onEscDropdown(e) { if (e.key === 'Escape') closeCatDropdown(); }

    // Neighborhood dropdown — mirrors the categories pattern
    function positionHoodDropdown() {
      const btn = document.getElementById('hood-dropdown-btn');
      const panel = document.getElementById('hood-dropdown-panel');
      if (!btn || panel.hidden) return;
      const r = btn.getBoundingClientRect();
      const panelW = panel.offsetWidth || 220;
      let left = r.left;
      if (left + panelW > window.innerWidth - 8) {
        left = Math.max(8, window.innerWidth - panelW - 8);
      }
      panel.style.top = `${Math.round(r.bottom + 6)}px`;
      panel.style.left = `${Math.round(left)}px`;
    }
    function openHoodDropdown() {
      const btn = document.getElementById('hood-dropdown-btn');
      const panel = document.getElementById('hood-dropdown-panel');
      panel.hidden = false;
      btn.setAttribute('aria-expanded', 'true');
      positionHoodDropdown();
      document.addEventListener('mousedown', onDocCloseHoodDropdown, true);
      document.addEventListener('keydown', onEscHoodDropdown);
      window.addEventListener('resize', positionHoodDropdown);
      window.addEventListener('scroll', positionHoodDropdown, true);
    }
    function closeHoodDropdown() {
      const btn = document.getElementById('hood-dropdown-btn');
      const panel = document.getElementById('hood-dropdown-panel');
      panel.hidden = true;
      btn.setAttribute('aria-expanded', 'false');

      document.removeEventListener('keydown', onEscHoodDropdown);
      window.removeEventListener('resize', positionHoodDropdown);
      window.removeEventListener('scroll', positionHoodDropdown, true);
    }
    function onDocCloseHoodDropdown(e) {
      const panel = document.getElementById('hood-dropdown-panel');
      const btn = document.getElementById('hood-dropdown-btn');
      if (panel.contains(e.target) || btn.contains(e.target)) return;
      closeHoodDropdown();

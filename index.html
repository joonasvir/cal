        <button type="button" class="dp-item" data-view="month" role="menuitemradio" aria-checked="true">Month</button>
        <button type="button" class="dp-item" data-view="week"  role="menuitemradio" aria-checked="false">Week</button>
        <button type="button" class="dp-item" data-view="year"  role="menuitemradio" aria-checked="false">Year</button>
        <button type="button" class="dp-item" data-view="map"   role="menuitemradio" aria-checked="false">Map</button>
        <button type="button" class="dp-item" data-view="dn"    role="menuitemradio" aria-checked="false">Date Night</button>
      `;
      panel.querySelectorAll('.dp-item').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (btn.dataset.action === 'today') {
            // Today is an action, not a view — jump to today without changing view.
            scrollToDate(state.todayKey, 'smooth');
          } else if (btn.dataset.view) {
            setView(btn.dataset.view);
          }
          closeViewDropdown();
        });
      });
      panel.dataset.built = '1';
    }
    function positionViewDropdown() {
      const btn = document.getElementById('view-dropdown-btn');
      const panel = document.getElementById('view-dropdown-panel');
      if (!btn || panel.hidden) return;
      const r = btn.getBoundingClientRect();
      const panelW = panel.offsetWidth || 220;
      let left = r.right - panelW;
      if (left < 8) left = 8;
      panel.style.top = `${Math.round(r.bottom + 6)}px`;
      panel.style.left = `${Math.round(left)}px`;
    }
    function openViewDropdown() {
      renderViewDropdownPanel();
      const btn = document.getElementById('view-dropdown-btn');
      const panel = document.getElementById('view-dropdown-panel');
      panel.hidden = false;
      btn.setAttribute('aria-expanded', 'true');
      positionViewDropdown();
      document.addEventListener('mousedown', onDocCloseViewDropdown, true);
      document.addEventListener('keydown', onEscViewDropdown);
      window.addEventListener('resize', positionViewDropdown);
      window.addEventListener('scroll', positionViewDropdown, true);
    }
    function closeViewDropdown() {
      const btn = document.getElementById('view-dropdown-btn');
      const panel = document.getElementById('view-dropdown-panel');
      panel.hidden = true;
      btn.setAttribute('aria-expanded', 'false');
      document.removeEventListener('mousedown', onDocCloseViewDropdown, true);
      document.removeEventListener('keydown', onEscViewDropdown);
      window.removeEventListener('resize', positionViewDropdown);
      window.removeEventListener('scroll', positionViewDropdown, true);
    }
    function onDocCloseViewDropdown(e) {
      const panel = document.getElementById('view-dropdown-panel');
      const btn = document.getElementById('view-dropdown-btn');
      if (panel.contains(e.target) || btn.contains(e.target)) return;
      closeViewDropdown();
    }
    function onEscViewDropdown(e) { if (e.key === 'Escape') closeViewDropdown(); }

    function updateFilterHeight() {
      // Single sticky bar now — the topbar carries both the filter
      // dropdowns and the view toggles. .day's scroll-margin-top and
      // .month-title's sticky top both use --filter-h.
      const tb = document.getElementById('topbar');
      const tbH = tb ? tb.offsetHeight : 0;
      if (tbH) {
        document.documentElement.style.setProperty('--topbar-h', `${tbH}px`);
        document.documentElement.style.setProperty('--filter-h', `${tbH}px`);
      }
    }

    // ── Render ─────────────────────────────────────────
    function filterEvents(events) {
      if (!state.activeCats.size && !state.activeHoods.size) return events;
      return events.filter((e) => {
        if (state.activeCats.size && !state.activeCats.has(e.category)) return false;
        if (state.activeHoods.size && !state.activeHoods.has(slugify(e.neighborhood))) return false;
        return true;
      });
    }

    function renderDay(y, m, d) {
      const key = isoDate(y, m, d);
      const dow = dowIndex(y, m, d);
      const payload = state.feed.days[key];
      const allEvents = payload?.events ?? [];
      const events = filterEvents(allEvents);
      const weather = payload?.weather;
      const isToday = key === state.todayKey;
      const isEmpty = !events.length && !weather;
      const isExpanded = state.expandedDates.has(key);

      const isLinked = key === state.linkedDate;
      const day = document.createElement('article');
      day.className = `day${isEmpty ? ' is-empty' : ''}${isToday ? ' is-today' : ''}${isExpanded ? ' is-expanded' : ''}${isLinked ? ' is-linked' : ''}`;
      day.dataset.date = key;

      const marker = document.createElement('button');
      marker.type = 'button';
      marker.className = 'day-marker';
      marker.setAttribute('aria-label', `Share link for ${key}`);
      marker.addEventListener('click', () => setLinkedDate(key));
      const dowEl = document.createElement('div');
      dowEl.className = 'dow';
      DOW.forEach((letter, i) => {
        const s = document.createElement('span');
        s.textContent = letter;
        if (i === dow) s.classList.add('active');
        dowEl.appendChild(s);
      });
      const numEl = document.createElement('div');
      numEl.className = 'numeral';
      numEl.textContent = pad(d);
      marker.appendChild(dowEl);
      marker.appendChild(numEl);

      const content = document.createElement('div');
      content.className = 'day-content';

      if (weather) {
        const w = document.createElement('div');
        w.className = 'weather';
        const left = document.createElement('div');
        left.className = 'weather-left';
        const hi = weather.high ?? weather.high_f;
        const lo = weather.low ?? weather.low_f;
        left.innerHTML = `
          <span class="weather-temp">${hi}° / ${lo}°</span>
          <span class="weather-mood">${weather.condition}</span>
        `;
        const right = document.createElement('div');
        right.className = 'weather-right';
        right.textContent = weather.note || `${weather.precip_chance}% precip`;
        w.appendChild(left);
        w.appendChild(right);
        content.appendChild(w);
      }

      if (events.length) {
        const list = document.createElement('ul');
        list.className = 'events';
        events.forEach((ev, i) => {
          const li = document.createElement('li');
          // Events past TOP_N are both hidden (default) and rendered smaller
          // (when expanded) — clear visual hierarchy between the recommended
          // picks and the additional options.
          li.className = `event${i >= TOP_N ? ' is-hidden is-secondary' : ''}`;
          const previewImg = imageForEvent(ev);
          const previewCap = [ev.venue, ev.neighborhood].filter(Boolean).join(' · ');
          li.innerHTML = `
            <div class="event-icon-wrap" aria-hidden="true">${iconFor(ev.category)}</div>
            <div class="event-time">${fmtTime(ev.time)}</div>
            <div class="event-body">
              <div class="event-title" data-image="${escapeHtml(previewImg)}"${previewCap ? ` data-caption="${escapeHtml(previewCap)}"` : ''}>${ev.url
                ? `<a href="${ev.url}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
                : escapeHtml(ev.title)}</div>
              ${ev.venue || ev.neighborhood
                ? `<div class="event-meta">${[ev.venue, ev.neighborhood].filter(Boolean).map(escapeHtml).join(' · ')}</div>`
                : ''}
              ${ev.note ? `<div class="event-note">${escapeHtml(ev.note)}</div>` : ''}
            </div>
            <div class="event-cat">${ev.category || ''}</div>
          `;
          list.appendChild(li);
        });
        content.appendChild(list);

        if (events.length > TOP_N) {
          const more = document.createElement('button');
          more.className = 'more';
          more.type = 'button';
          const hiddenCount = events.length - TOP_N;
          more.textContent = isExpanded
            ? `Hide ${hiddenCount} event${hiddenCount === 1 ? '' : 's'}`
            : `See ${hiddenCount} more event${hiddenCount === 1 ? '' : 's'}`;
          more.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDayExpanded(key);
          });
          content.appendChild(more);
        }
      }

      day.appendChild(marker);
      day.appendChild(content);

      // The only ways to toggle a day's expansion are the date numeral and
      // the "See N more" row. Clicks inside an event row are ignored so a
      // user reading an event can't accidentally collapse the day.

      return day;
    }

    // In-place expansion — toggle the class on the existing day element and
    // update the "more" button label. Avoids a full renderCalendar() which
    // wipes the DOM and causes a perceived "reload" jump.
    function toggleDayExpanded(key) {
      const willExpand = !state.expandedDates.has(key);
      if (willExpand) state.expandedDates.add(key);
      else state.expandedDates.delete(key);
      const dayEl = document.querySelector(`.day[data-date="${key}"]`);
      if (!dayEl) return;
      dayEl.classList.toggle('is-expanded', willExpand);
      updateMoreLabel(dayEl, key);
    }

    function updateMoreLabel(dayEl, key) {
      const more = dayEl.querySelector('.more');
      if (!more) return;
      const all = filterEvents(state.feed.days?.[key]?.events ?? []);
      const hidden = Math.max(0, all.length - TOP_N);
      const expanded = state.expandedDates.has(key);
      more.textContent = expanded
        ? `Hide ${hidden} event${hidden === 1 ? '' : 's'}`
        : `See ${hidden} more event${hidden === 1 ? '' : 's'}`;
    }

    function iconFor(category) {
      const id = ['music','comedy','art','food','talk','nightlife'].includes(category)
        ? `i-${category}` : 'i-talk';
      return `<svg class="event-icon" aria-hidden="true"><use href="#${id}"/></svg>`;
    }

    function renderCalendar() {
      const root = document.getElementById('calendar');
      const scrollY = window.scrollY;
      root.innerHTML = '';
      const year = state.feed.year || new Date().getFullYear();
      for (let m = 0; m < 12; m++) {
        const section = document.createElement('section');
        section.className = 'month';
        section.id = `month-${pad(m + 1)}`;
        // Sentinel sits just above the sticky title. When it scrolls out of
        // view past the filter bar, the title gets `is-stuck` and collapses.
        const sentinel = document.createElement('div');
        sentinel.className = 'month-sentinel';
        section.appendChild(sentinel);
        const h2 = document.createElement('h2');
        h2.className = 'month-title';
        h2.textContent = MONTHS[m];
        section.appendChild(h2);
        for (let d = 1; d <= daysInMonth(year, m); d++) {
          section.appendChild(renderDay(year, m, d));
        }
        root.appendChild(section);
      }
      renderPicks();
      observeToday();
      observeMonthTitles();
      // Preserve scroll across re-render (filter changes)
      window.scrollTo({ top: scrollY, behavior: 'instant' });
    }

    // ── My Usuals (top picks list — top 3 by default, expand for more) ──
    const PICKS_TOP_N = 3;
    const PICKS_MAX = 8;
    let picksExpanded = false;

    function renderPicks() {
      const list = document.getElementById('picks-grid');
      const sub = document.getElementById('picks-sub');
      const moreBtn = document.getElementById('picks-more');
      if (!list) return;

      const today = state.todayKey;
      const days = state.feed.days || {};
      const dateKeys = Object.keys(days).filter((k) => k >= today).sort();

      const picks = [];
      for (const key of dateKeys) {
        const events = filterEvents(days[key].events || []);
        if (events.length === 0) continue;
        picks.push({ date: key, event: events[0] });
        if (picks.length >= PICKS_MAX) break;
      }

      const filtered = !!(state.activeCats?.size || state.activeHoods?.size);
      if (sub) sub.textContent = filtered ? 'Filtered to what you chose' : 'Top 3 nights curated for you';

      list.classList.toggle('is-expanded', picksExpanded);

      if (!picks.length) {
        list.innerHTML = '<li class="picks-empty">No matching events in the next days. Try clearing filters.</li>';
        if (moreBtn) moreBtn.hidden = true;
        return;
      }

      list.innerHTML = picks.map((p, i) => {
        const [, pm, pd] = p.date.split('-').map(Number);
        const dayLabel = `${MONTHS[pm - 1].slice(0, 3).toUpperCase()} ${pd}`;
        const ev = p.event;
        const titleInner = ev.url
          ? `<a href="${escapeHtml(ev.url)}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
          : escapeHtml(ev.title);
        return `
          <li class="pick-row${i >= PICKS_TOP_N ? ' is-hidden' : ''}" data-date="${escapeHtml(p.date)}">
            <div class="pick-icon-wrap" aria-hidden="true">${iconFor(ev.category)}</div>
            <div class="pick-when">
              ${escapeHtml(dayLabel)}
              <span class="pick-when-time">${escapeHtml(fmtTime(ev.time))}</span>
            </div>
            <div class="pick-body">
              <div class="pick-title">${titleInner}</div>
              ${ev.venue || ev.neighborhood
                ? `<div class="pick-meta">${[ev.venue, ev.neighborhood].filter(Boolean).map(escapeHtml).join(' · ')}</div>`
                : ''}
              ${ev.note ? `<div class="pick-note">${escapeHtml(ev.note)}</div>` : ''}
            </div>
            <div class="pick-cat">${escapeHtml(ev.category || '')}</div>
          </li>
        `;
      }).join('');

      // Show-more button
      if (moreBtn) {
        const hiddenCount = Math.max(0, picks.length - PICKS_TOP_N);
        if (hiddenCount === 0) {
          moreBtn.hidden = true;
        } else {
          moreBtn.hidden = false;
          moreBtn.textContent = picksExpanded
            ? 'Show fewer usuals'
            : `${hiddenCount} more usual${hiddenCount === 1 ? '' : 's'}`;
        }
      }

      // Tap a pick row → scroll to that day in the calendar (skip link clicks)
      list.querySelectorAll('.pick-row').forEach((row) => {
        row.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          scrollToDate(row.dataset.date, 'smooth');
        });
      });
    }

    function togglePicksExpanded() {
      picksExpanded = !picksExpanded;
      renderPicks();
    }

    // Watches each month's sentinel; when it leaves the viewport at the top
    // (under the sticky filter bar), the sibling .month-title becomes
    // "stuck" and collapses to a slim label via CSS transition.
    let monthObserver = null;
    function observeMonthTitles() {
      if (monthObserver) monthObserver.disconnect();
      const filterH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--filter-h')) || 56;
      monthObserver = new IntersectionObserver((entries) => {
        for (const e of entries) {
          const title = e.target.nextElementSibling;
          if (!title || !title.classList.contains('month-title')) continue;
          // Stuck when the sentinel has scrolled above the filter bar.
          const stuck = !e.isIntersecting && e.boundingClientRect.top < filterH + 1;
          title.classList.toggle('is-stuck', stuck);
        }
      }, { rootMargin: `-${filterH + 1}px 0px 0px 0px`, threshold: [0, 1] });
      document.querySelectorAll('.month-sentinel').forEach((s) => monthObserver.observe(s));
    }

    // ── Date Night ─────────────────────────────────────
    // 'today' is a snap-to-today action on the Month view, not its own view.
    const ALL_VIEWS = ['week', 'month', 'year', 'dn', 'map'];
    // Zoom levels — higher = more zoomed in. Week → Month → Year is the
    // zoom gradient; Date Night and Map sit at the "Month" level.
    const VIEW_ZOOM = { week: 3, month: 2, dn: 2, map: 2, year: 1 };

    function normalizeView(v) {
      if (v === 'calendar') return 'month'; // backwards-compat with old URLs
      return ALL_VIEWS.includes(v) ? v : 'month';
    }

    function transitionTo(viewName) {
      const next = normalizeView(viewName);
      const prev = state.view;
      if (next === prev) return;
      const delta = (VIEW_ZOOM[next] ?? 2) - (VIEW_ZOOM[prev] ?? 2);
      const dir = delta > 0 ? 'in' : delta < 0 ? 'out' : 'flat';
      document.documentElement.dataset.zoomDir = dir;
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!reduced && typeof document.startViewTransition === 'function') {
        const t = document.startViewTransition(() => setView(next));
        // If the transition is interrupted, finished rejects — we still want
        // the new view to be the source of truth, so swallow the error.
        t.finished?.catch?.(() => {});
      } else {
        setView(next);
      }
    }

    function setView(v, opts = {}) {
      v = normalizeView(v);
      state.view = v;
      document.body.dataset.view = v;
      document.querySelectorAll('.tab').forEach((b) => {
        const on = b.dataset.view === v;
        b.classList.toggle('is-active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      // Keep the mobile "View" dropdown label + selected indicator in sync.
      const viewVal = document.getElementById('view-dropdown-value');
      if (viewVal) viewVal.textContent = VIEW_LABELS[v] || v;
      document.querySelectorAll('#view-dropdown-panel [data-view]').forEach((el) => {
        el.classList.toggle('is-active', el.dataset.view === v);
        el.setAttribute('aria-checked', el.dataset.view === v ? 'true' : 'false');
      });
      // Recalculate sticky offsets — the filter bar shows in some views and
      // hides in others, so the month-title's effective sticky-top changes.
      requestAnimationFrame(updateFilterHeight);
      if (v === 'week')  renderWeekView();
      if (v === 'year')  renderYearView();
      if (v === 'dn') {
        if (!state.dnDate) state.dnDate = state.linkedDate || state.todayKey;
        renderDateNight();
      }
      if (v === 'map') {
        initMap();
      }
      if (!opts.silent) writeHash();
    }

    // ── Year view (brutalist 12-month poster) ──────────
    // ── Week view (7 days centred on today) ─────────────
    // How many days the horizontal strip renders, anchored on today.
    const WEEK_DAYS_BACK = 30;
    const WEEK_DAYS_FORWARD = 60;

    function renderWeekView() {
      const root = document.getElementById('week-frame');
      if (!root) return;
      if (!state.todayKey) {
        const t = new Date();
        state.todayKey = isoDate(t.getFullYear(), t.getMonth(), t.getDate());
      }
      const today = new Date(state.todayKey + 'T00:00:00');

      const cols = [];
      let lastMonth = -1;
      for (let i = -WEEK_DAYS_BACK; i <= WEEK_DAYS_FORWARD; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const key = isoDate(d.getFullYear(), d.getMonth(), d.getDate());
        const payload = state.feed.days?.[key];
        const events = filterEvents(payload?.events || []);
        const weather = payload?.weather;
        const isToday = key === state.todayKey;
        const dowIdx = (d.getDay() + 6) % 7;
        const isWeekend = dowIdx >= 5;
        const monthChange = d.getMonth() !== lastMonth;
        lastMonth = d.getMonth();

        const wxHtml = (weather && state.showWeather)
          ? `<div class="week-wx">${weather.high ?? weather.high_f}°/${weather.low ?? weather.low_f}° · ${escapeHtml(weather.condition || '')}</div>`
          : '';
        const eventsHtml = events.length
          ? `<ul class="week-events">${events.map((ev) => {
              const img = imageForEvent(ev);
              const cap = [ev.venue, ev.neighborhood].filter(Boolean).join(' · ');
              return `
                <li class="week-event">
                  <div class="week-event-time">${escapeHtml(fmtTime(ev.time) || '')}</div>
                  <div class="week-event-title" data-image="${escapeHtml(img)}"${cap ? ` data-caption="${escapeHtml(cap)}"` : ''}>${ev.url
                    ? `<a href="${escapeHtml(ev.url)}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
                    : escapeHtml(ev.title)}</div>
                  ${ev.venue ? `<div class="week-event-meta">${escapeHtml(ev.venue)}</div>` : ''}
                </li>
              `;
            }).join('')}</ul>`
          : `<div class="week-empty">—</div>`;

        // Show month label on the first column AND when month changes.
        const monthLabel = monthChange ? MONTHS[d.getMonth()].slice(0, 3).toUpperCase() : '';

        const classes = [
          'week-col',
          isToday ? 'is-today' : '',
          isWeekend ? 'is-weekend' : '',
          monthChange ? 'is-month-edge' : '',
        ].filter(Boolean).join(' ');

        cols.push(`
          <article class="${classes}" data-date="${escapeHtml(key)}">
            <header class="week-col-head">
              <div class="week-dow">${monthLabel ? `<strong>${monthLabel}</strong> · ` : ''}${DOW_LONG[dowIdx]}</div>
              <button type="button" class="week-num" data-date="${escapeHtml(key)}" aria-label="Open ${key} in Month view">${d.getDate()}</button>
              ${wxHtml}
            </header>
            ${eventsHtml}
          </article>
        `);
      }
      root.innerHTML = `<div class="week-grid">${cols.join('')}</div>`;

      // Numeral click → zoom into Month view at that day.
      root.querySelectorAll('.week-num[data-date]').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const key = btn.dataset.date;
          state.linkedDate = key;
          state.expandedDates.add(key);
          transitionTo('month');
          requestAnimationFrame(() => scrollToDate(key, 'instant'));
        });
      });

      // Snap horizontal scroll to today on every render.
      const todayCol = root.querySelector(`.week-col[data-date="${state.todayKey}"]`);
      if (todayCol) {
        // Use scrollIntoView with `inline:'start'`, falling back to left math.
        try {
          todayCol.scrollIntoView({ inline: 'start', block: 'nearest', behavior: 'instant' });
        } catch {
          root.scrollLeft = todayCol.offsetLeft - 16;
        }
      }
    }

    function renderYearView() {
      const year = state.feed.year || new Date().getFullYear();
      const headline = document.getElementById('year-headline');
      const sub = document.getElementById('year-sub');
      if (headline) headline.textContent = String(year);
      const totalEvents = Object.values(state.feed.days || {}).reduce((a, d) => a + (d.events?.length || 0), 0);
      const filterNote = state.activeCats.size || state.activeHoods.size ? ' (filtered)' : '';
      if (sub) sub.textContent = `${totalEvents} curated event${totalEvents === 1 ? '' : 's'}${filterNote}`;

      const grid = document.getElementById('year-grid');
      if (!grid) return;
      grid.innerHTML = '';
      for (let m = 0; m < 12; m++) {
        const monthDiv = document.createElement('div');
        monthDiv.className = 'year-month';
        const days = daysInMonth(year, m);
        let monthEventCount = 0;
        const cells = [];
        // Empty cells for the leading week offset (Mon-first).
        const firstDow = dowIndex(year, m, 1);
        for (let i = 0; i < firstDow; i++) {
          cells.push(`<span class="year-day is-empty">·</span>`);
        }
        for (let d = 1; d <= days; d++) {
          const key = isoDate(year, m, d);
          const payload = state.feed.days?.[key];
          const filtered = payload ? filterEvents(payload.events || []) : [];
          const has = filtered.length > 0;
          if (has) monthEventCount += filtered.length;
          const isToday = key === state.todayKey;
          const cls = ['year-day'];
          if (has) cls.push('has-event');
          if (isToday) cls.push('is-today');
          cells.push(
            `<button type="button" class="${cls.join(' ')}" data-date="${key}" aria-label="${key}${has ? `, ${filtered.length} event${filtered.length === 1 ? '' : 's'}` : ''}">${d}</button>`,
          );
        }
        monthDiv.innerHTML = `
          <div class="year-month-label">
            <div class="year-month-name">${MONTHS[m]}</div>
            <div class="year-month-count">${monthEventCount || '—'}${monthEventCount ? ' ev' : ''}</div>
          </div>
          <div class="year-month-dow"><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span></div>
          <div class="year-month-days">${cells.join('')}</div>
        `;
        grid.appendChild(monthDiv);
      }
      // Wire day-click → zoom into Month view at that date.
      grid.querySelectorAll('.year-day[data-date]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.date;
          state.linkedDate = key;
          state.expandedDates.add(key);
          transitionTo('month');
          requestAnimationFrame(() => scrollToDate(key, 'instant'));
        });
      });
    }

    // ── Map (Leaflet, lazy-loaded) ─────────────────────
    const LEAFLET_JS = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    const LEAFLET_CSS = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    let leafletLoading = null;
    let mapInstance = null;
    let mapMarkerLayer = null;
    let mapFittedOnce = false;
    const isAppleDevice = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent || '');

    function setMapStatus(text, loading = false) {
      const el = document.getElementById('map-status');
      if (!el) return;
      if (!text) { el.hidden = true; el.textContent = ''; el.classList.remove('is-loading'); return; }
      el.hidden = false;
      el.textContent = text;
      el.classList.toggle('is-loading', !!loading);
    }

    function loadLeaflet() {
      if (typeof window.L !== 'undefined') return Promise.resolve();
      if (leafletLoading) return leafletLoading;
      leafletLoading = new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = LEAFLET_CSS;
        document.head.appendChild(link);
        const s = document.createElement('script');
        s.src = LEAFLET_JS;
        s.async = true;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Failed to load Leaflet'));
        document.head.appendChild(s);
      });
      return leafletLoading;
    }

    async function initMap() {
      const container = document.getElementById('map');
      if (!container) return;
      try {
        if (!mapInstance) {
          setMapStatus('Loading map…', true);
          await loadLeaflet();
          mapInstance = L.map(container, {
            zoomControl: true,
            scrollWheelZoom: true,
            preferCanvas: true,
          }).setView([40.6892, -73.9667], 12);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19,
          }).addTo(mapInstance);
        }
        refreshMapMarkers();
        // Resize after CSS settles (tab-switch initial display)
        requestAnimationFrame(() => mapInstance && mapInstance.invalidateSize());
      } catch (e) {
        setMapStatus('Couldn’t load the map.', false);
        console.error(e);
      }
    }

    function buildPopupHtml(ev, ll) {
      const venue = ev.venue || '';
      const hood = ev.neighborhood || '';
      const q = encodeURIComponent([venue, hood, 'NYC'].filter(Boolean).join(', '));
      const mapsUrl = isAppleDevice
        ? `https://maps.apple.com/?q=${q}&ll=${ll[0]},${ll[1]}`
        : `https://www.google.com/maps/search/?api=1&query=${q}`;
      const titleHtml = ev.url
        ? `<a href="${escapeHtml(ev.url)}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
        : escapeHtml(ev.title);
      const meta = [venue, hood, fmtTime(ev.time)].filter(Boolean).map(escapeHtml).join(' · ');
      return `
        <div class="pop">
          <div class="pop-title">${titleHtml}</div>
          ${meta ? `<div class="pop-meta">${meta}</div>` : ''}
          ${ev.note ? `<div class="pop-note">${escapeHtml(ev.note)}</div>` : ''}
          <a class="pop-open" href="${mapsUrl}" target="_blank" rel="noopener">Open in Maps ↗</a>
        </div>
      `;
    }

    function refreshMapMarkers() {
      if (!mapInstance || typeof L === 'undefined') return;
      if (mapMarkerLayer) mapMarkerLayer.remove();
      mapMarkerLayer = L.layerGroup().addTo(mapInstance);

      const markers = [];
      let placed = 0, missing = 0;
      const days = state.feed.days || {};
      // Build a list of all events first so we can dedupe and stack same-venue points.
      const byPoint = new Map();
      for (const [date, day] of Object.entries(days)) {
        for (const ev of day.events || []) {
          if (state.activeCats.size && !state.activeCats.has(ev.category)) continue;
          if (state.activeHoods.size && !state.activeHoods.has(slugify(ev.neighborhood))) continue;
          const ll = eventCoords(ev);
          if (!ll) { missing++; continue; }
          const key = `${ll[0].toFixed(4)},${ll[1].toFixed(4)}`;
          if (!byPoint.has(key)) byPoint.set(key, { ll, items: [] });
          byPoint.get(key).items.push({ ...ev, date });
          placed++;
        }
      }
      for (const { ll, items } of byPoint.values()) {
        const m = L.circleMarker(ll, {
          radius: items.length > 1 ? 8 : 6,
          color: '#000',
          weight: 1.5,
          fillColor: '#000',
          fillOpacity: 0.85,
        }).addTo(mapMarkerLayer);
        if (items.length === 1) {
          m.bindPopup(buildPopupHtml(items[0], ll), { maxWidth: 280 });
        } else {
          const listHtml = items.map((ev) => `
            <div class="pop-item" style="border-top:1px solid var(--softest); padding-top:6px; margin-top:6px;">
              <div class="pop-title" style="font-size:13px;">${ev.url
                ? `<a href="${escapeHtml(ev.url)}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
                : escapeHtml(ev.title)}</div>
              <div class="pop-meta">${[ev.date, fmtTime(ev.time)].filter(Boolean).map(escapeHtml).join(' · ')}</div>
            </div>
          `).join('');
          const firstEv = items[0];
          const q = encodeURIComponent([firstEv.venue, firstEv.neighborhood, 'NYC'].filter(Boolean).join(', '));
          const mapsUrl = isAppleDevice
            ? `https://maps.apple.com/?q=${q}&ll=${ll[0]},${ll[1]}`
            : `https://www.google.com/maps/search/?api=1&query=${q}`;
          m.bindPopup(`
            <div class="pop">
              <div class="pop-title">${escapeHtml(firstEv.venue || firstEv.neighborhood || 'Multiple events')}</div>
              <div class="pop-meta">${items.length} events</div>
              ${listHtml}
              <div style="margin-top:10px;"><a class="pop-open" href="${mapsUrl}" target="_blank" rel="noopener">Open in Maps ↗</a></div>
            </div>
          `, { maxWidth: 320 });
        }
        markers.push(m);
      }

      const totalEvents = Object.values(days).reduce((a, d) => a + (d.events?.length || 0), 0);
      const filterNote = (state.activeCats.size || state.activeHoods.size) ? ' (filtered)' : '';
      const missNote = missing ? ` · ${missing} without coords` : '';
      setMapStatus(markers.length
        ? `${placed} event${placed === 1 ? '' : 's'} across ${markers.length} location${markers.length === 1 ? '' : 's'}${filterNote}${missNote}`
        : (totalEvents ? `No events match — try clearing filters${missNote}` : 'No events in the feed yet.'));

      if (!mapFittedOnce && markers.length) {
        const group = L.featureGroup(markers);
        try { mapInstance.fitBounds(group.getBounds(), { padding: [40, 40], maxZoom: 14 }); } catch (_) {}
        mapFittedOnce = true;
      }
    }

    function weatherTags(w) {
      if (!w) return new Set(['any']);
      const tags = new Set(['any']);
      const hi = Number(w.high ?? w.high_f ?? NaN);
      const lo = Number(w.low ?? w.low_f ?? NaN);
      const unit = (w.unit || (w.high_f != null ? 'F' : 'C')).toUpperCase();
      const hiC = unit === 'F' ? (hi - 32) * 5 / 9 : hi;
      const loC = unit === 'F' ? (lo - 32) * 5 / 9 : lo;
      const cond = (w.condition || '').toLowerCase();
      const precip = Number(w.precip_chance ?? 0);

      if (precip >= 50 || /rain|shower|storm|drizzle/.test(cond)) tags.add('rainy');
      if (hiC >= 28) tags.add('hot');
      if (hiC >= 22 && hiC < 28) tags.add('warm');
      if (hiC >= 15 && hiC < 22) tags.add('mild');
      if (hiC >= 8 && hiC < 15) tags.add('cool');
      if (hiC < 8 || loC < 2) tags.add('cold');
      if (/sun|clear/.test(cond) && precip < 30) tags.add('sunny');
      return tags;
    }

    // Deterministic mulberry32 for stable shuffles
    function makeRng(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    function seedFor(dateKey, n) {
      let h = 2166136261 >>> 0;
      const s = `${dateKey}|${n}`;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function scoreMove(move, tags) {
      let score = 0;
      const isOutdoor = move.vibe.includes('outdoor') || move.vibe.includes('picnic') || move.vibe.includes('sunset');
      const isCozy = move.vibe.includes('cozy') || move.vibe.includes('atmospheric') || move.vibe.includes('cinema');
      let weatherMatch = false;
      for (const w of move.weather) {
        if (w === 'any') { score += 1; continue; }
        if (tags.has(w)) { score += 3; weatherMatch = true; }
      }
      if (isOutdoor && tags.has('rainy')) score -= 6;
      if (isOutdoor && tags.has('cold')) score -= 3;
      if (isCozy && tags.has('rainy')) score += 2;
      if (isCozy && tags.has('cold')) score += 1;
      if (!weatherMatch && !move.weather.includes('any')) score -= 1;
      return score;
    }

    function pickPlan(dateKey, weather, seed) {
      const tags = weatherTags(weather);
      const rng = makeRng(seed);
      const scored = DATE_MOVES.map((m) => ({
        m,
        score: scoreMove(m, tags) + rng() * 0.99, // jitter for variety
      }));
      const byBand = new Map();
      for (const b of BANDS) byBand.set(b.id, []);
      for (const s of scored) byBand.get(s.m.band).push(s);
      for (const arr of byBand.values()) arr.sort((a, b) => b.score - a.score);
      // Layer in one curated event for the date if available.
      const payload = state.feed.days?.[dateKey];
      const events = payload?.events || [];
      const featuredEvent = events[0] || null;
      const featuredBand = featuredEvent ? bandForTime(featuredEvent.time) : null;
      const usedHoods = new Set();
      const plan = [];
      for (const band of BANDS) {
        if (featuredEvent && band.id === featuredBand) {
          plan.push({ band: band.id, label: band.label, fromEvent: true, ev: featuredEvent });
          if (featuredEvent.neighborhood) usedHoods.add(featuredEvent.neighborhood);
          continue;
        }
        const choices = byBand.get(band.id);
        const pick = choices.find((c) => !usedHoods.has(c.m.hood)) || choices[0];
        if (!pick) continue;
        plan.push({ band: band.id, label: band.label, fromEvent: false, move: pick.m });
        if (pick.m.hood) usedHoods.add(pick.m.hood);
      }
      return plan;
    }

    function bandForTime(t) {
      if (!t) return 'evening';
      const [h] = String(t).split(':').map(Number);
      if (h < 17) return 'afternoon';
      if (h < 20) return 'early';
      if (h < 22) return 'evening';
      return 'late';
    }

    function pickerDates(count = 8) {
      const arr = [];
      const start = new Date(state.todayKey + 'T00:00:00');
      for (let i = 0; i < count; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const key = isoDate(d.getFullYear(), d.getMonth(), d.getDate());
        arr.push({ key, d });
      }
      return arr;
    }

    function renderDateNight() {
      const dnDate = state.dnDate || state.todayKey;
      const picker = document.getElementById('dn-days');
      picker.innerHTML = '';
      for (const { key, d } of pickerDates(10)) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'dn-day-chip' + (key === dnDate ? ' is-active' : '');
        const dowIdx = (d.getDay() + 6) % 7;
        const dowLabel = key === state.todayKey ? 'Today' : DOW_LONG[dowIdx];
        btn.innerHTML = `<span class="dow">${dowLabel}</span><span class="num">${d.getDate()}</span>`;
        btn.addEventListener('click', () => {
          state.dnDate = key;
          state.dnSeed = 0;
          writeHash();
          renderDateNight();
        });
        picker.appendChild(btn);
      }

      const payload = state.feed.days?.[dnDate];
      const weather = payload?.weather;
      const hero = document.getElementById('dn-hero');
      const d = new Date(dnDate + 'T00:00:00');
      const dowIdx = (d.getDay() + 6) % 7;
      const dateBlock = `
        <div class="dn-hero-date">
          <small>${DOW_LONG[dowIdx]} · ${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}</small>
          ${d.getDate()}
        </div>
      `;
      let wxBlock = '<div class="dn-hero-weather"><div class="row"><span>No forecast for this day yet</span></div></div>';
      if (weather) {
        const hi = weather.high ?? weather.high_f;
        const lo = weather.low ?? weather.low_f;
        const unit = (weather.unit || (weather.high_f != null ? 'F' : 'C'));
        const tags = [...weatherTags(weather)].filter((t) => t !== 'any').join(' · ');
        wxBlock = `
          <div class="dn-hero-weather">
            <div class="row">
              <strong>${hi}° / ${lo}°${unit}</strong>
              <span>${escapeHtml(weather.condition || '')}</span>
              ${weather.sunset ? `<span>sunset ${escapeHtml(weather.sunset)}</span>` : ''}
              ${tags ? `<span>${escapeHtml(tags)}</span>` : ''}
            </div>
            ${weather.note ? `<div class="note">${escapeHtml(weather.note)}</div>` : ''}
          </div>
        `;
      }
      hero.innerHTML = dateBlock + wxBlock;

      const seed = seedFor(dnDate, state.dnSeed);
      const plan = pickPlan(dnDate, weather, seed);
      const list = document.getElementById('dn-plan');
      list.innerHTML = '';
      if (!plan.length) {
        list.innerHTML = '<li class="dn-empty">No plan to suggest — try shuffling.</li>';
      } else {
        for (const item of plan) {
          const li = document.createElement('li');
          li.className = 'dn-move';
          if (item.fromEvent) {
            const ev = item.ev;
            const evImg = imageForEvent(ev);
            const evCap = [ev.venue, ev.neighborhood].filter(Boolean).join(' · ');
            li.innerHTML = `
              <div class="dn-move-band">
                ${escapeHtml(item.label)}${ev.time ? ` · ${escapeHtml(fmtTime(ev.time))}` : ''}
                <span class="flag">★ on this week</span>
              </div>
              <div>
                <div class="dn-move-title" data-image="${escapeHtml(evImg)}"${evCap ? ` data-caption="${escapeHtml(evCap)}"` : ''}>${ev.url
                  ? `<a href="${escapeHtml(ev.url)}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
                  : escapeHtml(ev.title)}</div>
                ${ev.venue || ev.neighborhood
                  ? `<div class="dn-move-meta">${[ev.venue, ev.neighborhood].filter(Boolean).map(escapeHtml).join(' · ')}</div>`
                  : ''}
                ${ev.note ? `<div class="dn-move-blurb">${escapeHtml(ev.note)}</div>` : ''}
              </div>
            `;
          } else {
            const m = item.move;
            const mImg = imageForMove(m);
            li.innerHTML = `
              <div class="dn-move-band">${escapeHtml(item.label)}</div>
              <div>
                <div class="dn-move-title" data-image="${escapeHtml(mImg)}"${m.hood ? ` data-caption="${escapeHtml(m.hood)}"` : ''}>${escapeHtml(m.title)}</div>
                ${m.hood ? `<div class="dn-move-meta">${escapeHtml(m.hood)}</div>` : ''}
                <div class="dn-move-blurb">${escapeHtml(m.blurb)}</div>
              </div>
            `;
          }
          list.appendChild(li);
        }
      }
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ── Hover image preview ────────────────────────────
    // Priority:
    //   1. ev.image — real image scraped from the event's site (og:image)
    //      or passed through from RSS by the build pipeline. Always wins.
    //   2. Curated venue → URL map (so the well-known rooms — Smalls, Public
    //      Records, Bar Bayeux, Caveat, Lilia, Pioneer Works — show a
    //      recognisable photo today, before the next daily build runs).
    //   3. Topical fallback: LoremFlickr with category-aware keywords +
    //      a deterministic lock seed. A music event gets jazz/club/concert
    //      photos; an art event gets gallery/museum photos; a food event
    //      gets restaurant/interior photos. Far less random than picsum.

    // Hand-curated stable image URLs for the most-mentioned venues.
    // These are Wikimedia / OpenStreetMap-hosted assets so they don't 404
    // and don't need an API key. Keys are normalised lowercase venue names.
    const VENUE_IMAGES = {
      "smalls jazz club":   "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Smalls_Jazz_Club_NYC.jpg/640px-Smalls_Jazz_Club_NYC.jpg",
      "smalls":             "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Smalls_Jazz_Club_NYC.jpg/640px-Smalls_Jazz_Club_NYC.jpg",
      "brooklyn museum":    "https://upload.wikimedia.org/wikipedia/commons/thumb/6/64/Brooklyn_Museum_-_eastern_facade.jpg/640px-Brooklyn_Museum_-_eastern_facade.jpg",
      "mercury lounge":     "https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Mercury_Lounge_NYC.jpg/640px-Mercury_Lounge_NYC.jpg",
      "bowery ballroom":    "https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Bowery_Ballroom.jpg/640px-Bowery_Ballroom.jpg",
      "pioneer works":      "https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Pioneer_Works_Red_Hook.jpg/640px-Pioneer_Works_Red_Hook.jpg",
      "whitney museum":     "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Whitney_Museum_of_American_Art_-_Renzo_Piano.jpg/640px-Whitney_Museum_of_American_Art_-_Renzo_Piano.jpg",
      "the bell house":     "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/The_Bell_House_Brooklyn.jpg/640px-The_Bell_House_Brooklyn.jpg",
      "knockdown center":   "https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Knockdown_Center_Queens.jpg/640px-Knockdown_Center_Queens.jpg",
      "café carlyle":       "https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Cafe_Carlyle.jpg/640px-Cafe_Carlyle.jpg",
      "film forum":         "https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Film_Forum.jpg/640px-Film_Forum.jpg",
      "new museum":         "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/New_Museum_of_Contemporary_Art.jpg/640px-New_Museum_of_Contemporary_Art.jpg",
    };

    // LoremFlickr keyword tags per category. Multiple comma-separated tags
    // are ANDed, so "jazz,club,music" returns photos matching all three.
    const CATEGORY_IMAGE_TAGS = {
      music:     'jazz,club,music,stage',
      comedy:    'standup,microphone,stage,club',
      art:       'gallery,art,exhibition,museum',
      food:      'restaurant,interior,wine,dining',
      talk:      'library,books,lecture,bookstore',
      nightlife: 'nightclub,bar,party,night',
    };

    function fnvHash(s) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
      return h >>> 0;
    }

    function loremflickrUrl(tags, seedStr) {
      const lock = fnvHash(seedStr) % 1000000;
      return `https://loremflickr.com/640/400/${encodeURIComponent(tags)}?lock=${lock}`;
    }

    function imageForEvent(ev) {
      // 1. Real image from build pipeline / og:image scrape.
      if (ev && ev.image && /^https?:/i.test(ev.image)) return ev.image;
      // 2. Curated venue overrides.
      const v = (ev?.venue || '').toLowerCase().trim().replace(/[’`]/g, "'").replace(/\s+/g, ' ');
      if (v && VENUE_IMAGES[v]) return VENUE_IMAGES[v];
      if (v) {
        for (const key in VENUE_IMAGES) { if (v.includes(key) || key.includes(v)) return VENUE_IMAGES[key]; }
      }
      // 3. Topical loremflickr fallback (category keywords + brooklyn).
      const cat = (ev?.category || 'music').toLowerCase();
      const baseTags = CATEGORY_IMAGE_TAGS[cat] || 'newyork,brooklyn';
      const tags = `${baseTags},brooklyn`;
      const seedStr = `${ev?.title || ''}|${ev?.venue || ''}|${cat}`;
      return loremflickrUrl(tags, seedStr);
    }

    function imageForMove(m) {
      // Date-night moves: treat as music by default unless the vibe is food/art.
      const vibe = (m?.vibe || []).join(',').toLowerCase();
      const cat = /food|restaurant|cocktail|wine/.test(vibe) ? 'food'
                : /art|gallery|museum|cinema/.test(vibe) ? 'art'
                : /comedy|karaoke/.test(vibe) ? 'comedy'
                : /late|nightlife|club/.test(vibe) ? 'nightlife'
                : 'music';
      const tags = `${CATEGORY_IMAGE_TAGS[cat]},brooklyn`;
      return loremflickrUrl(tags, `dn-${m?.id || m?.title || cat}`);
    }

    const preview = {
      el: null,
      img: null,
      cap: null,
      visible: false,
      hideTimer: null,
      currentSrc: null,
      init() {
        this.el  = document.getElementById('title-preview');
        this.img = document.getElementById('title-preview-img');
        this.cap = document.getElementById('title-preview-cap');
        if (!this.el || !this.img) return;
        // Bail entirely on touch / coarse pointer devices.
        if (window.matchMedia('(hover: none), (pointer: coarse)').matches) {
          this.el.remove();
          return;
        }
        this.img.addEventListener('error', () => this.hide(true));
        document.addEventListener('mouseover', this.onOver.bind(this));
        document.addEventListener('mouseout', this.onOut.bind(this));
        document.addEventListener('mousemove', this.onMove.bind(this), { passive: true });
        // If the user starts scrolling, hide so it doesn't drift mid-page.
        window.addEventListener('scroll', () => this.hide(true), { passive: true });
      },
      target(el) {
        while (el && el.nodeType === 1 && el !== document.body) {
          if (el.dataset && el.dataset.image) return el;
          el = el.parentElement;
        }
        return null;
      },
      onOver(e) {
        if (!this.el) return;
        const t = this.target(e.target);
        if (!t) return;
        const src = t.dataset.image;
        const caption = t.dataset.caption || '';
        if (this.currentSrc !== src) {
          this.img.src = src;
          this.currentSrc = src;
        }
        this.cap.textContent = caption;
        this.cap.style.display = caption ? 'block' : 'none';
        if (this.hideTimer) { clearTimeout(this.hideTimer); this.hideTimer = null; }
        this.position(e);
        this.show();
      },
      onOut(e) {
        if (!this.el || !this.visible) return;
        const next = this.target(e.relatedTarget);
        if (next) return;
        if (this.hideTimer) clearTimeout(this.hideTimer);
        this.hideTimer = setTimeout(() => this.hide(), 80);
      },
      onMove(e) {
        if (!this.el || !this.visible) return;
        this.position(e);
      },
      position(e) {
        const w = this.el.offsetWidth  || 320;
        const h = this.el.offsetHeight || 200;
        const pad = 18;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let x = e.clientX + pad;
        let y = e.clientY + pad;
        if (x + w > vw - 8) x = e.clientX - w - pad;
        if (y + h > vh - 8) y = e.clientY - h - pad;
        if (x < 8) x = 8;
        if (y < 8) y = 8;
        this.el.style.left = `${Math.round(x)}px`;
        this.el.style.top  = `${Math.round(y)}px`;
      },
      show() {
        this.visible = true;
        this.el.classList.add('is-visible');
      },
      hide(force) {
        this.visible = false;
        if (this.el) this.el.classList.remove('is-visible');
        if (force && this.hideTimer) { clearTimeout(this.hideTimer); this.hideTimer = null; }
      },
    };

    function scrollToToday() {
      scrollToDate(state.todayKey, 'smooth');
    }
    // No-op kept so callers don't need null checks; the IntersectionObserver
    // is gone with the floating Today button.
    function observeToday() {}

    function scrollToDate(key, behavior = 'smooth') {
      const el = document.querySelector(`#calendar [data-date="${key}"]`);
      if (!el) return;
      // scrollIntoView + CSS scroll-margin-top on .day handles the sticky
      // filter bar offset automatically and re-resolves after layout shifts.
      el.scrollIntoView({ block: 'start', behavior });
    }

    function setLinkedDate(key) {
      // Clicking the date numeral toggles the day's expanded state AND the
      // URL-shareable link. All in-place — no calendar re-render so the
      // page doesn't jump.
      const wasExpanded = state.expandedDates.has(key);

      // Unlink whatever was previously linked.
      if (state.linkedDate && state.linkedDate !== key) {
        const prev = document.querySelector(`.day[data-date="${state.linkedDate}"]`);
        if (prev) prev.classList.remove('is-linked');
      }

      const dayEl = document.querySelector(`.day[data-date="${key}"]`);
      if (wasExpanded) {
        state.expandedDates.delete(key);
        state.linkedDate = null;
        if (dayEl) dayEl.classList.remove('is-expanded', 'is-linked');
      } else {
        state.expandedDates.add(key);
        state.linkedDate = key;
        if (dayEl) dayEl.classList.add('is-expanded', 'is-linked');
      }
      if (dayEl) updateMoreLabel(dayEl, key);
      writeHash();
      if (!wasExpanded) requestAnimationFrame(() => scrollToDate(key, 'smooth'));
    }

    // ── URL hash sync ──────────────────────────────────
    let suppressHash = false;
    function parseHash() {
      const h = location.hash.replace(/^#/, '');
      if (!h) return {};
      const params = new URLSearchParams(h);
      const out = {};
      if (params.has('c')) out.cats = params.get('c').split(',').filter(Boolean);
      if (params.has('n')) out.hoods = params.get('n').split(',').filter(Boolean);
      if (params.has('w')) out.weather = params.get('w') !== '0';
      if (params.has('d')) out.date = params.get('d');
      if (params.has('v')) out.view = params.get('v');
      if (params.has('dn')) out.dnDate = params.get('dn');
      if (params.has('s')) out.dnSeed = parseInt(params.get('s'), 10) || 0;
      return out;
    }

    function writeHash() {
      if (suppressHash) return;
      const params = new URLSearchParams();
      if (state.activeCats.size) params.set('c', [...state.activeCats].join(','));
      if (state.activeHoods.size) params.set('n', [...state.activeHoods].join(','));
      if (!state.showWeather) params.set('w', '0');
      if (state.linkedDate) params.set('d', state.linkedDate);
      // Persist non-default view. Month is the default so we omit it.
      if (state.view && state.view !== 'month') params.set('v', state.view);
      if (state.view === 'dn' && state.dnDate) params.set('dn', state.dnDate);
      if (state.view === 'dn' && state.dnSeed) params.set('s', String(state.dnSeed));
      const str = params.toString();
      const target = str ? `#${str}` : '';
      const current = location.hash || '';
      if (current === target) return;
      const url = `${location.pathname}${location.search}${target}`;
      history.replaceState(null, '', url || location.pathname);
    }

    function applyHashState() {
      const h = parseHash();
      if (h.cats) state.activeCats = new Set(h.cats.filter((c) => CATEGORIES.includes(c)));
      if (h.hoods) state.activeHoods = new Set(h.hoods);
      if (typeof h.weather === 'boolean') {
        state.showWeather = h.weather;
        document.body.classList.toggle('hide-weather', !state.showWeather);
        const wbtn = document.getElementById('meta-weather');
        if (wbtn) {
          wbtn.setAttribute('aria-pressed', state.showWeather ? 'true' : 'false');
          wbtn.classList.toggle('is-active', state.showWeather);
        }
      }
      if (h.date && /^\d{4}-\d{2}-\d{2}$/.test(h.date)) {
        state.linkedDate = h.date;
        state.expandedDates.add(h.date);
      }
      if (h.view) state.view = normalizeView(h.view);
      if (h.dnDate && /^\d{4}-\d{2}-\d{2}$/.test(h.dnDate)) state.dnDate = h.dnDate;
      if (Number.isFinite(h.dnSeed)) state.dnSeed = h.dnSeed;
    }

    // ── Sources sheet ──────────────────────────────────
    function renderSourcesSheet() {
      const meta = state.feed.meta || {};
      const sub = document.getElementById('sources-sheet-sub');
      const gen = state.feed.generated_at || '';
      const genShort = gen.slice(0, 10) || '—';
      sub.textContent = `Edition ${state.feed.edition || '01'} · ${genShort}`;

      const body = document.getElementById('sources-body');
      const sources = meta.sources || [];
      const weather = meta.weather || {};
      const ranker = meta.ranker || {};
      const stats = meta.stats || {};
      const images = meta.images || {};

      const fmtAgo = (iso) => {
        if (!iso) return '';
        const ms = Date.now() - Date.parse(iso);
        if (!Number.isFinite(ms) || ms < 0) return '';
        const m = Math.round(ms / 60000);
        if (m < 1) return 'just now';
        if (m < 60) return `${m}m ago`;
        const h = Math.round(m / 60);
        if (h < 24) return `${h}h ago`;
        return `${Math.round(h / 24)}d ago`;
      };

      const sourcesHtml = sources.length
        ? sources.map((s) => {
            const failed = !!s.error;
            const empty = !failed && (s.kept ?? 0) === 0;
            const cls = failed ? ' has-error' : (empty ? ' is-empty' : ' is-ok');
            const status = failed ? '✗ failed' : (empty ? '— no items' : `${s.kept} items`);
            const fetched = s.fetched_at
              ? `${escapeHtml(s.fetched_at.slice(0, 16).replace('T', ' '))} UTC · ${fmtAgo(s.fetched_at)}`
              : (gen ? `${escapeHtml(gen.slice(0, 16).replace('T', ' '))} UTC · ${fmtAgo(gen)}` : '');
            const fetchedHtml = fetched
              ? `<div class="source-fetched">Scraped ${fetched}</div>`
              : '';
            const errHtml = failed
              ? `<div class="source-err">${escapeHtml(s.error)}</div>`
              : '';
            return `
              <div class="source-row${cls}">
                <div class="source-dot" aria-hidden="true"></div>
                <div class="source-name">${escapeHtml(s.name)}</div>
                <div class="source-count">${escapeHtml(status)}</div>
                ${fetchedHtml}
                <a class="source-url" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.url)}</a>
                ${errHtml}
              </div>
            `;
          }).join('')
        : '<p class="sheet-sub" style="text-transform:none; letter-spacing:0;">No source data in this build yet.</p>';

      const ok = sources.filter((s) => !s.error && (s.kept ?? 0) > 0).length;
      const failed = sources.filter((s) => s.error).length;
      const empty = sources.filter((s) => !s.error && (s.kept ?? 0) === 0).length;
      const sourcesSummary = sources.length
        ? `<div class="sheet-summary"><span class="ok">${ok} ok</span>${failed ? ` <span class="bad">· ${failed} failed</span>` : ''}${empty ? ` <span class="muted">· ${empty} empty</span>` : ''}</div>`
        : '';

      const weatherHtml = `
        <dl class="kv">
          <dt>Provider</dt><dd>${weather.url
            ? `<a href="${escapeHtml(weather.url)}" target="_blank" rel="noopener">${escapeHtml(weather.provider || 'Open-Meteo')}</a>`
            : escapeHtml(weather.provider || 'Open-Meteo')}</dd>
          <dt>Location</dt><dd>${escapeHtml(weather.location || 'Brooklyn, NYC')}</dd>
          <dt>Unit</dt><dd>${escapeHtml(weather.unit || 'C')}</dd>
          <dt>Days</dt><dd>${weather.days ?? '—'}</dd>
        </dl>
      `;

      const rankerHtml = `
        <dl class="kv">
          <dt>Model</dt><dd>${escapeHtml(ranker.model || 'claude-opus-4-7')}</dd>
          <dt>Provider</dt><dd>${escapeHtml(ranker.provider || 'Anthropic')}</dd>
          <dt>Days ranked</dt><dd>${ranker.ranked_days ?? '—'}</dd>
        </dl>
      `;

      const statsHtml = `
        <dl class="kv">
          <dt>Items pulled</dt><dd>${stats.items_pulled ?? '—'}</dd>
          <dt>Events curated</dt><dd>${stats.events_curated ?? '—'}</dd>
          <dt>Days covered</dt><dd>${stats.days_covered ?? '—'}</dd>
          <dt>Generated</dt><dd>${escapeHtml(gen || '—')}</dd>
        </dl>
      `;

      const imagesHasData = images && (images.from_og != null || images.from_rss != null || images.from_cache != null || images.missing != null);
      const imagesHtml = imagesHasData ? `
        <dl class="kv">
          <dt>From og:image</dt><dd>${images.from_og ?? 0}</dd>
          <dt>From RSS feed</dt><dd>${images.from_rss ?? 0}</dd>
          <dt>Cached</dt><dd>${images.from_cache ?? 0}</dd>
          <dt>Fallback (picsum)</dt><dd>${images.missing ?? 0}</dd>
        </dl>
      ` : '<p class="sheet-sub" style="text-transform:none; letter-spacing:0;">Image scrape not run yet — picsum fallback in use.</p>';

      const howHtml = `
        <div class="sheet-prose">
          <p>This page rebuilds itself once a day, around 5 a.m. New York time. A GitHub Action does the work and commits the new <code>feed.json</code> to <code>main</code>; Vercel auto-deploys the static page.</p>
          <p>Each build runs four steps in order:</p>
          <ol>
            <li><strong>Pull RSS.</strong> Five NYC culture feeds (Eater NY, The Skint, Bedford + Bowery, Brooklyn Vegan, Hyperallergic). Items older than 21 days are dropped; up to 25 per feed are kept. Failures don't kill the build — see the per-feed status below.</li>
            <li><strong>Pull weather.</strong> Open-Meteo's free 16-day forecast for Brooklyn (40.6782, -73.9442). No API key.</li>
            <li><strong>Rank with Claude.</strong> Items + the private taste profile (stored as a GitHub Actions secret) go to Claude Opus 4.7 with adaptive thinking. Claude extracts each event, picks a category, writes a one-sentence note in your voice. Output is JSON-schema-validated, so the shape of the result is guaranteed.</li>
            <li><strong>Scrape hover images.</strong> For each ranked event the script fetches its URL with a 6-second timeout, reads the first 200 KB, and pulls <code>og:image</code> / <code>twitter:image</code> from the head. Already-scraped images from yesterday's feed are cached and reused for free.</li>
          </ol>
          <p>The Action runs daily on schedule and can also be triggered manually from the repo's Actions tab → <em>daily build</em> → Run workflow. If a feed errors or a scrape misses, the rest still ships — the hover preview just falls back to a category-keyword photo from LoremFlickr.</p>
        </div>
      `;

      body.innerHTML = `
        <section class="sheet-section">
          <h3>How this is built</h3>
          ${howHtml}
        </section>
        <section class="sheet-section">
          <h3>Feeds — last build</h3>
          <p>What each RSS source contributed to this edition. A green dot is a successful pull, amber means the feed returned but had no items in the time window, red is a failure (error message below).</p>
          ${sourcesSummary}
          ${sourcesHtml}
        </section>
        <section class="sheet-section">
          <h3>Weather</h3>
          <p>Pulled from Open-Meteo. No API key, no auth, free for non-commercial use.</p>
          ${weatherHtml}
        </section>
        <section class="sheet-section">
          <h3>Ranker</h3>
          <p>Claude Opus 4.7 with adaptive thinking, structured output (JSON schema), and prompt-cached system prompt so the daily run stays cheap.</p>
          ${rankerHtml}
        </section>
        <section class="sheet-section">
          <h3>Hover images</h3>
          <p>Real images come from the build's <code>og:image</code> scrape over each event's URL; what didn't scrape falls back first to a curated venue→photo map, then to LoremFlickr with category-aware keywords.</p>
          ${imagesHtml}
        </section>
        <section class="sheet-section">
          <h3>This edition</h3>
          ${statsHtml}
        </section>
      `;
    }

    function openSourcesSheet() {
      renderSourcesSheet();
      const dlg = document.getElementById('sources-sheet');
      if (typeof dlg.showModal === 'function') dlg.showModal();
      else dlg.setAttribute('open', '');
    }

    function closeSourcesSheet() {
      const dlg = document.getElementById('sources-sheet');
      if (typeof dlg.close === 'function') dlg.close();
      else dlg.removeAttribute('open');
    }

    // ── Init ───────────────────────────────────────────
    async function init() {
      preview.init();
      try {
        const res = await fetch('feed.json', { cache: 'no-store' });
        if (res.ok) state.feed = await res.json();
      } catch (_) { /* empty year is fine */ }

      const today = new Date();
      state.todayKey = isoDate(today.getFullYear(), today.getMonth(), today.getDate());
      // Today expanded by default
      state.expandedDates.add(state.todayKey);

      document.getElementById('meta-edition').textContent = `Edition ${state.feed.edition || '01'}`;
      document.getElementById('meta-date').textContent = state.feed.generated_at || state.todayKey;

      // Filters depend on feed (for neighborhoods), so render after fetch.
      suppressHash = true;
      renderFilters();
      applyHashState();
      // Drop hood slugs that don't exist in the current feed.
      for (const slug of [...state.activeHoods]) {
        if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
      }
      updateCategoryChips();
      updateHoodChips();
      suppressHash = false;

      renderCalendar();

      // Apply view from URL (default calendar). setView({silent}) — don't rewrite hash.
      setView(state.view, { silent: true });

      // Scroll target: linked date from hash, else today.
      // Picks renders after fetch and changes layout height, so we double-RAF
      // + a fallback setTimeout to make sure today is the landing position
      // regardless of when layout settles.
      const target = state.linkedDate || state.todayKey;
      const goToTarget = () => {
        if (state.view === 'month') scrollToDate(target, 'instant');
      };
      requestAnimationFrame(() => {
        goToTarget();
        requestAnimationFrame(() => {
          goToTarget();
          setTimeout(() => { goToTarget(); observeToday(); }, 80);
        });
      });

      // Sources is now a floating info icon in the bottom-right cluster.
      document.getElementById('action-sources').addEventListener('click', openSourcesSheet);
      document.getElementById('sources-close').addEventListener('click', closeSourcesSheet);

      // Today tab → snap to today (Month view), no separate Today page.
      const todayTab = document.getElementById('tab-today');
      if (todayTab) {
        todayTab.addEventListener('click', () => {
          if (state.view !== 'month') transitionTo('month');
          requestAnimationFrame(() => scrollToDate(state.todayKey, 'smooth'));
        });
      }

      // Bottom-right floating cluster — Date night + Map icons.
      document.querySelectorAll('.float-btn[data-view]').forEach((b) => {
        b.addEventListener('click', () => transitionTo(b.dataset.view));
      });

      // Categories dropdown toggle
      document.getElementById('cat-dropdown-btn').addEventListener('click', () => {
        const btn = document.getElementById('cat-dropdown-btn');
        if (btn.getAttribute('aria-expanded') === 'true') closeCatDropdown();
        else openCatDropdown();
      });
      // Neighborhood dropdown toggle
      document.getElementById('hood-dropdown-btn').addEventListener('click', () => {
        const btn = document.getElementById('hood-dropdown-btn');
        if (btn.getAttribute('aria-expanded') === 'true') closeHoodDropdown();
        else openHoodDropdown();
      });
      // View dropdown toggle (mobile-only) — collapses Today/Week/Month/Year
      // tabs into one panel so the 375px iPhone topbar fits.
      const viewBtn = document.getElementById('view-dropdown-btn');
      if (viewBtn) viewBtn.addEventListener('click', () => {
        if (viewBtn.getAttribute('aria-expanded') === 'true') closeViewDropdown();
        else openViewDropdown();
      });
      // My Usuals — show more / show fewer
      const picksMore = document.getElementById('picks-more');
      if (picksMore) picksMore.addEventListener('click', togglePicksExpanded);
      // Only tabs with data-view trigger a view change; Sources/Weather
      // are visually tab-styled but wired separately above.
      document.querySelectorAll('.tab[data-view]').forEach((b) => {
        b.addEventListener('click', () => transitionTo(b.dataset.view));
      });
      document.getElementById('dn-shuffle').addEventListener('click', () => {
        state.dnSeed = (state.dnSeed + 1) >>> 0 || 1;
        writeHash();
        renderDateNight();
      });
      const sheet = document.getElementById('sources-sheet');
      // Click outside the sheet content (on the dialog itself / backdrop) closes it.
      sheet.addEventListener('click', (e) => {
        if (e.target === sheet) closeSourcesSheet();
      });
      window.addEventListener('resize', updateFilterHeight, { passive: true });
      window.addEventListener('hashchange', () => {
        suppressHash = true;
        state.activeCats = new Set();
        state.activeHoods = new Set();
        state.showWeather = true;
        state.linkedDate = null;
        state.view = 'month';
        state.dnDate = null;
        state.dnSeed = 0;
        document.body.classList.remove('hide-weather');
        applyHashState();
        for (const slug of [...state.activeHoods]) {
          if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
        }
        updateCategoryChips();
        updateHoodChips();
        renderCalendar();
        setView(state.view, { silent: true });
        refreshMapMarkers();
        suppressHash = false;
        if (state.view === 'month' && state.linkedDate) scrollToDate(state.linkedDate, 'smooth');
      });
    }

    init();
  </script>
</body>
</html>

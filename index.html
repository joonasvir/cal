<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — NYC</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      --ink: #000;
      --paper: #fff;
      --rule: #000;
      --soft: rgba(0, 0, 0, 0.4);
      --softer: rgba(0, 0, 0, 0.2);
      --softest: rgba(0, 0, 0, 0.08);
      --pad-x: clamp(20px, 4vw, 80px);
      --filter-row-h: 56px;
      --filter-h: 56px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-feature-settings: 'cv11', 'ss03';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @supports (font-variation-settings: normal) {
      body { font-family: 'InterVariable', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    }

    /* ── Masthead ───────────────────────────────────────── */
    .masthead {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: start;
      font-size: 12px;
      letter-spacing: 0.01em;
      line-height: 1.4;
      padding: clamp(28px, 4vw, 56px) var(--pad-x) clamp(24px, 4vw, 48px);
    }
    .masthead .meta-right { text-align: right; }
    .masthead .meta-label { display: block; }

    .meta-btn {
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: inherit;
      cursor: pointer;
      display: block;
    }
    .meta-btn .meta-label { display: block; }
    .meta-btn .meta-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      font-weight: 600;
      margin-top: 6px;
      border-bottom: 1.5px solid var(--ink);
      padding-bottom: 2px;
    }
    .meta-btn .meta-cta::after {
      content: '↗';
      font-weight: 400;
      letter-spacing: 0;
    }
    .meta-btn:hover .meta-cta { opacity: 0.6; }
    .meta-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }

    /* ── Sources sheet (dialog) ─────────────────────────── */
    .sheet {
      padding: 0;
      border: 1px solid var(--rule);
      background: var(--paper);
      color: var(--ink);
      width: min(560px, calc(100vw - 32px));
      max-height: min(80vh, 720px);
      overflow: hidden;
      margin: auto;
    }
    .sheet::backdrop { background: rgba(0, 0, 0, 0.5); }
    .sheet:not([open]) { display: none; }
    .sheet-inner { display: flex; flex-direction: column; max-height: inherit; }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding: 22px 26px 14px;
      border-bottom: 1px solid var(--rule);
    }
    .sheet-titles { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .sheet-title {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1;
    }
    .sheet-sub {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
    }
    .sheet-close {
      appearance: none;
      background: none;
      border: 0;
      padding: 4px 8px;
      margin: -4px -6px 0 0;
      font: inherit;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      color: var(--soft);
    }
    .sheet-close:hover { color: var(--ink); }
    .sheet-body { padding: 16px 26px 24px; overflow: auto; }
    .sheet-section + .sheet-section { margin-top: 22px; }
    .sheet-section h3 {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0 0 10px;
      font-weight: 500;
    }
    .source-row {
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 16px;
      row-gap: 2px;
      padding: 10px 0;
      border-top: 1px solid var(--softest);
    }
    .source-row:first-child { border-top: 0; padding-top: 4px; }
    .source-name { font-size: 14px; font-weight: 500; }
    .source-count {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      color: var(--soft);
      align-self: center;
    }
    .source-row.has-error .source-count { color: #b00020; }
    .source-url {
      grid-column: 1 / -1;
      font-size: 11px;
      color: var(--soft);
      font-family: ui-monospace, 'JetBrains Mono', SF Mono, Menlo, monospace;
      word-break: break-all;
      text-decoration: none;
    }
    .source-url:hover { color: var(--ink); }
    .kv {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 16px;
      font-size: 13px;
    }
    .kv dt { color: var(--soft); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; align-self: center; }
    .kv dd { margin: 0; font-variant-numeric: tabular-nums; }
    .kv dd a { color: inherit; }
    .sheet-foot {
      padding: 12px 26px 18px;
      border-top: 1px solid var(--softest);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .sheet-foot a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--softer); }
    .sheet-foot a:hover { color: var(--ink); border-bottom-color: var(--ink); }
    .masthead .title {
      grid-column: 1 / -1;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 500;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-top: clamp(20px, 3vw, 36px);
    }

    /* ── Mode tabs (above filters) ─────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 var(--pad-x);
      border-top: 1px solid var(--rule);
      background: var(--paper);
    }
    .tab {
      appearance: none;
      background: none;
      border: 0;
      padding: 14px 0;
      margin-right: 28px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .tab:hover { color: var(--ink); }
    .tab.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }

    /* ── Filter bar (sticky) ───────────────────────────── */
    .filters {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .filter-row {
      height: var(--filter-row-h);
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vw, 24px);
      padding: 0 var(--pad-x);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      white-space: nowrap;
    }
    .filter-row + .filter-row { border-top: 1px solid var(--softest); }
    .filter-row[hidden] { display: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-group {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.5vw, 22px);
    }
    .filter-group-end {
      margin-left: auto;
      padding-left: clamp(16px, 2vw, 32px);
      border-left: 1px solid var(--softer);
    }
    .filter-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--softer);
      padding-right: 2px;
    }
    .chip {
      appearance: none;
      background: none;
      border: 0;
      padding: 6px 0;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .chip:hover { color: var(--ink); }
    .chip.is-active {
      color: var(--ink);
      font-weight: 600;
      border-bottom-color: var(--ink);
    }
    .chip.weather::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      margin-left: 6px;
      vertical-align: 1px;
      background: var(--softer);
      transition: background 120ms ease;
    }
    .chip.weather.is-active::after { background: var(--ink); }

    /* ── Month section ──────────────────────────────────── */
    .month {
      padding: 0 var(--pad-x);
    }
    .month-title {
      position: sticky;
      top: var(--filter-h);
      z-index: 20;
      background: var(--paper);
      font-size: clamp(56px, 11vw, 180px);
      font-weight: 500;
      line-height: 1.02;
      letter-spacing: -0.045em;
      margin: 0;
      padding: clamp(28px, 4vw, 56px) 0 clamp(20px, 3vw, 36px);
      border-bottom: 1px solid var(--rule);
    }

    /* ── Day row ────────────────────────────────────────── */
    .day {
      display: grid;
      grid-template-columns: minmax(180px, 22%) minmax(0, 1fr);
      gap: clamp(20px, 3vw, 56px);
      padding: clamp(18px, 2.5vw, 32px) 0;
      border-bottom: 1px solid var(--rule);
      align-items: start;
    }
    .day.is-today .numeral { font-weight: 700; }
    .day.is-today .dow .active {
      background: var(--ink);
      color: var(--paper);
      padding: 0 3px;
    }

    .day-marker {
      align-self: start;
      appearance: none;
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      font: inherit;
      color: inherit;
      text-align: left;
      display: block;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .day-marker:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }
    .numeral { display: inline-block; }
    .day.is-linked .numeral {
      background: var(--ink);
      color: var(--paper);
      padding: 0 6px;
      margin-left: -6px;
    }
    .day-marker:hover .numeral { color: var(--softer); }
    .day.is-linked .day-marker:hover .numeral { color: var(--paper); opacity: 0.85; }
    .dow {
      display: flex;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.18em;
      font-weight: 400;
      margin-bottom: clamp(10px, 1.2vw, 18px);
      text-transform: uppercase;
    }
    .dow span {
      color: var(--softer);
      width: 1ch;
      text-align: center;
    }
    .dow span.active {
      color: var(--ink);
      font-weight: 600;
    }
    .numeral {
      font-size: clamp(72px, 11vw, 160px);
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: -0.055em;
      font-variant-numeric: lining-nums;
    }

    .day-content {
      padding-top: 6px;
      min-width: 0;
    }

    /* ── Weather row ────────────────────────────────────── */
    .weather {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--rule);
    }
    .weather-left { display: flex; gap: 16px; flex-wrap: wrap; }
    .weather-temp { font-feature-settings: 'tnum'; }
    .weather-mood { color: var(--soft); }
    .weather-right { color: var(--soft); }
    body.hide-weather .weather { display: none; }

    /* ── Events list ────────────────────────────────────── */
    .events {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .event {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 18px;
      padding: 12px 0;
      align-items: baseline;
    }
    .event + .event { border-top: 1px solid var(--softest); }
    .event-time {
      font-size: 11px;
      letter-spacing: 0.08em;
      font-feature-settings: 'tnum';
      color: var(--soft);
      padding-top: 3px;
    }
    .event-body { min-width: 0; }
    .event-title {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.3;
      letter-spacing: -0.005em;
    }
    .event-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease;
    }
    .event-title a:hover { border-bottom-color: var(--ink); }
    .event-meta {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .event-note {
      font-size: 13.5px;
      line-height: 1.5;
      margin-top: 6px;
      max-width: 68ch;
    }
    .event-cat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--soft);
      padding-top: 4px;
      text-align: right;
    }

    /* ── Show more ──────────────────────────────────────── */
    .day .event.is-hidden { display: none; }
    .day.is-expanded .event.is-hidden { display: grid; }
    .more {
      appearance: none;
      background: none;
      border: 0;
      padding: 14px 0 4px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .more::before {
      content: '+';
      font-size: 14px;
      line-height: 1;
    }
    .more:hover { color: var(--ink); }
    .day.is-expanded .more::before { content: '–'; }

    /* ── Empty day ──────────────────────────────────────── */
    .day.is-empty .weather { display: none; }
    .day.is-empty .day-content::before {
      content: '—';
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--softer);
      text-transform: uppercase;
      padding-top: 8px;
    }

    /* ── Date Night view ───────────────────────────────── */
    body[data-view="dn"] #calendar { display: none; }
    body[data-view="calendar"] #date-night { display: none; }
    body[data-view="dn"] .today-btn { display: none; }
    /* The category/hood/weather chips don't apply to the planner. */
    body[data-view="dn"] .filters { display: none; }

    #date-night {
      padding: clamp(24px, 4vw, 48px) var(--pad-x) clamp(40px, 6vw, 80px);
    }
    .dn-day-picker {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: clamp(20px, 3vw, 32px);
    }
    .dn-day-picker::-webkit-scrollbar { display: none; }
    .dn-day-chip {
      appearance: none;
      background: none;
      border: 1px solid var(--softer);
      padding: 10px 14px 8px;
      font: inherit;
      cursor: pointer;
      text-align: left;
      min-width: 76px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }
    .dn-day-chip .dow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin: 0;
      display: block;
    }
    .dn-day-chip .num {
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
      font-variant-numeric: lining-nums;
    }
    .dn-day-chip:hover { border-color: var(--ink); }
    .dn-day-chip.is-active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    .dn-day-chip.is-active .dow { color: var(--paper); opacity: 0.7; }

    .dn-hero {
      border-top: 1px solid var(--rule);
      padding-top: clamp(20px, 3vw, 32px);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: clamp(24px, 4vw, 56px);
      align-items: end;
      margin-bottom: clamp(32px, 4vw, 56px);
    }
    .dn-hero-date {
      font-size: clamp(64px, 10vw, 140px);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 0.9;
      font-variant-numeric: lining-nums;
    }
    .dn-hero-date small {
      display: block;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 400;
      margin-bottom: 10px;
    }
    .dn-hero-weather {
      padding-bottom: 8px;
    }
    .dn-hero-weather .row {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--soft);
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: baseline;
    }
    .dn-hero-weather .row strong {
      color: var(--ink);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .dn-hero-weather .note {
      font-size: 14px;
      line-height: 1.4;
      margin-top: 10px;
      color: var(--ink);
      max-width: 48ch;
    }

    .dn-plan-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px solid var(--rule);
      padding-top: clamp(20px, 3vw, 32px);
      margin-bottom: clamp(16px, 2vw, 24px);
    }
    .dn-plan-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .dn-shuffle {
      appearance: none;
      background: none;
      border: 1px solid var(--ink);
      padding: 9px 14px 8px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dn-shuffle:hover { background: var(--ink); color: var(--paper); }
    .dn-shuffle::after { content: '↻'; font-weight: 400; }

    .dn-plan { list-style: none; padding: 0; margin: 0; }
    .dn-move {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: clamp(16px, 2.5vw, 40px);
      padding: clamp(16px, 2.5vw, 24px) 0;
      border-bottom: 1px solid var(--softest);
      align-items: start;
    }
    .dn-move:last-child { border-bottom: 0; }
    .dn-move-band {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      padding-top: 6px;
    }
    .dn-move-band .flag {
      display: inline-block;
      margin-top: 6px;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--ink);
      border-top: 1px solid var(--softer);
      padding-top: 6px;
    }
    .dn-move-title {
      font-size: clamp(18px, 2.5vw, 22px);
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: -0.005em;
    }
    .dn-move-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .dn-move-title a:hover { border-bottom-color: var(--ink); }
    .dn-move-meta {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--soft);
      margin-top: 4px;
    }
    .dn-move-blurb {
      font-size: 14.5px;
      line-height: 1.5;
      margin-top: 8px;
      max-width: 60ch;
    }

    .dn-empty {
      font-size: 14px;
      color: var(--soft);
      padding: 24px 0;
    }

    /* ── Floating today button ──────────────────────────── */
    .today-btn {
      position: fixed;
      right: clamp(20px, 4vw, 56px);
      bottom: clamp(20px, 3vw, 40px);
      z-index: 40;
      background: var(--ink);
      color: var(--paper);
      border: 0;
      padding: 14px 22px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .today-btn.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .today-btn::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      margin-right: 8px;
      background: var(--paper);
      vertical-align: 1px;
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 720px) {
      :root {
        --pad-x: clamp(16px, 5vw, 24px);
        --filter-row-h: 48px;
        --filter-h: 48px;
      }
      /* Filters: on mobile the weather chip flows inline in the same lane
         (auto-margin + overflow scroll pushed it off-screen). */
      .filter-group-end {
        margin-left: 0;
        padding-left: clamp(12px, 3vw, 18px);
        border-left: 1px solid var(--softer);
      }
      .chip { font-size: 10px; letter-spacing: 0.12em; }
      .filter-label { font-size: 9px; }

      .masthead {
        grid-template-columns: 1fr;
        gap: 4px;
        padding: 24px var(--pad-x) 24px;
      }
      .masthead .meta-right { text-align: left; }
      .masthead .title {
        font-size: clamp(24px, 7vw, 32px);
        margin-top: 16px;
      }

      .month-title {
        font-size: clamp(56px, 18vw, 96px);
        padding: 24px 0 16px;
      }

      .day {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 18px 0;
      }
      .dow { margin-bottom: 6px; font-size: 10px; gap: 5px; }
      .numeral {
        font-size: clamp(52px, 16vw, 80px);
        letter-spacing: -0.045em;
        line-height: 1;
      }
      .day-content { padding-top: 4px; }

      .weather {
        flex-wrap: wrap;
        font-size: 10px;
        gap: 8px 12px;
        padding-bottom: 8px;
        margin-bottom: 14px;
      }
      .weather-right { width: 100%; }

      .event { grid-template-columns: 44px 1fr; gap: 12px; padding: 10px 0; }
      .event-time { font-size: 10px; padding-top: 2px; }
      .event-title { font-size: 15px; }
      .event-meta { font-size: 10px; }
      .event-note { font-size: 13px; max-width: none; }
      .event-cat { display: none; }

      .today-btn {
        padding: 11px 16px;
        font-size: 10px;
        letter-spacing: 0.14em;
        right: 16px;
        bottom: 16px;
      }

      .tab { font-size: 10px; padding: 12px 0; margin-right: 20px; }

      #date-night { padding: 20px var(--pad-x) 40px; }
      .dn-day-chip { min-width: 64px; padding: 8px 12px 6px; }
      .dn-day-chip .num { font-size: 18px; }
      .dn-hero {
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }
      .dn-hero-date { font-size: clamp(56px, 17vw, 88px); }
      .dn-hero-date small { font-size: 10px; }
      .dn-plan-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .dn-move {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 16px 0;
      }
      .dn-move-band { padding-top: 0; }
      .dn-move-band .flag { border-top: 0; padding-top: 0; margin-top: 4px; display: inline; margin-left: 8px; }
      .dn-move-title { font-size: 17px; }
      .dn-move-blurb { font-size: 13.5px; }

      /* Sheet slides up from bottom on phones */
      .sheet {
        width: 100%;
        max-width: 100%;
        max-height: 88vh;
        margin: 0;
        margin-top: auto;
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
      }
      .sheet-header { padding: 18px 20px 12px; }
      .sheet-body { padding: 14px 20px 20px; }
      .sheet-foot { padding: 10px 20px 14px; }
      .sheet-title { font-size: 19px; }
      .meta-btn .meta-cta { font-size: 10px; margin-top: 4px; }
    }

    /* ── Print ──────────────────────────────────────────── */
    @media print {
      .filters, .today-btn { display: none; }
      .month-title { position: static; }
      .month { break-before: page; }
      .day { break-inside: avoid; }
    }
  </style>
</head>
<body data-view="calendar">
  <header class="masthead">
    <div class="meta-left">
      <span class="meta-label">What's on</span>
      <span class="meta-label">Brooklyn / NYC</span>
    </div>
    <div class="meta-right">
      <button class="meta-btn" id="sources-open" type="button" aria-haspopup="dialog" aria-controls="sources-sheet">
        <span class="meta-label" id="meta-edition">Edition 01</span>
        <span class="meta-label" id="meta-date">—</span>
        <span class="meta-cta">Sources</span>
      </button>
    </div>
    <h1 class="title">2026 / A year in nights.</h1>
  </header>

  <nav class="tabs" id="tabs" role="tablist" aria-label="View">
    <button class="tab is-active" id="tab-calendar" role="tab" type="button" aria-selected="true" data-view="calendar">Calendar</button>
    <button class="tab" id="tab-dn" role="tab" type="button" aria-selected="false" data-view="dn">Date night</button>
  </nav>

  <nav class="filters" id="filters" role="toolbar" aria-label="Filters">
    <div class="filter-row">
      <div class="filter-group" id="filter-cats" data-group="categories"></div>
      <div class="filter-group filter-group-end">
        <button class="chip weather is-active" data-toggle="weather" aria-pressed="true">Weather</button>
      </div>
    </div>
    <div class="filter-row" id="filter-row-hoods" hidden>
      <div class="filter-group">
        <span class="filter-label">Where</span>
      </div>
      <div class="filter-group" id="filter-hoods" data-group="neighborhoods"></div>
    </div>
  </nav>

  <main id="calendar"></main>
  <section id="date-night" aria-label="Date night planner">
    <div class="dn-day-picker" id="dn-days"></div>
    <div class="dn-hero" id="dn-hero"></div>
    <div class="dn-plan-head">
      <h2 class="dn-plan-title">The plan</h2>
      <button type="button" class="dn-shuffle" id="dn-shuffle">Shuffle</button>
    </div>
    <ul class="dn-plan" id="dn-plan"></ul>
  </section>

  <button class="today-btn" id="today-btn" type="button" aria-label="Scroll to today">Today</button>

  <dialog class="sheet" id="sources-sheet" aria-labelledby="sources-sheet-title">
    <div class="sheet-inner">
      <header class="sheet-header">
        <div class="sheet-titles">
          <h2 class="sheet-title" id="sources-sheet-title">Sources</h2>
          <span class="sheet-sub" id="sources-sheet-sub">—</span>
        </div>
        <button class="sheet-close" id="sources-close" type="button" aria-label="Close">×</button>
      </header>
      <div class="sheet-body" id="sources-body"></div>
      <footer class="sheet-foot">
        <a href="https://github.com/joonasvir/cal" target="_blank" rel="noopener">Repo</a>
        <a href="https://github.com/joonasvir/cal/blob/main/taste.md" target="_blank" rel="noopener">Taste profile</a>
      </footer>
    </div>
  </dialog>

  <script>
    const MONTHS = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];
    const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DOW = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    const DOW_LONG = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const CATEGORIES = ['music', 'comedy', 'art', 'food', 'talk', 'nightlife'];
    const TOP_N = 3;

    // ── Date-night catalog ─────────────────────────────
    // Static set of Brooklyn/NYC date moves. Tagged by time band, vibe and
    // weather preference; the planner picks 4 that flow afternoon → late.
    const DATE_MOVES = [
      { id:'prospect-park-picnic', title:'Picnic in Prospect Park', hood:'Prospect Park', band:'afternoon', vibe:['picnic','outdoor','playful'], weather:['sunny','warm','mild'],
        blurb:"Long Meadow if it's hot, the slope by the boathouse if you want a view. Grab a bottle and snacks at Sahadi's on the way." },
      { id:'baguette-sandwich', title:'Make-your-own baguette sandwich', hood:'Carroll Gardens', band:'afternoon', vibe:['playful','lowkey','food'], weather:['any'],
        blurb:"She Wolf for the baguette, Caputo's for prosciutto and good butter. Eat on the stoop or in Carroll Park." },
      { id:'dog-adoption', title:'Visit a dog adoption center', hood:'Cobble Hill', band:'afternoon', vibe:['playful','wholesome'], weather:['any'],
        blurb:"Bideawee or Sean Casey, then a long walk and coffee. Don't bring one home unless you both agree." },
      { id:'court-street-picnic', title:'Court Street Grocers + Carroll Park', hood:'Carroll Gardens', band:'afternoon', vibe:['picnic','lowkey','food'], weather:['sunny','warm','mild'],
        blurb:"Sandwiches from Court Street Grocers, eat in Carroll Park. Easy unfussy date energy." },
      { id:'bk-bridge-sunset', title:'Walk the Brooklyn Bridge at sunset', hood:'DUMBO', band:'early', vibe:['outdoor','romantic','atmospheric'], weather:['sunny','mild','warm','cool'],
        blurb:"Start Manhattan-side so the skyline opens up behind you. End at Cecconi's or hold out for Lucali if you got in." },
      { id:'bk-heights-promenade', title:'Brooklyn Heights Promenade', hood:'Brooklyn Heights', band:'early', vibe:['outdoor','romantic','old-ny'], weather:['sunny','mild','cool'],
        blurb:"Old New York walk, full skyline view. Stop at Front Street or Henry Public after for a martini." },
      { id:'domino-sunset', title:'Sunset at Domino Park', hood:'Williamsburg', band:'early', vibe:['outdoor','sunset','view'], weather:['sunny','mild','warm'],
        blurb:"Walk along the East River, drinks at the rooftop or just hang on the lawn. Best in golden hour." },
      { id:'wythe-roof', title:'Drinks on the Wythe rooftop', hood:'Williamsburg', band:'early', vibe:['cocktail','view'], weather:['sunny','mild','warm'],
        blurb:"Manhattan view, slow drinks, no rush. Sit on the east side." },
      { id:'lib-cocktail', title:'Drinks at Long Island Bar', hood:'Cobble Hill', band:'early', vibe:['cocktail','atmospheric','old-ny'], weather:['any'],
        blurb:"Art Deco room, sit at the bar. Negroni or French 75 to start. Stay for the burger if you're hungry." },
      { id:'public-records-listen', title:'Listening room at Public Records', hood:'Gowanus', band:'evening', vibe:['music','atmospheric','cozy'], weather:['any'],
        blurb:"Sit close to the speakers, share a vermouth, no phones. Spiritual jazz or whatever they're spinning that night." },
      { id:'bar-bayeux', title:'Live jazz at Bar Bayeux', hood:'Prospect Heights', band:'evening', vibe:['music','atmospheric','cozy'], weather:['any'],
        blurb:"Tiny supper-club room, drummer-led trio energy. Stage-side seating if you can get it." },
      { id:'smalls-late', title:'Late set at Smalls', hood:'West Village', band:'late', vibe:['music','atmospheric','late'], weather:['any'],
        blurb:"Slip in after dinner, stand near the bar, share a drink. Drummers' late sets are the move." },
      { id:'attaboy', title:'Nightcap at Attaboy', hood:'Lower East Side', band:'late', vibe:['cocktail','atmospheric','late'], weather:['any'],
        blurb:"Ring the bell, no menu — tell them a flavor. Tight room, late night, exact right energy." },
      { id:'long-room', title:'Smoking-room cocktails at The Long Room', hood:'Williamsburg', band:'late', vibe:['cocktail','late','atmospheric'], weather:['any'],
        blurb:"Tile and dark wood, last-drink-of-the-night kind of bar." },
      { id:'sunnys', title:"Late at Sunny's", hood:'Red Hook', band:'late', vibe:['weird','late','music'], weather:['any'],
        blurb:"Bluegrass jam, jukebox, waterfront, vaguely impossible to get to — exactly why it works." },
      { id:'film-forum', title:'Film Forum noir double', hood:'West Village', band:'evening', vibe:['cinema','cozy','atmospheric'], weather:['rainy','cold','any'],
        blurb:"Check the calendar — usually something noir or 70s. White Horse Tavern for a drink after." },
      { id:'strand', title:'Books at the Strand', hood:'Union Square', band:'afternoon', vibe:['lowkey','cozy','bookish'], weather:['rainy','cold','cool','any'],
        blurb:"Pick a book each, no pressure, browse upstairs. Coffee at Joe's after." },
      { id:'books-magic', title:'Books are Magic + Cafe Spaghetti', hood:'Cobble Hill', band:'afternoon', vibe:['lowkey','cozy','bookish'], weather:['any'],
        blurb:"Pick a book each. Pasta and a glass of red across the street after." },
      { id:'whitney-late', title:'Whitney late hours', hood:'Meatpacking', band:'evening', vibe:['art','atmospheric'], weather:['rainy','cold','cool','any'],
        blurb:"Quiet rooms, well-lit galleries, very gallery-date energy. End with martinis somewhere west." },
      { id:'brooklyn-museum', title:'Brooklyn Museum walk-through', hood:'Prospect Heights', band:'afternoon', vibe:['art','lowkey'], weather:['rainy','cold','any'],
        blurb:"See what's up — usually something worth the room. Sahadi's nearby if you want lunch." },
      { id:'pioneer-works', title:'Pioneer Works show', hood:'Red Hook', band:'evening', vibe:['art','experimental','atmospheric'], weather:['any'],
        blurb:"Check what's on — usually something weird and good. Sunny's after if it's a late one." },
      { id:'lilia-dinner', title:'Dinner at Lilia', hood:'Williamsburg', band:'evening', vibe:['food','atmospheric','romantic'], weather:['any'],
        blurb:"Prettiest Italian room in Brooklyn. Pastas plus orange wine. Book ahead, it's that kind of night." },
      { id:'four-horsemen', title:'Four Horsemen for wine and snacks', hood:'Williamsburg', band:'evening', vibe:['food','atmospheric','wine'], weather:['any'],
        blurb:"Natural wine bar, intimate. A few small plates and a bottle. No rush." },
      { id:'oxalis', title:'Oxalis tasting room', hood:'Crown Heights', band:'evening', vibe:['food','atmospheric','romantic'], weather:['any'],
        blurb:"Tasteful Crown Heights tasting menu. Save it for a real night." },
      { id:'roberta', title:'Pizza at Roberta’s', hood:'Bushwick', band:'evening', vibe:['food','lowkey'], weather:['any'],
        blurb:"Patio if it's warm, big room if not. Margaritas + a few small plates + the bee-sting." },
      { id:'mood-ring', title:'Karaoke at Mood Ring', hood:'Bushwick', band:'late', vibe:['playful','late'], weather:['any'],
        blurb:"Sweaty, fun, low-stakes. Pick a song you both know." },
      { id:'greenwood', title:'Walk in Green-Wood Cemetery', hood:'Sunset Park', band:'afternoon', vibe:['outdoor','atmospheric','quiet'], weather:['sunny','mild','cool'],
        blurb:"Quiet old-NY walk, real views, no crowd. Bring a thermos." },
      { id:'mccarren', title:'McCarren Park hang', hood:'Williamsburg', band:'afternoon', vibe:['outdoor','playful'], weather:['sunny','warm','hot'],
        blurb:"Park beers, frisbee, watch the Williamsburg crowd. Easy unplanned afternoon." },
      { id:'coney', title:'Coney Island day', hood:'Coney Island', band:'afternoon', vibe:['outdoor','playful','summer'], weather:['hot','sunny','warm'],
        blurb:"Boardwalk, Nathan's, the Cyclone if you're in the mood, ocean for the feet." },
      { id:'torst', title:"Tørst beer flights", hood:'Greenpoint', band:'evening', vibe:['lowkey','beer','cozy'], weather:['any'],
        blurb:"Order the small pours and share. Greenpoint's cozy version of a beer date." },
    ];

    const BANDS = [
      { id:'afternoon', label:'Afternoon' },
      { id:'early',     label:'Early evening' },
      { id:'evening',   label:'Evening' },
      { id:'late',      label:'Late' },
    ];

    const pad = (n) => String(n).padStart(2, '0');
    const isoDate = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
    const daysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
    const dowIndex = (y, m, d) => (new Date(y, m, d).getDay() + 6) % 7;

    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const period = h >= 12 ? 'pm' : 'am';
      const hh = h % 12 === 0 ? 12 : h % 12;
      return m ? `${hh}:${pad(m)}${period}` : `${hh}${period}`;
    }

    // ── State ──────────────────────────────────────────
    const state = {
      feed: { edition: '01', year: new Date().getFullYear(), generated_at: '', days: {} },
      activeCats: new Set(), // empty = all
      activeHoods: new Set(), // empty = all; stores slugs
      showWeather: true,
      expandedDates: new Set(),
      todayKey: null,
      linkedDate: null, // YYYY-MM-DD when set via URL/click
      hoodSlugToName: new Map(),
      view: 'calendar', // 'calendar' | 'dn'
      dnDate: null, // YYYY-MM-DD selected in date-night view
      dnSeed: 0, // bumps on shuffle
    };

    // ── Slug helpers ───────────────────────────────────
    function slugify(s) {
      return String(s || '')
        .toLowerCase()
        .normalize('NFKD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function deriveNeighborhoods() {
      const counts = new Map();
      const displayName = new Map();
      for (const day of Object.values(state.feed.days || {})) {
        for (const ev of day.events || []) {
          const name = (ev.neighborhood || '').trim();
          if (!name) continue;
          const slug = slugify(name);
          counts.set(slug, (counts.get(slug) || 0) + 1);
          if (!displayName.has(slug)) displayName.set(slug, name);
        }
      }
      const sorted = [...counts.entries()]
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .map(([slug]) => ({ slug, name: displayName.get(slug) }));
      state.hoodSlugToName = new Map(sorted.map((h) => [h.slug, h.name]));
      return sorted;
    }

    // ── Filter bar ─────────────────────────────────────
    function renderFilters() {
      const catsWrap = document.getElementById('filter-cats');
      catsWrap.innerHTML = '';
      CATEGORIES.forEach((cat) => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = cat;
        btn.dataset.cat = cat;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => toggleCategory(cat));
        catsWrap.appendChild(btn);
      });
      document.querySelector('.chip.weather').addEventListener('click', toggleWeather);

      const hoods = deriveNeighborhoods();
      const hoodsRow = document.getElementById('filter-row-hoods');
      const hoodsWrap = document.getElementById('filter-hoods');
      hoodsWrap.innerHTML = '';
      if (!hoods.length) {
        hoodsRow.hidden = true;
      } else {
        hoodsRow.hidden = false;
        hoods.forEach(({ slug, name }) => {
          const btn = document.createElement('button');
          btn.className = 'chip';
          btn.textContent = name;
          btn.dataset.hood = slug;
          btn.setAttribute('aria-pressed', 'false');
          btn.addEventListener('click', () => toggleHood(slug));
          hoodsWrap.appendChild(btn);
        });
      }
      // Drop any active hoods that no longer exist in the feed
      for (const slug of [...state.activeHoods]) {
        if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
      }
      updateCategoryChips();
      updateHoodChips();
      updateFilterHeight();
    }

    function toggleCategory(cat) {
      if (state.activeCats.has(cat)) state.activeCats.delete(cat);
      else state.activeCats.add(cat);
      updateCategoryChips();
      writeHash();
      renderCalendar();
    }

    function toggleHood(slug) {
      if (state.activeHoods.has(slug)) state.activeHoods.delete(slug);
      else state.activeHoods.add(slug);
      updateHoodChips();
      writeHash();
      renderCalendar();
    }

    function updateCategoryChips() {
      document.querySelectorAll('.chip[data-cat]').forEach((btn) => {
        const on = state.activeCats.has(btn.dataset.cat);
        btn.classList.toggle('is-active', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
    }

    function updateHoodChips() {
      document.querySelectorAll('.chip[data-hood]').forEach((btn) => {
        const on = state.activeHoods.has(btn.dataset.hood);
        btn.classList.toggle('is-active', on);
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
    }

    function toggleWeather() {
      state.showWeather = !state.showWeather;
      document.body.classList.toggle('hide-weather', !state.showWeather);
      const btn = document.querySelector('.chip.weather');
      btn.classList.toggle('is-active', state.showWeather);
      btn.setAttribute('aria-pressed', state.showWeather ? 'true' : 'false');
      writeHash();
    }

    function updateFilterHeight() {
      const fb = document.getElementById('filters');
      if (!fb) return;
      const h = fb.offsetHeight;
      if (h) document.documentElement.style.setProperty('--filter-h', `${h}px`);
    }

    // ── Render ─────────────────────────────────────────
    function filterEvents(events) {
      if (!state.activeCats.size && !state.activeHoods.size) return events;
      return events.filter((e) => {
        if (state.activeCats.size && !state.activeCats.has(e.category)) return false;
        if (state.activeHoods.size && !state.activeHoods.has(slugify(e.neighborhood))) return false;
        return true;
      });
    }

    function renderDay(y, m, d) {
      const key = isoDate(y, m, d);
      const dow = dowIndex(y, m, d);
      const payload = state.feed.days[key];
      const allEvents = payload?.events ?? [];
      const events = filterEvents(allEvents);
      const weather = payload?.weather;
      const isToday = key === state.todayKey;
      const isEmpty = !events.length && !weather;
      const isExpanded = state.expandedDates.has(key);

      const isLinked = key === state.linkedDate;
      const day = document.createElement('article');
      day.className = `day${isEmpty ? ' is-empty' : ''}${isToday ? ' is-today' : ''}${isExpanded ? ' is-expanded' : ''}${isLinked ? ' is-linked' : ''}`;
      day.dataset.date = key;

      const marker = document.createElement('button');
      marker.type = 'button';
      marker.className = 'day-marker';
      marker.setAttribute('aria-label', `Share link for ${key}`);
      marker.addEventListener('click', () => setLinkedDate(key));
      const dowEl = document.createElement('div');
      dowEl.className = 'dow';
      DOW.forEach((letter, i) => {
        const s = document.createElement('span');
        s.textContent = letter;
        if (i === dow) s.classList.add('active');
        dowEl.appendChild(s);
      });
      const numEl = document.createElement('div');
      numEl.className = 'numeral';
      numEl.textContent = pad(d);
      marker.appendChild(dowEl);
      marker.appendChild(numEl);

      const content = document.createElement('div');
      content.className = 'day-content';

      if (weather) {
        const w = document.createElement('div');
        w.className = 'weather';
        const left = document.createElement('div');
        left.className = 'weather-left';
        const hi = weather.high ?? weather.high_f;
        const lo = weather.low ?? weather.low_f;
        left.innerHTML = `
          <span class="weather-temp">${hi}° / ${lo}°</span>
          <span class="weather-mood">${weather.condition}</span>
        `;
        const right = document.createElement('div');
        right.className = 'weather-right';
        right.textContent = weather.note || `${weather.precip_chance}% precip`;
        w.appendChild(left);
        w.appendChild(right);
        content.appendChild(w);
      }

      if (events.length) {
        const list = document.createElement('ul');
        list.className = 'events';
        events.forEach((ev, i) => {
          const li = document.createElement('li');
          li.className = `event${i >= TOP_N ? ' is-hidden' : ''}`;
          li.innerHTML = `
            <div class="event-time">${fmtTime(ev.time)}</div>
            <div class="event-body">
              <div class="event-title">${ev.url
                ? `<a href="${ev.url}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
                : escapeHtml(ev.title)}</div>
              ${ev.venue || ev.neighborhood
                ? `<div class="event-meta">${[ev.venue, ev.neighborhood].filter(Boolean).map(escapeHtml).join(' · ')}</div>`
                : ''}
              ${ev.note ? `<div class="event-note">${escapeHtml(ev.note)}</div>` : ''}
            </div>
            <div class="event-cat">${ev.category || ''}</div>
          `;
          list.appendChild(li);
        });
        content.appendChild(list);

        if (events.length > TOP_N) {
          const more = document.createElement('button');
          more.className = 'more';
          more.type = 'button';
          const hiddenCount = events.length - TOP_N;
          more.textContent = isExpanded ? 'Show less' : `${hiddenCount} more`;
          more.addEventListener('click', () => {
            if (state.expandedDates.has(key)) state.expandedDates.delete(key);
            else state.expandedDates.add(key);
            renderCalendar();
          });
          content.appendChild(more);
        }
      }

      day.appendChild(marker);
      day.appendChild(content);
      return day;
    }

    function renderCalendar() {
      const root = document.getElementById('calendar');
      const scrollY = window.scrollY;
      root.innerHTML = '';
      const year = state.feed.year || new Date().getFullYear();
      for (let m = 0; m < 12; m++) {
        const section = document.createElement('section');
        section.className = 'month';
        section.id = `month-${pad(m + 1)}`;
        const h2 = document.createElement('h2');
        h2.className = 'month-title';
        h2.textContent = MONTHS[m];
        section.appendChild(h2);
        for (let d = 1; d <= daysInMonth(year, m); d++) {
          section.appendChild(renderDay(year, m, d));
        }
        root.appendChild(section);
      }
      observeToday();
      // Preserve scroll across re-render (filter changes)
      window.scrollTo({ top: scrollY, behavior: 'instant' });
    }

    // ── Date Night ─────────────────────────────────────
    function setView(v, opts = {}) {
      if (v !== 'calendar' && v !== 'dn') v = 'calendar';
      state.view = v;
      document.body.dataset.view = v;
      document.querySelectorAll('.tab').forEach((b) => {
        const on = b.dataset.view === v;
        b.classList.toggle('is-active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      if (v === 'dn') {
        if (!state.dnDate) state.dnDate = state.linkedDate || state.todayKey;
        renderDateNight();
      }
      if (!opts.silent) writeHash();
    }

    function weatherTags(w) {
      if (!w) return new Set(['any']);
      const tags = new Set(['any']);
      const hi = Number(w.high ?? w.high_f ?? NaN);
      const lo = Number(w.low ?? w.low_f ?? NaN);
      const unit = (w.unit || (w.high_f != null ? 'F' : 'C')).toUpperCase();
      const hiC = unit === 'F' ? (hi - 32) * 5 / 9 : hi;
      const loC = unit === 'F' ? (lo - 32) * 5 / 9 : lo;
      const cond = (w.condition || '').toLowerCase();
      const precip = Number(w.precip_chance ?? 0);

      if (precip >= 50 || /rain|shower|storm|drizzle/.test(cond)) tags.add('rainy');
      if (hiC >= 28) tags.add('hot');
      if (hiC >= 22 && hiC < 28) tags.add('warm');
      if (hiC >= 15 && hiC < 22) tags.add('mild');
      if (hiC >= 8 && hiC < 15) tags.add('cool');
      if (hiC < 8 || loC < 2) tags.add('cold');
      if (/sun|clear/.test(cond) && precip < 30) tags.add('sunny');
      return tags;
    }

    // Deterministic mulberry32 for stable shuffles
    function makeRng(seed) {
      let s = seed >>> 0;
      return function() {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = s;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    function seedFor(dateKey, n) {
      let h = 2166136261 >>> 0;
      const s = `${dateKey}|${n}`;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function scoreMove(move, tags) {
      let score = 0;
      const isOutdoor = move.vibe.includes('outdoor') || move.vibe.includes('picnic') || move.vibe.includes('sunset');
      const isCozy = move.vibe.includes('cozy') || move.vibe.includes('atmospheric') || move.vibe.includes('cinema');
      let weatherMatch = false;
      for (const w of move.weather) {
        if (w === 'any') { score += 1; continue; }
        if (tags.has(w)) { score += 3; weatherMatch = true; }
      }
      if (isOutdoor && tags.has('rainy')) score -= 6;
      if (isOutdoor && tags.has('cold')) score -= 3;
      if (isCozy && tags.has('rainy')) score += 2;
      if (isCozy && tags.has('cold')) score += 1;
      if (!weatherMatch && !move.weather.includes('any')) score -= 1;
      return score;
    }

    function pickPlan(dateKey, weather, seed) {
      const tags = weatherTags(weather);
      const rng = makeRng(seed);
      const scored = DATE_MOVES.map((m) => ({
        m,
        score: scoreMove(m, tags) + rng() * 0.99, // jitter for variety
      }));
      const byBand = new Map();
      for (const b of BANDS) byBand.set(b.id, []);
      for (const s of scored) byBand.get(s.m.band).push(s);
      for (const arr of byBand.values()) arr.sort((a, b) => b.score - a.score);
      // Layer in one curated event for the date if available.
      const payload = state.feed.days?.[dateKey];
      const events = payload?.events || [];
      const featuredEvent = events[0] || null;
      const featuredBand = featuredEvent ? bandForTime(featuredEvent.time) : null;
      const usedHoods = new Set();
      const plan = [];
      for (const band of BANDS) {
        if (featuredEvent && band.id === featuredBand) {
          plan.push({ band: band.id, label: band.label, fromEvent: true, ev: featuredEvent });
          if (featuredEvent.neighborhood) usedHoods.add(featuredEvent.neighborhood);
          continue;
        }
        const choices = byBand.get(band.id);
        const pick = choices.find((c) => !usedHoods.has(c.m.hood)) || choices[0];
        if (!pick) continue;
        plan.push({ band: band.id, label: band.label, fromEvent: false, move: pick.m });
        if (pick.m.hood) usedHoods.add(pick.m.hood);
      }
      return plan;
    }

    function bandForTime(t) {
      if (!t) return 'evening';
      const [h] = String(t).split(':').map(Number);
      if (h < 17) return 'afternoon';
      if (h < 20) return 'early';
      if (h < 22) return 'evening';
      return 'late';
    }

    function pickerDates(count = 8) {
      const arr = [];
      const start = new Date(state.todayKey + 'T00:00:00');
      for (let i = 0; i < count; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const key = isoDate(d.getFullYear(), d.getMonth(), d.getDate());
        arr.push({ key, d });
      }
      return arr;
    }

    function renderDateNight() {
      const dnDate = state.dnDate || state.todayKey;
      const picker = document.getElementById('dn-days');
      picker.innerHTML = '';
      for (const { key, d } of pickerDates(10)) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'dn-day-chip' + (key === dnDate ? ' is-active' : '');
        const dowIdx = (d.getDay() + 6) % 7;
        const dowLabel = key === state.todayKey ? 'Today' : DOW_LONG[dowIdx];
        btn.innerHTML = `<span class="dow">${dowLabel}</span><span class="num">${d.getDate()}</span>`;
        btn.addEventListener('click', () => {
          state.dnDate = key;
          state.dnSeed = 0;
          writeHash();
          renderDateNight();
        });
        picker.appendChild(btn);
      }

      const payload = state.feed.days?.[dnDate];
      const weather = payload?.weather;
      const hero = document.getElementById('dn-hero');
      const d = new Date(dnDate + 'T00:00:00');
      const dowIdx = (d.getDay() + 6) % 7;
      const dateBlock = `
        <div class="dn-hero-date">
          <small>${DOW_LONG[dowIdx]} · ${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}</small>
          ${d.getDate()}
        </div>
      `;
      let wxBlock = '<div class="dn-hero-weather"><div class="row"><span>No forecast for this day yet</span></div></div>';
      if (weather) {
        const hi = weather.high ?? weather.high_f;
        const lo = weather.low ?? weather.low_f;
        const unit = (weather.unit || (weather.high_f != null ? 'F' : 'C'));
        const tags = [...weatherTags(weather)].filter((t) => t !== 'any').join(' · ');
        wxBlock = `
          <div class="dn-hero-weather">
            <div class="row">
              <strong>${hi}° / ${lo}°${unit}</strong>
              <span>${escapeHtml(weather.condition || '')}</span>
              ${weather.sunset ? `<span>sunset ${escapeHtml(weather.sunset)}</span>` : ''}
              ${tags ? `<span>${escapeHtml(tags)}</span>` : ''}
            </div>
            ${weather.note ? `<div class="note">${escapeHtml(weather.note)}</div>` : ''}
          </div>
        `;
      }
      hero.innerHTML = dateBlock + wxBlock;

      const seed = seedFor(dnDate, state.dnSeed);
      const plan = pickPlan(dnDate, weather, seed);
      const list = document.getElementById('dn-plan');
      list.innerHTML = '';
      if (!plan.length) {
        list.innerHTML = '<li class="dn-empty">No plan to suggest — try shuffling.</li>';
      } else {
        for (const item of plan) {
          const li = document.createElement('li');
          li.className = 'dn-move';
          if (item.fromEvent) {
            const ev = item.ev;
            li.innerHTML = `
              <div class="dn-move-band">
                ${escapeHtml(item.label)}${ev.time ? ` · ${escapeHtml(fmtTime(ev.time))}` : ''}
                <span class="flag">★ on this week</span>
              </div>
              <div>
                <div class="dn-move-title">${ev.url
                  ? `<a href="${escapeHtml(ev.url)}" target="_blank" rel="noopener">${escapeHtml(ev.title)}</a>`
                  : escapeHtml(ev.title)}</div>
                ${ev.venue || ev.neighborhood
                  ? `<div class="dn-move-meta">${[ev.venue, ev.neighborhood].filter(Boolean).map(escapeHtml).join(' · ')}</div>`
                  : ''}
                ${ev.note ? `<div class="dn-move-blurb">${escapeHtml(ev.note)}</div>` : ''}
              </div>
            `;
          } else {
            const m = item.move;
            li.innerHTML = `
              <div class="dn-move-band">${escapeHtml(item.label)}</div>
              <div>
                <div class="dn-move-title">${escapeHtml(m.title)}</div>
                ${m.hood ? `<div class="dn-move-meta">${escapeHtml(m.hood)}</div>` : ''}
                <div class="dn-move-blurb">${escapeHtml(m.blurb)}</div>
              </div>
            `;
          }
          list.appendChild(li);
        }
      }
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ── Today: observer + button ───────────────────────
    let todayObserver = null;
    function observeToday() {
      if (todayObserver) todayObserver.disconnect();
      const todayEl = document.querySelector(`[data-date="${state.todayKey}"]`);
      const btn = document.getElementById('today-btn');
      if (!todayEl) {
        btn.classList.remove('is-visible');
        return;
      }
      todayObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            btn.classList.toggle('is-visible', !e.isIntersecting);
          });
        },
        { rootMargin: `-${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--filter-h')) || 56}px 0px -20% 0px` }
      );
      todayObserver.observe(todayEl);
    }

    function scrollToToday() {
      scrollToDate(state.todayKey, 'smooth');
    }

    function scrollToDate(key, behavior = 'smooth') {
      const el = document.querySelector(`[data-date="${key}"]`);
      if (!el) return;
      const filterH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--filter-h')) || 56;
      const top = el.getBoundingClientRect().top + window.scrollY - filterH - 12;
      window.scrollTo({ top, behavior });
    }

    function setLinkedDate(key) {
      const next = state.linkedDate === key ? null : key;
      state.linkedDate = next;
      if (next) state.expandedDates.add(next);
      writeHash();
      renderCalendar();
      if (next) requestAnimationFrame(() => scrollToDate(next, 'smooth'));
    }

    // ── URL hash sync ──────────────────────────────────
    let suppressHash = false;
    function parseHash() {
      const h = location.hash.replace(/^#/, '');
      if (!h) return {};
      const params = new URLSearchParams(h);
      const out = {};
      if (params.has('c')) out.cats = params.get('c').split(',').filter(Boolean);
      if (params.has('n')) out.hoods = params.get('n').split(',').filter(Boolean);
      if (params.has('w')) out.weather = params.get('w') !== '0';
      if (params.has('d')) out.date = params.get('d');
      if (params.has('v')) out.view = params.get('v');
      if (params.has('dn')) out.dnDate = params.get('dn');
      if (params.has('s')) out.dnSeed = parseInt(params.get('s'), 10) || 0;
      return out;
    }

    function writeHash() {
      if (suppressHash) return;
      const params = new URLSearchParams();
      if (state.activeCats.size) params.set('c', [...state.activeCats].join(','));
      if (state.activeHoods.size) params.set('n', [...state.activeHoods].join(','));
      if (!state.showWeather) params.set('w', '0');
      if (state.linkedDate) params.set('d', state.linkedDate);
      if (state.view === 'dn') params.set('v', 'dn');
      if (state.view === 'dn' && state.dnDate) params.set('dn', state.dnDate);
      if (state.view === 'dn' && state.dnSeed) params.set('s', String(state.dnSeed));
      const str = params.toString();
      const target = str ? `#${str}` : '';
      const current = location.hash || '';
      if (current === target) return;
      const url = `${location.pathname}${location.search}${target}`;
      history.replaceState(null, '', url || location.pathname);
    }

    function applyHashState() {
      const h = parseHash();
      if (h.cats) state.activeCats = new Set(h.cats.filter((c) => CATEGORIES.includes(c)));
      if (h.hoods) state.activeHoods = new Set(h.hoods);
      if (typeof h.weather === 'boolean') {
        state.showWeather = h.weather;
        document.body.classList.toggle('hide-weather', !state.showWeather);
        const wbtn = document.querySelector('.chip.weather');
        if (wbtn) {
          wbtn.classList.toggle('is-active', state.showWeather);
          wbtn.setAttribute('aria-pressed', state.showWeather ? 'true' : 'false');
        }
      }
      if (h.date && /^\d{4}-\d{2}-\d{2}$/.test(h.date)) {
        state.linkedDate = h.date;
        state.expandedDates.add(h.date);
      }
      if (h.view === 'dn') state.view = 'dn';
      if (h.dnDate && /^\d{4}-\d{2}-\d{2}$/.test(h.dnDate)) state.dnDate = h.dnDate;
      if (Number.isFinite(h.dnSeed)) state.dnSeed = h.dnSeed;
    }

    // ── Sources sheet ──────────────────────────────────
    function renderSourcesSheet() {
      const meta = state.feed.meta || {};
      const sub = document.getElementById('sources-sheet-sub');
      const gen = state.feed.generated_at || '';
      const genShort = gen.slice(0, 10) || '—';
      sub.textContent = `Edition ${state.feed.edition || '01'} · ${genShort}`;

      const body = document.getElementById('sources-body');
      const sources = meta.sources || [];
      const weather = meta.weather || {};
      const ranker = meta.ranker || {};
      const stats = meta.stats || {};

      const sourcesHtml = sources.length
        ? sources.map((s) => {
            const cls = s.error ? ' has-error' : '';
            const count = s.error ? 'failed' : `${s.kept ?? 0} items`;
            return `
              <div class="source-row${cls}">
                <div class="source-name">${escapeHtml(s.name)}</div>
                <div class="source-count">${escapeHtml(count)}</div>
                <a class="source-url" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.url)}</a>
              </div>
            `;
          }).join('')
        : '<p class="sheet-sub" style="text-transform:none; letter-spacing:0;">No source data in this build yet.</p>';

      const weatherHtml = `
        <dl class="kv">
          <dt>Provider</dt><dd>${weather.url
            ? `<a href="${escapeHtml(weather.url)}" target="_blank" rel="noopener">${escapeHtml(weather.provider || 'Open-Meteo')}</a>`
            : escapeHtml(weather.provider || 'Open-Meteo')}</dd>
          <dt>Location</dt><dd>${escapeHtml(weather.location || 'Brooklyn, NYC')}</dd>
          <dt>Unit</dt><dd>${escapeHtml(weather.unit || 'C')}</dd>
          <dt>Days</dt><dd>${weather.days ?? '—'}</dd>
        </dl>
      `;

      const rankerHtml = `
        <dl class="kv">
          <dt>Model</dt><dd>${escapeHtml(ranker.model || 'claude-opus-4-7')}</dd>
          <dt>Provider</dt><dd>${escapeHtml(ranker.provider || 'Anthropic')}</dd>
          <dt>Days ranked</dt><dd>${ranker.ranked_days ?? '—'}</dd>
        </dl>
      `;

      const statsHtml = `
        <dl class="kv">
          <dt>Items pulled</dt><dd>${stats.items_pulled ?? '—'}</dd>
          <dt>Events curated</dt><dd>${stats.events_curated ?? '—'}</dd>
          <dt>Days covered</dt><dd>${stats.days_covered ?? '—'}</dd>
          <dt>Generated</dt><dd>${escapeHtml(gen || '—')}</dd>
        </dl>
      `;

      body.innerHTML = `
        <section class="sheet-section">
          <h3>Feeds</h3>
          ${sourcesHtml}
        </section>
        <section class="sheet-section">
          <h3>Weather</h3>
          ${weatherHtml}
        </section>
        <section class="sheet-section">
          <h3>Ranker</h3>
          ${rankerHtml}
        </section>
        <section class="sheet-section">
          <h3>This edition</h3>
          ${statsHtml}
        </section>
      `;
    }

    function openSourcesSheet() {
      renderSourcesSheet();
      const dlg = document.getElementById('sources-sheet');
      if (typeof dlg.showModal === 'function') dlg.showModal();
      else dlg.setAttribute('open', '');
    }

    function closeSourcesSheet() {
      const dlg = document.getElementById('sources-sheet');
      if (typeof dlg.close === 'function') dlg.close();
      else dlg.removeAttribute('open');
    }

    // ── Init ───────────────────────────────────────────
    async function init() {
      try {
        const res = await fetch('feed.json', { cache: 'no-store' });
        if (res.ok) state.feed = await res.json();
      } catch (_) { /* empty year is fine */ }

      const today = new Date();
      state.todayKey = isoDate(today.getFullYear(), today.getMonth(), today.getDate());
      // Today expanded by default
      state.expandedDates.add(state.todayKey);

      document.getElementById('meta-edition').textContent = `Edition ${state.feed.edition || '01'}`;
      document.getElementById('meta-date').textContent = state.feed.generated_at || state.todayKey;

      // Filters depend on feed (for neighborhoods), so render after fetch.
      suppressHash = true;
      renderFilters();
      applyHashState();
      // Drop hood slugs that don't exist in the current feed.
      for (const slug of [...state.activeHoods]) {
        if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
      }
      updateCategoryChips();
      updateHoodChips();
      suppressHash = false;

      renderCalendar();

      // Apply view from URL (default calendar). setView({silent}) — don't rewrite hash.
      setView(state.view, { silent: true });

      // Scroll target: linked date from hash, else today.
      const target = state.linkedDate || state.todayKey;
      requestAnimationFrame(() => {
        if (state.view === 'calendar') scrollToDate(target, 'instant');
        setTimeout(() => observeToday(), 50);
      });

      document.getElementById('today-btn').addEventListener('click', scrollToToday);
      document.getElementById('sources-open').addEventListener('click', openSourcesSheet);
      document.getElementById('sources-close').addEventListener('click', closeSourcesSheet);
      document.querySelectorAll('.tab').forEach((b) => {
        b.addEventListener('click', () => setView(b.dataset.view));
      });
      document.getElementById('dn-shuffle').addEventListener('click', () => {
        state.dnSeed = (state.dnSeed + 1) >>> 0 || 1;
        writeHash();
        renderDateNight();
      });
      const sheet = document.getElementById('sources-sheet');
      // Click outside the sheet content (on the dialog itself / backdrop) closes it.
      sheet.addEventListener('click', (e) => {
        if (e.target === sheet) closeSourcesSheet();
      });
      window.addEventListener('resize', updateFilterHeight, { passive: true });
      window.addEventListener('hashchange', () => {
        suppressHash = true;
        state.activeCats = new Set();
        state.activeHoods = new Set();
        state.showWeather = true;
        state.linkedDate = null;
        state.view = 'calendar';
        state.dnDate = null;
        state.dnSeed = 0;
        document.body.classList.remove('hide-weather');
        applyHashState();
        for (const slug of [...state.activeHoods]) {
          if (!state.hoodSlugToName.has(slug)) state.activeHoods.delete(slug);
        }
        updateCategoryChips();
        updateHoodChips();
        renderCalendar();
        setView(state.view, { silent: true });
        suppressHash = false;
        if (state.view === 'calendar' && state.linkedDate) scrollToDate(state.linkedDate, 'smooth');
      });
    }

    init();
  </script>
</body>
</html>
